<style>

  .notes-card h5{font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--green-d);margin:14px 0 6px;border-bottom:1px solid var(--green-soft);padding-bottom:4px}

  /* table */
  .data-table-wrap{border:1.5px solid var(--green-line);border-radius:var(--radius);overflow:hidden;margin:12px 0}
  .data-table-title{background:var(--green);color:#fff;text-align:center;padding:10px;font-family:'Source Serif 4',serif;font-weight:700}

  .data-table td{padding:11px 12px;font-size:.86rem;vertical-align:top;border-bottom:1px solid var(--line);border-right:1px solid var(--line)}

  .data-table tr:last-child td{border-bottom:none}
  .data-table ul{list-style:none}.data-table ul li{padding:2px 0;font-size:.85rem}
  .data-table ul li::before{content:"•";color:var(--green);margin-right:5px}

  .qnum-prefix{display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:22px;background:var(--green);color:#fff;border-radius:6px;padding:2px 7px;font-size:.72rem;font-weight:700;margin-right:5px}

  .mcq-group{margin:12px 0 16px}
  .mcq-question{font-size:.92rem;font-weight:600;margin-bottom:8px;display:flex;gap:8px}
  .mcq-question .qnum{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--green-soft);color:var(--green-d);font-size:.72rem;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
  .mcq-options{display:flex;flex-direction:column;gap:6px}
  .mcq-option{display:flex;align-items:flex-start;gap:9px;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.88rem;background:var(--panel);transition:all .13s}

  .mcq-radio{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-top:1px;position:relative;display:flex;align-items:center;justify-content:center}

  .mcq-option.selected .mcq-radio{border-color:var(--green);background:var(--green)}
  .mcq-option.selected .mcq-radio::after{content:'';width:6px;height:6px;border-radius:50%;background:#fff;position:absolute}
  .opt-letter{font-weight:700;color:var(--muted);min-width:14px;font-size:.82rem}
  .mcq-option.selected .opt-letter{color:var(--green-d)}
  /* checkbox groups */
  .check-group{margin:12px 0 16px;border:1.5px solid var(--green-line);border-radius:var(--radius);padding:12px 14px;background:var(--panel)}
  .check-group-hint{font-size:.78rem;color:var(--muted);font-style:italic;margin-bottom:8px}
  .check-option{display:flex;align-items:flex-start;gap:9px;padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.88rem;background:var(--bg);margin-bottom:6px}
  .check-option:hover{border-color:var(--green);background:var(--green-tint)}
  .check-option input{display:none}
  .check-box{width:16px;height:16px;border-radius:4px;border:2px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center}
  .check-option.selected{border-color:var(--green);background:var(--green-tint)}
  .check-option.selected .check-box{border-color:var(--green);background:var(--green)}
  .check-option.selected .check-box::after{content:'✓';color:#fff;font-size:11px;font-weight:700;line-height:1}

  /* label rows (matching) */

  .label-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--panel)}
  .label-item label{font-size:.9rem;font-weight:500;flex:1}
  /* map */
  .map-wrap{border:1.5px solid var(--green-line);border-radius:var(--radius);padding:12px;margin:12px 0;background:var(--panel);text-align:center}
  .map-wrap img{max-width:100%;height:auto;border-radius:6px}
  .map-title{font-family:'Source Serif 4',serif;font-weight:700;margin-bottom:8px}
  /* flow chart */
  .flowchart{display:flex;flex-direction:column;align-items:center;gap:4px;margin:12px 0}
  .flow-step{border:1.5px solid var(--green-line);border-radius:var(--radius);padding:12px 16px;width:100%;max-width:420px;text-align:center;font-size:.9rem;background:var(--panel)}

  .example-block{border:1px dashed var(--green-line);border-radius:8px;padding:10px 14px;margin:8px 0 14px;background:var(--green-tint);font-size:.86rem}
  /* ---- bottom nav ---- */
  .botnav{position:fixed;left:0;right:0;bottom:0;height:var(--nav-h);background:var(--bg);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:6px;z-index:70;padding:0 12px;overflow-x:auto}
  .botnav .navbtn{flex:none;min-width:42px;height:38px;border:1px solid var(--border);background:var(--panel);border-radius:9px;font:600 .84rem Inter;color:var(--muted);cursor:pointer;padding:0 13px;display:inline-flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap}
  .botnav .navbtn:hover{border-color:var(--green);color:var(--green)}
  .botnav .navbtn.active{background:var(--green);color:#fff;border-color:var(--green)}
  .botnav .navbtn.wide{padding:0 16px}
  .botnav a.navbtn{text-decoration:none}
  .nav-sep{flex:none;width:1px;height:22px;background:var(--border);margin:0 3px}
  /* modal */
  .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.2s;padding:20px}
  .modal-ov.open{opacity:1;pointer-events:all}
  .modal{background:var(--bg);border:1px solid var(--border);border-radius:16px;max-width:440px;width:100%;padding:30px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}

  .modal .of{color:var(--muted);font-size:.9rem;margin-bottom:12px}
  .modal .band{display:inline-block;background:var(--green-soft);color:var(--green-d);font-weight:700;padding:6px 18px;border-radius:20px;margin-bottom:18px}
  .modal button{padding:9px 20px;border-radius:9px;border:1px solid var(--border);background:var(--panel);font:600 .85rem Inter;color:var(--text);cursor:pointer;margin:4px}
  .modal button.primary{background:var(--green);color:#fff;border-color:var(--green)}
  .review-list{text-align:left;max-height:60vh;overflow:auto;margin-top:8px}
  .ans-row{display:grid;grid-template-columns:52px 1fr 1fr;gap:10px;padding:8px 11px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px;align-items:center;font-size:.85rem}
  .ans-row.correct{border-color:var(--green);background:var(--green-tint)}
  .ans-row.incorrect{border-color:#dc2626;background:#fef2f2}
  html[data-theme="dark"] .ans-row.incorrect{background:#2a1717}
  .ans-row .ql{font-family:'Source Serif 4',serif;font-weight:700;color:var(--muted)}
  .ans-row .lbl{font-size:.64rem;text-transform:uppercase;color:var(--faint);font-weight:700}
  .ans-row .yv{font-weight:600}
  .ans-row.incorrect .yv{color:#dc2626;text-decoration:line-through}
  .ans-row .cv{color:var(--green-d);font-weight:700}
  ::selection{background:var(--hl)}
  @media(max-width:900px){.wrap{grid-template-columns:1fr;gap:16px}.audio-box{position:static}.top h1{font-size:.9rem}.tr-tx{font-size:.9rem}}
</style>

<script>
const PARTS = {"1": "\n  <p class=\"q-label\">Questions 1–10</p>\n  <p class=\"instruction\">Complete the table below.<br><strong>Write ONE WORD AND/OR A NUMBER for each answer.</strong></p>\n  <div class=\"data-table-wrap\">\n    <div class=\"data-table-title\">One-day classes at Steynford College</div>\n    <table class=\"data-table\">\n      <thead><tr><th>Course</th><th>Date</th><th>Cost</th><th>Notes</th></tr></thead>\n      <tbody>\n        <tr><td>Vietnamese food</td><td><span class=\"qnum-prefix\">1</span><input type=\"text\" class=\"ans-input\" data-q=\"1\" oninput=\"updateProgress()\" style=\"width:120px\"></td><td>£59</td><td><ul><li>It provides information on the use of herbs.</li><li>There are no places at present.</li></ul></td></tr>\n        <tr><td>Bread making</td><td>20 March</td><td>£ <span class=\"qnum-prefix\">2</span><input type=\"text\" class=\"ans-input\" data-q=\"2\" oninput=\"updateProgress()\" style=\"width:90px\"></td><td><ul><li>There is also an extra charge for ingredients.</li><li>Participants make white bread, sourdough and <span class=\"qnum-prefix\">3</span><input type=\"text\" class=\"ans-input\" data-q=\"3\" oninput=\"updateProgress()\" style=\"width:110px\"></li></ul></td></tr>\n        <tr><td>Face massage</td><td>23 February</td><td>£35</td><td><ul><li>The teacher trained in <span class=\"qnum-prefix\">4</span><input type=\"text\" class=\"ans-input\" data-q=\"4\" oninput=\"updateProgress()\" style=\"width:110px\"></li><li>Bring a <span class=\"qnum-prefix\">5</span><input type=\"text\" class=\"ans-input\" data-q=\"5\" oninput=\"updateProgress()\" style=\"width:110px\"></li></ul></td></tr>\n        <tr><td>Candle making</td><td><span class=\"qnum-prefix\">6</span><input type=\"text\" class=\"ans-input\" data-q=\"6\" oninput=\"updateProgress()\" style=\"width:120px\"></td><td>£52</td><td><ul><li>Only <span class=\"qnum-prefix\">7</span><input type=\"text\" class=\"ans-input\" data-q=\"7\" oninput=\"updateProgress()\" style=\"width:110px\"> ingredients are used.</li><li>The candles can be used as presents.</li></ul></td></tr>\n        <tr><td>Silk painting</td><td>18 May</td><td>£ <span class=\"qnum-prefix\">8</span><input type=\"text\" class=\"ans-input\" data-q=\"8\" oninput=\"updateProgress()\" style=\"width:90px\"></td><td><ul><li>Bring an apron or old <span class=\"qnum-prefix\">9</span><input type=\"text\" class=\"ans-input\" data-q=\"9\" oninput=\"updateProgress()\" style=\"width:110px\"></li></ul></td></tr>\n        <tr><td>DIY for beginners</td><td>24 February</td><td>£125</td><td><ul><li>Learn how to use a drill, saw and <span class=\"qnum-prefix\">10</span><input type=\"text\" class=\"ans-input\" data-q=\"10\" oninput=\"updateProgress()\" style=\"width:110px\"></li><li>put up a shelf.</li></ul></td></tr>\n      </tbody>\n    </table>\n  </div>\n", "2": "\n  <p class=\"q-label\">Questions 11 and 12</p>\n  <p class=\"instruction\">Which <strong>TWO</strong> pieces of advice are given about the Marsden Coastal Walk?</p>\n  <div class=\"check-group\" data-questions=\"11,12\" data-max=\"2\"><div class=\"check-group-hint\">Choose TWO letters, A–E.</div><label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"A\"><span class=\"check-box\"></span><span class=\"opt-letter\">A</span> Stop for lunch in an ancient town.</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"B\"><span class=\"check-box\"></span><span class=\"opt-letter\">B</span> Don't miss the ruins of a certain building.</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"C\"><span class=\"check-box\"></span><span class=\"opt-letter\">C</span> Catch a boat to the start of this walk.</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"D\"><span class=\"check-box\"></span><span class=\"opt-letter\">D</span> Be careful of th ">A</span> the amount of plastic in the ocean</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"B\"><span class=\"check-box\"></span><span class=\"opt-letter\">B</span> the number of diseases caused by contaminated food</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"C\"><span class=\"check-box\"></span><span class=\"opt-letter\">C</span> the amount of food that is wasted</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"D\"><span class=\"check-box\"></span><span class=\"opt-letter\">D</span> the number of people who are obese</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"E\"><span class=\"check-box\"></span><span class=\"opt-letter\">E</span> the result of treating animals with antibiotics</label>\n</div>\n  <p class=\"q-label\" style=\"margin-top:22px\">Questions 23 and 24</p>\n  <p class=\"instruction\">Which <strong>TWO</strong> features of a project aiming to prevent food fraud impressed Fergus?</p>\n  <div class=\"check-group\" data-questions=\"23,24\" data-max=\"2\"><div class=\"check-group-hint\">Choose TWO letters, A–E.</div><label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"A\"><span class=\"check-box\"></span><span class=\"opt-letter\">A</span> the new technology it used</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"B\"><span class=\"check-box\"></span><span class=\"opt-letter\">B</span> the publicity it received</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"C\"><span class=\"check-box\"></span><span class=\"opt-letter\">C</span> the use of multiple tests on food items</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"D\"><span class=\"check-box\"></span><span class=\"opt-letter\">D</span> the variety of dietary requirements included</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"E\"><span class=\"check-box\"></span><span class=\"opt-letter\">E</span> the way information was made widely accessible</label>\n</div>\n  <p class=\"q-label\" style=\"margin-top:22px\">Questions 25 and 26</p>\n  <p class=\"instruction\">Which <strong>TWO</strong> topics do both students recommend should be included in the course?</p>\n  <div class=\"check-group\" data-questions=\"25,26\" data-max=\"2\"><div class=\"check-group-hint\">Choose TWO letters, A–E.</div><label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"A\"><span class=\"check-box\"></span><span class=\"opt-letter\">A</span> sustainable fishing</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"B\"><span class=\"check-box\"></span><span class=\"opt-letter\">B</span> targeted nutrition</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"C\"><span class=\"check-box\"></span><span class=\"opt-letter\">C</span> global differences in consumption</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"D\"><span class=\"check-box\"></span><span class=\"opt-letter\">D</span> sustainable agriculture</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"E\"><span class=\"check-box\"></span><span class=\"opt-letter\">E</span> digital technology and food</label>\n</div>\n  <p class=\"q-label\" style=\"margin-top:22px\">Questions 27–30</p>\n  <p class=\"instruction\">Complete the flow-chart below. Choose <strong>FOUR</strong> answers from the box and write the correct letter, <strong>A–F</strong>, next to Questions 27–30.</p>\n  <div class=\"letter-bank\">\n    <div class=\"row\"><strong>A</strong> This was challenging but enjoyable.</div>\n    <div class=\"row\"><strong>B</strong> This led to some disagreement.</div>\n    <div class=\"row\"><strong>C</strong> This was easy to decide on.</div>\n    <div class=\"row\"><strong>D</strong> This was helped by the guidelines provided.</div>\n    <div class=\"row\"><strong>E</strong> This seemed like an unnecessary stage.</div>\n    <div class=\"row\"><strong>F</strong> This involved selecting a new ingredient.</div>\n  </div>\n  <div style=\"text-align:center;font-family:'Source Serif 4',serif;font-weight:700;margin:6px 0 10px\">Student project: developing a new food product</div>\n  <div class=\"flowchart\">\n    <div class=\"flow-step\">Initial aim <span class=\"qnum-prefix\">27</span><input type=\"text\" class=\"ans-input\" data-q=\"27\" oninput=\"updateProgress()\" style=\"width:56px;text-transform:uppercase\" maxlength=\"1\"></div><div class=\"flow-arrow\">↓</div>\n    <div class=\"flow-step\">Literature review <span class=\"qnum-prefix\">28</span><input type=\"text\" class=\"ans-input\" data-q=\"28\" oninput=\"updateProgress()\" style=\"width:56px;text-transform:uppercase\" maxlength=\"1\"></div><div class=\"flow-arrow\">↓</div>\n    <div class=\"flow-step\">Product development <span class=\"qnum-prefix\">29</span><input type=\"text\" class=\"ans-input\" data-q=\"29\" oninput=\"updateProgress()\" style=\"width:56px;text-transform:uppercase\" maxlength=\"1\"></div><div class=\"flow-arrow\">↓</div>\n    <div class=\"flow-step\">Product production <span class=\"qnum-prefix\">30</span><input type=\"text\" class=\"ans-input\" data-q=\"30\" oninput=\"updateProgress()\" style=\"width:56px;text-transform:uppercase\" maxlength=\"1\"></div>\n  </div>\n", "4": "\n  <p class=\"q-label\">Questions 31–40</p>\n  <p class=\"instruction\">Complete the notes below.<br><strong>Write ONE WORD ONLY for each answer.</strong></p>\n  <div class=\"notes-card\"><h4>Challenges facing the cruise ship industry</h4>\n    <h5>Problems with overtourism</h5>\n    <ul>\n      <li><span class=\"qnum-prefix\">31</span><input type=\"text\" class=\"ans-input\" data-q=\"31\" oninput=\"updateProgress()\" style=\"width:120px\"> is one of the worst problems.</li>\n      <li>A tourist <span class=\"qnum-prefix\">32</span><input type=\"text\" class=\"ans-input\" data-q=\"32\" oninput=\"updateProgress()\" style=\"width:120px\"> is being introduced in some cities to reduce numbers, e.g. Barcelona.</li>\n      <li>Bruges: action was taken to limit day trips from the nearby port because the city was becoming a 'theme park' (e.g. many shops were only stocking <span class=\"qnum-prefix\">33</span><input type=\"text\" class=\"ans-input\" data-q=\"33\" oninput=\"updateProgress()\" style=\"width:120px\"> and souvenirs).</li>\n      <li>Dubrovnik: limits the number of tourists by managing the <span class=\"qnum-prefix\">34</span><input type=\"text\" class=\"ans-input\" data-q=\"34\" oninput=\"updateProgress()\" style=\"width:120px\"> of cruise ship arrivals.</li>\n    </ul>\n    <h5>Problems of perception</h5>\n    <ul>\n      <li>Cruises are generally associated with the elderly.</li>\n      <li>There is an assumption about the <span class=\"qnum-prefix\">35</span><input type=\"text\" class=\"ans-input\" data-q=\"35\" oninput=\"updateProgress()\" style=\"width:120px\"> of cruises.</li>\n      <li>People think there may be too many <span class=\"qnum-prefix\">36</span><input type=\"text\" class=\"ans-input\" data-q=\"36\" oninput=\"updateProgress()\" style=\"width:120px\">.</li>\n    </ul>\n    <h5>Solutions</h5>\n    <p>Cruise lines are attracting younger customers by:</p>\n    <ul>\n      <li>becoming more sustainable e.g. using hybrid engines.</li>\n      <li>having a wide range of activities e.g. boxing, <span class=\"qnum-prefix\">37</span><input type=\"text\" class=\"ans-input\" data-q=\"37\" oninput=\"updateProgress()\" style=\"width:120px\"> and well-being programmes.</li>\n      <li>offering a diverse selection of food including <span class=\"qnum-prefix\">38</span><input type=\"text\" class=\"ans-input\" data-q=\"38\" oninput=\"updateProgress()\" style=\"width:120px\"> options.</li>\n      <li>providing reliable <span class=\"qnum-prefix\">39</span><input type=\"text\" class=\"ans-input\" data-q=\"39\" oninput=\"updateProgress()\" style=\"width:120px\">.</li>\n      <li>improving marketing on social media with high quality <span class=\"qnum-prefix\">40</span><input type=\"text\" class=\"ans-input\" data-q=\"40\" oninput=\"updateProgress()\" style=\"width:120px\">.</li>\n    </ul>\n  </div>\n"};

(function(){ try{ const t=localStorage.getItem('theme'); if(t) document.documentElement.setAttribute('data-theme',t);}catch(e){} })();

function toggleCheck(evt,label){ evt.preventDefault(); const cb=label.querySelector('input'); const g=label.closest('.check-group'); const max=parseInt(g.dataset.max||'99',10); if(cb.checked){cb.checked=false;label.classList.remove('selected');return;} if(g.querySelectorAll('input:checked').length>=max)return; cb.checked=true;label.classList.add('selected'); }

/* scoring */
const norm=s=>(s??'').toString().trim().toLowerCase().replace(/[.,!?;:'"‘’“”()]/g,'').replace(/[-_]/g,' ').replace(/\s+/g,' ').trim();
function isCorrect(u,c){ if(!u)return false; const un=norm(u); if(!un)return false; const dg=s=>s.replace(/[^\d]/g,''); const ud=dg(un);
  const tm=v=>{const vn=norm(v); if(vn===un)return true; const vd=dg(vn); if(ud&&vd&&ud.length>=3&&ud===vd)return true; return false;};
  return Array.isArray(c)?c.some(tm):tm(c); }
function getUA(){ const ua={};
  document.querySelectorAll('input[type="text"][data-q]').forEach(i=>ua[i.dataset.q]=i.value.trim());
  document.querySelectorAll('input[type="radio"]:checked').forEach(r=>{const m=r.name.match(/^q(\d+)$/); if(m){const o=r.closest('.mcq-option'); if(o)ua[m[1]]=o.querySelector('.opt-letter').textContent.trim();}});
  document.querySelectorAll('.check-group').forEach(g=>{const qs=(g.dataset.questions||'').split(',').map(s=>s.trim()).filter(Boolean); const sel=[...g.querySelectorAll('input:checked')].map(i=>i.value); qs.forEach((q,i)=>ua[q]=sel[i]||'');});
  return ua; }
/* persist across part switches: cache answers on switch */
let cache={};
function stash(){ Object.assign(cache,getUA()); }
const _sp=switchPart; switchPart=function(n){ stash(); _sp(n); restore(); };
function restore(){ document.querySelectorAll('input[type="text"][data-q]').forEach(i=>{ if(cache[i.dataset.q]!=null)i.value=cache[i.dataset.q]; });
  document.querySelectorAll('.mcq-option').forEach(o=>{ const inp=o.querySelector('input'); const m=inp.name.match(/^q(\d+)$/); if(m&&cache[m[1]]===o.querySelector('.opt-letter').textContent.trim()){o.classList.add('selected');inp.checked=true;} });
  document.querySelectorAll('.check-group').forEach(g=>{ const qs=(g.dataset.questions||'').split(',').map(s=>s.trim()); const want=qs.map(q=>cache[q]).filter(Boolean); g.querySelectorAll('.check-option').forEach(o=>{ const v=o.querySelector('input').value; if(want.includes(v)){o.classList.add('selected');o.querySelector('input').checked=true;} }); }); }
function multiPts(key,ua){ const s=multiCorrect[key]; if(!s)return 0; const acc=s.accept.map(norm); const used=new Set(); let p=0; s.inputs.map(k=>norm(ua[k]||'')).forEach(uv=>{ if(!uv)return; for(let i=0;i<acc.length;i++){ if(used.has(i))continue; if(uv===acc[i]){used.add(i);p++;break;} } }); return p; }
function score(){ stash(); const ua=cache; let c=0; const handled=new Set();
  Object.keys(multiCorrect).forEach(k=>{ c+=multiPts(k,ua); multiCorrect[k].inputs.forEach(s=>handled.add(String(s))); });
  for(let q=1;q<=40;q++){ if(handled.has(String(q)))continue; if(ua[q]&&correctAnswers[q]!==undefined&&isCorrect(ua[q],correctAnswers[q]))c++; }
  return c; }
function band(c){ if(c>=39)return'9.0';if(c>=37)return'8.5';if(c>=35)return'8.0';if(c>=32)return'7.5';if(c>=30)return'7.0';if(c>=26)return'6.5';if(c>=23)return'6.0';if(c>=18)return'5.5';if(c>=16)return'5.0';if(c>=13)return'4.5';if(c>=10)return'4.0';return'<4'; }
function submitAnswers(){ const c=score(); document.getElementById('mScore').textContent=c; document.getElementById('mBand').textContent='Estimated Band '+band(c); document.getElementById('resModal').classList.add('open'); }

function showReview(){ closeModal(); const ua=cache; const box=document.getElementById('revList'); let h='';
  const slotBase={}; Object.keys(multiCorrect).forEach(k=>multiCorrect[k].inputs.forEach(s=>slotBase[s]=k));
  for(let q=1;q<=40;q++){ let u=ua[q]||'',cc,ok;
    if(slotBase[q]){ const sp=multiCorrect[slotBase[q]]; cc=sp.accept.join(' / ')+' (any order)'; ok=u&&sp.accept.map(norm).includes(norm(u)); }
    else { cc=correctAnswers[q]; if(cc===undefined)continue; ok=u&&isCorrect(u,cc); cc=Array.isArray(cc)?cc[0]:cc; }
    const cls=!u?'':(ok?'correct':'incorrect');
    h+=`<div class="ans-row ${cls}"><div class="ql">Q${q}</div><div><div class="lbl">You</div><div class="yv">${u||'—'}</div></div><div><div class="lbl">Answer</div><div class="cv">${cc}</div></div></div>`; }
  box.innerHTML=h; document.getElementById('revModal').classList.add('open'); }
function resetAll(){ if(!confirm('Clear all your answers?'))return; cache={}; document.querySelectorAll('input[type="text"][data-q]').forEach(i=>i.value=''); document.querySelectorAll('.mcq-option.selected,.check-option.selected').forEach(o=>o.classList.remove('selected')); document.querySelectorAll('input:checked').forEach(i=>i.checked=false); }

switchPart(1);
</script>
