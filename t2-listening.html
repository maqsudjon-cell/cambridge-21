<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#ffffff;--panel:#fafafa;--panel2:#f4f6f5;--border:#e5e7eb;--line:#eceeed;
    --text:#0a0a0a;--muted:#6b7280;--faint:#9ca3af;

  }
  html[data-theme="dark"],body.theme-dark{
    --bg:#0c0e0d;--panel:#141817;--panel2:#171c1a;--border:#242b28;--line:#1e2421;
    --text:#f1f5f3;--muted:#9aa6a1;--faint:#6b756f;
    --green:#10b981;--green-d:#34d399;--green-soft:#0c3b2c;--green-tint:#0e2a22;--green-line:#10b981;--hl:#0f4433;

    --text:#f1f5f3;--muted:#9aa6a1;--faint:#6b756f;
    --green:#10b981;--green-d:#34d399;--green-soft:#0c3b2c;--green-tint:#0e2a22;--hl:#0f4433;}}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding-bottom:var(--nav-h)}
  a{color:inherit}
  .top{position:sticky;top:0;z-index:60;background:var(--bg);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;gap:14px;padding:0 20px}
  .top .back{font-size:.8rem;color:var(--muted);text-decoration:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;white-space:nowrap}
  .top .back:hover{border-color:var(--green);color:var(--green)}
  .top h1{font-family:'Source Serif 4',serif;font-size:1.02rem;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .top .tools{display:flex;gap:6px}
  .iconbtn{width:34px;height:34px;border:1px solid var(--border);background:var(--panel);border-radius:8px;cursor:pointer;font-size:.95rem;color:var(--muted);display:flex;align-items:center;justify-content:center}
  .iconbtn:hover{border-color:var(--green);color:var(--green)}
  .wrap{max-width:1320px;margin:0 auto;padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:26px}
  .col-h{font-family:'Source Serif 4',serif;font-size:1.35rem;font-weight:700;margin-bottom:4px}
  /* ---- LEFT: audio + audioscript ---- */
  .audio-box{position:sticky;top:66px;z-index:20;background:var(--bg);padding-bottom:10px}
  .player-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}

  .transcript-head{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;cursor:pointer;background:var(--green-tint)}

  .tr-q{display:inline-flex;align-items:center;justify-content:center;background:var(--green);color:#fff;font-size:.66rem;font-weight:700;border-radius:5px;padding:1px 7px;margin:0 2px;vertical-align:middle;font-family:Inter;letter-spacing:.02em}
  .tr-hint{font-size:.78rem;color:var(--faint);font-style:italic;padding:2px 8px 8px}
  /* ---- RIGHT: questions ---- */
  .q-instr-top{font-size:.82rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:6px}
  .instruction{font-size:.96rem;margin-bottom:14px}
  .instruction strong{font-weight:700}
  .q-label{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:20px 0 10px}
  .section-title-r{font-family:'Source Serif 4',serif;font-size:1.15rem;font-weight:700;text-align:center;margin:6px 0 14px}

  .notes-card{border:1.5px solid var(--green-line);border-radius:var(--radius);padding:16px 18px;margin:12px 0;background:var(--panel)}
  .notes-card h4{font-family:'Source Serif 4',serif;font-size:1.02rem;font-weight:700;text-align:center;margin-bottom:12px}
  .notes-card h5{font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--green-d);margin:14px 0 6px;border-bottom:1px solid var(--green-soft);padding-bottom:4px}
  .notes-card ul{list-style:none;padding-left:4px}
  .notes-card ul li{padding:5px 0;font-size:.92rem;line-height:1.7}
  .notes-card ul li::before{content:"•";color:var(--green);margin-right:7px}
  .notes-card p{font-size:.92rem;margin:6px 0}
  /* table */
  .data-table-wrap{border:1.5px solid var(--green-line);border-radius:var(--radius);overflow:hidden;margin:12px 0}
  .data-table-title{background:var(--green);color:#fff;text-align:center;padding:10px;font-family:'Source Serif 4',serif;font-weight:700}
  .data-table{width:100%;border-collapse:collapse}
  .data-table th{background:var(--green-tint);color:var(--green-d);padding:9px 12px;text-align:left;font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--green-soft)}
  .data-table td{padding:11px 12px;font-size:.86rem;vertical-align:top;border-bottom:1px solid var(--line);border-right:1px solid var(--line)}
  .data-table td:last-child,.data-table th:last-child{border-right:none}
  .data-table td:first-child{font-weight:600}
  .data-table tr:last-child td{border-bottom:none}
  .data-table ul{list-style:none}.data-table ul li{padding:2px 0;font-size:.85rem}
  .data-table ul li::before{content:"•";color:var(--green);margin-right:5px}
  /* inputs */
  input.ans-input{border:1.5px solid var(--border);border-radius:6px;padding:5px 9px;font:400 .88rem Inter;color:var(--text);background:var(--bg);outline:none;width:130px;vertical-align:middle}
  input.ans-input:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  input.ans-input.correct{border-color:var(--green);background:var(--green-tint)}
  input.ans-input.incorrect{border-color:#dc2626;background:#fef2f2}
  html[data-theme="dark"] input.ans-input.incorrect{background:#3a1d1d}
  .qnum-prefix{display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:22px;background:var(--green);color:#fff;border-radius:6px;padding:2px 7px;font-size:.72rem;font-weight:700;margin-right:5px}
  /* mcq */
  .mcq-group{margin:12px 0 16px}
  .mcq-question{font-size:.92rem;font-weight:600;margin-bottom:8px;display:flex;gap:8px}
  .mcq-question .qnum{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--green-soft);color:var(--green-d);font-size:.72rem;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
  .mcq-options{display:flex;flex-direction:column;gap:6px}
  .mcq-option{display:flex;align-items:flex-start;gap:9px;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.88rem;background:var(--panel);transition:all .13s}
  .mcq-option:hover{border-color:var(--green);background:var(--green-tint)}
  .mcq-option input{display:none}
  .mcq-radio{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-top:1px;position:relative;display:flex;align-items:center;justify-content:center}
  .mcq-option.selected{border-color:var(--green);background:var(--green-tint)}
  .mcq-option.selected .mcq-radio{border-color:var(--green);background:var(--green)}
  .mcq-option.selected .mcq-radio::after{content:'';width:6px;height:6px;border-radius:50%;background:#fff;position:absolute}
  .opt-letter{font-weight:700;color:var(--muted);min-width:14px;font-size:.82rem}
  .mcq-option.selected .opt-letter{color:var(--green-d)}
  /* checkbox groups */
  .check-group{margin:12px 0 16px;border:1.5px solid var(--green-line);border-radius:var(--radius);padding:12px 14px;background:var(--panel)}
  .check-group-hint{font-size:.78rem;color:var(--muted);font-style:italic;margin-bottom:8px}
  .check-option{display:flex;align-items:flex-start;gap:9px;padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.88rem;background:var(--bg);margin-bottom:6px}
  .check-option:hover{border-color:var(--green);background:var(--green-tint)}
  .check-option input{display:none}
  .check-box{width:16px;height:16px;border-radius:4px;border:2px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center}
  .check-option.selected{border-color:var(--green);background:var(--green-tint)}
  .check-option.selected .check-box{border-color:var(--green);background:var(--green)}
  .check-option.selected .check-box::after{content:'✓';color:#fff;font-size:11px;font-weight:700;line-height:1}
  .check-option.selected .opt-letter{color:var(--green-d)}
  /* letter bank */
  .letter-bank{border:1.5px solid var(--green-line);border-radius:var(--radius);background:var(--panel);padding:12px 16px;margin:8px 0 14px}
  .letter-bank .row{padding:4px 0;font-size:.88rem}
  .letter-bank .row strong{color:var(--green-d);font-weight:700;margin-right:6px;min-width:18px;display:inline-block}
  /* label rows (matching) */
  .label-row{display:flex;flex-direction:column;gap:8px;margin:8px 0 12px}
  .label-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--panel)}
  .label-item label{font-size:.9rem;font-weight:500;flex:1}
  /* map */
  .map-wrap{border:1.5px solid var(--green-line);border-radius:var(--radius);padding:12px;margin:12px 0;background:var(--panel);text-align:center}
  .map-wrap img{max-width:100%;height:auto;border-radius:6px}
  .map-title{font-family:'Source Serif 4',serif;font-weight:700;margin-bottom:8px}
  /* flow chart */
  .flowchart{display:flex;flex-direction:column;align-items:center;gap:4px;margin:12px 0}
  .flow-step{border:1.5px solid var(--green-line);border-radius:var(--radius);padding:12px 16px;width:100%;max-width:420px;text-align:center;font-size:.9rem;background:var(--panel)}
  .flow-step .qnum-prefix{margin-right:6px}
  .flow-arrow{color:var(--green);font-size:1.1rem;font-weight:700}
  .example-block{border:1px dashed var(--green-line);border-radius:8px;padding:10px 14px;margin:8px 0 14px;background:var(--green-tint);font-size:.86rem}
  /* ---- bottom nav ---- */
  .botnav{position:fixed;left:0;right:0;bottom:0;height:var(--nav-h);background:var(--bg);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:6px;z-index:70;padding:0 12px;overflow-x:auto}
  .botnav .navbtn{flex:none;min-width:42px;height:38px;border:1px solid var(--border);background:var(--panel);border-radius:9px;font:600 .84rem Inter;color:var(--muted);cursor:pointer;padding:0 13px;display:inline-flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap}
  .botnav .navbtn:hover{border-color:var(--green);color:var(--green)}
  .botnav .navbtn.active{background:var(--green);color:#fff;border-color:var(--green)}
  .botnav .navbtn.wide{padding:0 16px}
  .botnav a.navbtn{text-decoration:none}
  .nav-sep{flex:none;width:1px;height:22px;background:var(--border);margin:0 3px}
  /* modal */
  .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.2s;padding:20px}
  .modal-ov.open{opacity:1;pointer-events:all}
  .modal{background:var(--bg);border:1px solid var(--border);border-radius:16px;max-width:440px;width:100%;padding:30px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
  .modal .score{font-family:'Source Serif 4',serif;font-size:3rem;font-weight:700;color:var(--green);line-height:1}
  .modal .of{color:var(--muted);font-size:.9rem;margin-bottom:12px}
  .modal .band{display:inline-block;background:var(--green-soft);color:var(--green-d);font-weight:700;padding:6px 18px;border-radius:20px;margin-bottom:18px}
  .modal button{padding:9px 20px;border-radius:9px;border:1px solid var(--border);background:var(--panel);font:600 .85rem Inter;color:var(--text);cursor:pointer;margin:4px}
  .modal button.primary{background:var(--green);color:#fff;border-color:var(--green)}
  .review-list{text-align:left;max-height:60vh;overflow:auto;margin-top:8px}
  .ans-row{display:grid;grid-template-columns:52px 1fr 1fr;gap:10px;padding:8px 11px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px;align-items:center;font-size:.85rem}
  .ans-row.correct{border-color:var(--green);background:var(--green-tint)}
  .ans-row.incorrect{border-color:#dc2626;background:#fef2f2}
  html[data-theme="dark"] .ans-row.incorrect{background:#2a1717}
  .ans-row .ql{font-family:'Source Serif 4',serif;font-weight:700;color:var(--muted)}
  .ans-row .lbl{font-size:.64rem;text-transform:uppercase;color:var(--faint);font-weight:700}
  .ans-row .yv{font-weight:600}
  .ans-row.incorrect .yv{color:#dc2626;text-decoration:line-through}
  .ans-row .cv{color:var(--green-d);font-weight:700}
  ::selection{background:var(--hl)}
  @media(max-width:900px){.wrap{grid-template-columns:1fr;gap:16px}.audio-box{position:static}.top h1{font-size:.9rem}.tr-tx{font-size:.9rem}}
</style>
</head>

<script>
const PARTS = {"1": "\n  <p class=\"q-label\">Questions 1–10</p>\n  <p class=\"instruction\">Complete the table below.<br><strong>Write ONE WORD AND/OR A NUMBER for each answer.</strong></p>\n  <div class=\"data-table-wrap\">\n    <div class=\"data-table-title\">One-day classes at Steynford College</div>\n    <table class=\"data-table\">\n      <thead><tr><th>Course</th><th>Date</th><th>Cost</th><th>Notes</th></tr></thead>\n      <tbody>\n        <tr><td>Vietnamese food</td><td><span class=\"qnum-prefix\">1</span><input type=\"text\" class=\"ans-input\" data-q=\"1\" oninput=\"updateProgress()\" style=\"width:120px\"></td><td>£59</td><td><ul><li>It provides information on the use of herbs.</li><li>There are no places at present.</li></ul></td></tr>\n        <tr><td>Bread making</td><td>20 March</td><td>£ <span class=\"qnum-prefix\">2</span><input type=\"text\" class=\"ans-input\" data-q=\"2\" oninput=\"updateProgress()\" style=\"width:90px\"></td><td><ul><li>There is also an extra charge for ingredients.</li><li>Participants make white bread, sourdough and <span class=\"qnum-prefix\">3</span><input type=\"text\" class=\"ans-input\" data-q=\"3\" oninput=\"updateProgress()\" style=\"width:110px\"></li></ul></td></tr>\n        <tr><td>Face massage</td><td>23 February</td><td>£35</td><td><ul><li>The teacher trained in <span class=\"qnum-prefix\">4</span><input type=\"text\" class=\"ans-input\" data-q=\"4\" oninput=\"updateProgress()\" style=\"width:110px\"></li><li>Bring a <span class=\"qnum-prefix\">5</span><input type=\"text\" class=\"ans-input\" data-q=\"5\" oninput=\"updateProgress()\" style=\"width:110px\"></li></ul></td></tr>\n        <tr><td>Candle making</td><td><span class=\"qnum-prefix\">6</span><input type=\"text\" class=\"ans-input\" data-q=\"6\" oninput=\"updateProgress()\" style=\"width:120px\"></td><td>£52</td><td><ul><li>Only <span class=\"qnum-prefix\">7</span><input type=\"text\" class=\"ans-input\" data-q=\"7\" oninput=\"updateProgress()\" style=\"widt ">A</span> the amount of plastic in the ocean</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"B\"><span class=\"check-box\"></span><span class=\"opt-letter\">B</span> the number of diseases caused by contaminated food</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"C\"><span class=\"check-box\"></span><span class=\"opt-letter\">C</span> the amount of food that is wasted</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"D\"><span class=\"check-box\"></span><span class=\"opt-letter\">D</span> the number of people who are obese</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"E\"><span class=\"check-box\"></span><span class=\"opt-letter\">E</span> the result of treating animals with antibiotics</label>\n</div>\n  <p class=\"q-label\" style=\"margin-top:22px\">Questions 23 and 24</p>\n  <p class=\"instruction\">Which <strong>TWO</strong> features of a project aiming to prevent food fraud impressed Fergus?</p>\n  <div class=\"check-group\" data-questions=\"23,24\" data-max=\"2\"><div class=\"check-group-hint\">Choose TWO letters, A–E.</div><label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"A\"><span class=\"check-box\"></span><span class=\"opt-letter\">A</span> the new technology it used</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"B\"><span class=\"check-box\"></span><span class=\"opt-letter\">B</span> the publicity it received</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"C\"><span class=\"check-box\"></span><span class=\"opt-letter\">C</span> the use of multiple tests on food items</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"D\"><span class=\"check-box\"></span><span class=\"opt-letter\">D</span> the variety of dietary requirements included</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"E\"><span class=\"check-box\"></span><span class=\"opt-letter\">E</span> the way information was made widely accessible</label>\n</div>\n  <p class=\"q-label\" style=\"margin-top:22px\">Questions 25 and 26</p>\n  <p class=\"instruction\">Which <strong>TWO</strong> topics do both students recommend should be included in the course?</p>\n  <div class=\"check-group\" data-questions=\"25,26\" data-max=\"2\"><div class=\"check-group-hint\">Choose TWO letters, A–E.</div><label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"A\"><span class=\"check-box\"></span><span class=\"opt-letter\">A</span> sustainable fishing</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"B\"><span class=\"check-box\"></span><span class=\"opt-letter\">B</span> targeted nutrition</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"C\"><span class=\"check-box\"></span><span class=\"opt-letter\">C</span> global differences in consumption</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"D\"><span class=\"check-box\"></span><span class=\"opt-letter\">D</span> sustainable agriculture</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"E\"><span class=\"check-box\"></span><span class=\"opt-letter\">E</span> digital technology and food</label>\n</div>\n  <p class=\"q-label\" style=\"margin-top:22px\">Questions 27–30</p>\n  <p class=\"instruction\">Complete the flow-chart below. Choose <strong>FOUR</strong> answers from the box and write the correct letter, <strong>A–F</strong>, next to Questions 27–30.</p>\n  <div class=\"letter-bank\">\n    <div class=\"row\"><strong>A</strong> This was challenging but enjoyable.</div>\n    <div class=\"row\"><strong>B</strong> This led to some disagreement.</div>\n    <div class=\"row\"><strong>C</strong> This was easy to decide on.</div>\n    <div class=\"row\"><strong>D</strong> This was helped by the guidelines provided.</div>\n    <div class=\"row\"><strong>E</strong> This seemed like an unnecessary stage.</div>\n    <div class=\"row\"><strong>F</strong> This involved selecting a new ingredient.</div>\n  </div>\n  <div style=\"text-align:center;font-family:'Source Serif 4',serif;font-weight:700;margin:6px 0 10px\">Student project: developing a new food product</div>\n  <div class=\"flowchart\">\n    <div class=\"flow-step\">Initial aim <span class=\"qnum-prefix\">27</span><input type=\"text\" class=\"ans-input\" data-q=\"27\" oninput=\"updateProgress()\" style=\"width:56px;text-transform:uppercase\" maxlength=\"1\"></div><div class=\"flow-arrow\">↓</div>\n    <div class=\"flow-step\">Literature review <span class=\"qnum-prefix\">28</span><input type=\"text\" class=\"ans-input\" data-q=\"28\" oninput=\"updateProgress()\" style=\"width:56px;text-transform:uppercase\" maxlength=\"1\"></div><div class=\"flow-arrow\">↓</div>\n    <div class=\"flow-step\">Product development <span class=\"qnum-prefix\">29</span><input type=\"text\" class=\"ans-input\" data-q=\"29\" oninput=\"updateProgress()\" style=\"width:56px;text-transform:uppercase\" maxlength=\"1\"></div><div class=\"flow-arrow\">↓</div>\n    <div class=\"flow-step\">Product production <span class=\"qnum-prefix\">30</span><input type=\"text\" class=\"ans-input\" data-q=\"30\" oninput=\"updateProgress()\" style=\"width:56px;text-transform:uppercase\" maxlength=\"1\"></div>\n  </div>\n", "4": "\n  <p class=\"q-label\">Questions 31–40</p>\n  <p class=\"instruction\">Complete the notes below.<br><strong>Write ONE WORD ONLY for each answer.</strong></p>\n  <div class=\"notes-card\"><h4>Challenges facing the cruise ship industry</h4>\n    <h5>Problems with overtourism</h5>\n    <ul>\n      <li><span class=\"qnum-prefix\">31</span><input type=\"text\" class=\"ans-input\" data-q=\"31\" oninput=\"updateProgress()\" style=\"width:120px\"> is one of the worst problems.</li>\n      <li>A tourist <span class=\"qnum-prefix\">32</span><input type=\"text\" class=\"ans-input\" data-q=\"32\" oninput=\"updateProgress()\" style=\"width:120px\"> is being introduced in some cities to reduce numbers, e.g. Barcelona.</li>\n      <li>Bruges: action was taken to limit day trips from the nearby port because the city was becoming a 'theme park' (e.g. many shops were only stocking <span class=\"qnum-prefix\">33</span><input type=\"text\" class=\"ans-input\" data-q=\"33\" oninput=\"updateProgress()\" style=\"width:120px\"> and souvenirs).</li>\n      <li>Dubrovnik: limits the number of tourists by managing the <span class=\"qnum-prefix\">34</span><input type=\"text\" class=\"ans-input\" data-q=\"34\" oninput=\"updateProgress()\" style=\"width:120px\"> of cruise ship arrivals.</li>\n    </ul>\n    <h5>Problems of perception</h5>\n    <ul>\n      <li>Cruises are generally associated with the elderly.</li>\n      <li>There is an assumption about the <span class=\"qnum-prefix\">35</span><input type=\"text\" class=\"ans-input\" data-q=\"35\" oninput=\"updateProgress()\" style=\"width:120px\"> of cruises.</li>\n      <li>People think there may be too many <span class=\"qnum-prefix\">36</span><input type=\"text\" class=\"ans-input\" data-q=\"36\" oninput=\"updateProgress()\" style=\"width:120px\">.</li>\n    </ul>\n    <h5>Solutions</h5>\n    <p>Cruise lines are attracting younger customers by:</p>\n    <ul>\n      <li>becoming more sustainable e.g. using hybrid engines.</li>\n      <li>having a wide range of activities e.g. boxing, <span class=\"qnum-prefix\">37</span><input type=\"text\" class=\"ans-input\" data-q=\"37\" oninput=\"updateProgress()\" style=\"width:120px\"> and well-being programmes.</li>\n      <li>offering a diverse selection of food including <span class=\"qnum-prefix\">38</span><input type=\"text\" class=\"ans-input\" data-q=\"38\" oninput=\"updateProgress()\" style=\"width:120px\"> options.</li>\n      <li>providing reliable <span class=\"qnum-prefix\">39</span><input type=\"text\" class=\"ans-input\" data-q=\"39\" oninput=\"updateProgress()\" style=\"width:120px\">.</li>\n      <li>improving marketing on social media with high quality <span class=\"qnum-prefix\">40</span><input type=\"text\" class=\"ans-input\" data-q=\"40\" oninput=\"updateProgress()\" style=\"width:120px\">.</li>\n    </ul>\n  </div>\n"};

#x27;m afraid that all the places are taken at present but I can put you on the waiting list if you want.", "t": 144.14}, {"sp": "", "h": "No, that&#x27;s okay. I&#x27;m quite interested in the bread making class. That&#x27;s in March sometime isn&#x27;t it?", "t": 151.14}, {"sp": "", "h": "Yeah, the 20th of March. Would you like to register for that?", "t": 159.14}, {"sp": "", "h": "I&#x27;m not sure. How much is it?", "t": 164.14}, {"sp": "", "h": "The actual cost is £<span class=\"tr-ans\">48<sup class=\"tr-q\">Q2</sup></span> but then there&#x27;s an extra charge as well as that for the ingredients.", "t": 167.14}, {"sp": "", "h": "I&#x27;m not sure how much that is. No more than £20 I think.", "t": 174.14}, {"sp": "", "h": "So what sorts of things do they make in the class?", "t": 179.14}, {"sp": "", "h": "Oh, various types of bread. I think they make white bread and then they make sourdough.", "t": 183.14}, {"sp": "", "h": "That seems to be very fashionable at present and they learn how to make <span class=\"tr-ans\">pizza<sup class=\"tr-q\">Q3</sup></span> which is apparently really good.", "t": 189.14}, {"sp": "", "h": "Well, I&#x27;d definitely be interested in that but there were also a few other classes that sounded interesting.", "t": 196.14}, {"sp": "", "h": "I think there was one on face massage. I&#x27;d love to learn how to do that.", "t": 204.14}, {"sp": "", "h": "Yeah, that&#x27;s on the 23rd of February and it costs just £35 for the day.", "t": 209.14}, {"sp": "", "h": "The teacher&#x27;s great. The type of massage done is a traditional technique used in <span class=\"tr-ans\">India<sup class=\"tr-q\">Q4</sup></span> and she actually did her training there.", "t": 216.14}, {"sp": "", "h": "The massage is meant to relax you and get rid of lines and wrinkles. You practice it on yourself so you have to take a <span class=\"tr-ans\">mirror<sup class=\"tr-q\">Q5</sup></span> to the class so you can see what you&#x27;re doing.", "t": 226.14}, {"sp": "", "h": "Okay.", "t": 238.14}, {"sp": "", "h": "Before you hear the rest of the conversation, you have some time to look at questions 6 to 10.", "t": 242.14}, {"sp": "", "h": "Now listen and answer questions 6 to 10.", "t": 272.14}, {"sp": "", "h": "And I think there was a class in candle making?", "t": 282.14}, {"sp": "", "h": "Yes, that&#x27;s sometime in April I think. Let me check. Yes, it&#x27;s on the 6th. It was on the 23rd of January but they had to change the date.", "t": 286.14}, {"sp": "", "h": "It&#x27;s just £52. That&#x27;s a popular course too.", "t": 298.14}, {"sp": "", "h": "I think one reason why people like it is because the candles are all made out of <span class=\"tr-ans\">natural<sup class=\"tr-q\">Q7</sup></span> products.", "t": 304.14}, {"sp": "", "h": "It&#x27;s filling up fast but there&#x27;s still a few places left.", "t": 311.14}, {"sp": "", "h": "Yes, one of my friends did that class. She said the candles make really good presents. In fact, she gave me one.", "t": 315.14}, {"sp": "", "h": "By the way, have you heard about the class on silk painting? That&#x27;s being held on the 18th of May.", "t": 324.14}, {"sp": "", "h": "You learn how to create designs on silk fabric and colour them using special dies.", "t": 331.14}, {"sp": "", "h": "Apparently people can produce beautiful artworks that way, either to put on the wall as a picture or to use for something like a scarf.", "t": 338.14}, {"sp": "", "h": "It&#x27;s £67.50, which is really good value I think. There&#x27;s a similar class I&#x27;ve seen that was £110.", "t": 349.14}, {"sp": "", "h": "That sounds interesting. Would I need to bring the silk?", "t": 359.14}, {"sp": "", "h": "No, the only thing is everyone has to bring something to protect their clothing. Like an apron if you&#x27;ve got one or a <span class=\"tr-ans\">shirt<sup class=\"tr-q\">Q9</sup></span> that you don&#x27;t use anymore because the die can really stain your clothes.", "t": 363.14}, {"sp": "", "h": "Right. Then the last class I was considering was a bit different. That was on DIY for beginners.", "t": 378.14}, {"sp": "", "h": "I&#x27;d like to learn how to do household repairs. Are there any places left on that?", "t": 386.14}, {"sp": "", "h": "That&#x27;s on the 24th of February. Yes, there are a few places. It&#x27;s a bit more expensive. It&#x27;s £125. But it&#x27;s a very popular class.", "t": 392.14}, {"sp": "", "h": "You learn how to use an electric drill and a saw.", "t": 405.14}, {"sp": "", "h": "Yeah, that would be really useful. And I even need to learn how to use a <span class=\"tr-ans\">hammer<sup class=\"tr-q\">Q10</sup></span> because I always end up hitting my fingers.", "t": 409.14}, {"sp": "", "h": "Yes, you&#x27;ll do that too. And when you&#x27;ve learned how to use the basic tools, you do a practical job, which is fixing a shelf to a wall.", "t": 417.14}, {"sp": "", "h": "Great. Just what I need to know. Right. Well, I&#x27;d like to enroll for that and also for the camera.", "t": 427.14}, {"sp": "", "h": "That is the end of part one. You now have one minute to check your answers to part one.", "t": 437.14}, {"sp": "", "h": "Thank you.", "t": 457.14}, {"sp": "", "h": "You", "t": 487.14}], "2": [{"sp": "", "h": "Part 2. You will hear some recorded information for visitors to a region about history and nature", "t": 0.0}, {"sp": "", "h": "walks there, and about a particular visitor attraction. First, you have some time to look at questions 11 to 14.", "t": 8.0}, {"sp": "", "h": "Here is some information about history and nature walks in the region. They can be completed in less than a day, and also be combined with a visit to Melby, a former coal mine now open to the public.", "t": 30.0}, {"sp": "", "h": "The Marsden coastal walk is suitable for all the family, as there are no strenuous climbs. The route begins at Marsden Harbour, where there are hourly ferries to and from the beautiful Hooker Island, a great place for fishing.", "t": 57.0}, {"sp": "", "h": "The walk covers part of the coastal path trail. As there are clear signposts all along the way, you don&#x27;t even need to take a map with you.", "t": 75.0}, {"sp": "", "h": "At one point, the route goes inland slightly and passes a castle built in the 1400s, near to a now vanished market town. The castle is now just a pile of stones, but it&#x27;s a great place to take photos and fascinating information boards show what it once looked like. If you set off early, you can be back in time for midday.", "t": 84.0}, {"sp": "", "h": "The Melby Heritage Walk is a great place to take photos, especially of the night sky. At certain times of the year, people come here from far and wide. They climb to the top of the valley and take pictures of the stars. In the daytime, it&#x27;s completely different. As you hike through the dense woods in the valley bottom, the only things you&#x27;ll hear are the sound of your own footsteps.", "t": 108.0}, {"sp": "", "h": "At the highest point, you can stop to take in the views, and those with lots of energy can climb the tower that&#x27;s situated where there was once a 17th century hunting lodge.", "t": 135.0}, {"sp": "", "h": "The route continues along the tops of the hills and brings you back down to the starting point, the car park at Melby coal mine.", "t": 148.0}, {"sp": "", "h": "Before you hear the rest of the recorded information, you have some time to look at questions 15 to 20.", "t": 160.0}, {"sp": "", "h": "Melby coal mine has been open to the public for 20 years and has won awards for its visitor experience. Many of the buildings around the mine are still standing", "t": 190.0}, {"sp": "", "h": "and have been converted into display areas. Firstly, there&#x27;s an exhibition showing the history of the mine with many original black and white photos.", "t": 217.0}, {"sp": "", "h": "To see that, you go from the car park via a covered walkway to the main visitor center. Go through the ticket office to an area where there are lockers to leave heavy bags in and where you can borrow raincoats.", "t": 227.0}, {"sp": "", "h": "Beyond that room is the exhibition. There&#x27;s a small bath house where miners used to wash after their shift on the ground.", "t": 242.0}, {"sp": "", "h": "You can see that in the building directly to the north of the engine house. The boiler is gone from there now, but there are lines of tin baths on the stone floor.", "t": 251.0}, {"sp": "", "h": "There&#x27;s a display of early mining tools from the days before mechanisation. You can find that in a small L-shaped building in the middle of the northern boundary of the site.", "t": 262.0}, {"sp": "", "h": "It&#x27;s incredible to think how miners were able to use hand implements to cut through rock.", "t": 274.0}, {"sp": "", "h": "The vehicle shed where you can find wagons of different sizes along with some of the high tech cutting machines that were in use until the mine closed is in the southwest corner of the site and can be accessed via a covered walkway.", "t": 281.0}, {"sp": "", "h": "There is a field with ponies which are always popular with children on the northeastern boundary of the site, not approached via a covered walkway.", "t": 297.0}, {"sp": "", "h": "The other building to mention is the education centre. This is where school groups go when they visit the mine, but it&#x27;s also accessible to the public as it contains a library and small gift shop.", "t": 307.0}, {"sp": "", "h": "The centre is connected to the ticket office via a short section of covered walkway.", "t": 321.0}, {"sp": "", "h": "That is the end of part two. You now have 30 seconds to check your answers to part two.", "t": 329.0}, {"sp": "", "h": "[BLANK_AUDIO]", "t": 359.0}], "3": [{"sp": "", "h": "Part 3. You will hear two food science students called Nadia and Fergus talking to their tutor", "t": 0.0}, {"sp": "", "h": "about their course. First, you have some time to look at questions 21 to 26.", "t": 8.56}, {"sp": "", "h": "Now, listen carefully and answer questions 21 to 26.", "t": 30.0}, {"sp": "", "h": "Thanks for coming along, Nadia and Fergus. So this is a chance for you to give us some", "t": 55.72}, {"sp": "", "h": "feedback about different aspects of your course. What would you like to begin with?", "t": 61.16}, {"sp": "", "h": "I&#x27;ve enjoyed the sessions on food safety. There was some information there that I", "t": 66.68}, {"sp": "", "h": "found really surprising, although some were stuff I knew already, like the rise in rates", "t": 71.72}, {"sp": "", "h": "of obesity.", "t": 77.16}, {"sp": "", "h": "Yeah, that&#x27;s been in the news a lot. But I hadn&#x27;t realised that unsafe food causes", "t": 78.16}, {"sp": "", "h": "more than 200 different diseases. No. I had no idea it was that many. And speaking", "t": 83.28}, {"sp": "", "h": "of diseases, I knew resistance to antibiotics is on the increase, but I didn&#x27;t know why.", "t": 90.24}, {"sp": "", "h": "That it&#x27;s partly because when animals are treated with antibiotics then consumed by", "t": 97.08}, {"sp": "", "h": "humans, the antibiotics get into the food chain. I had no idea about that either.", "t": 102.44}, {"sp": "", "h": "Then the sessions provided a lot of information about plastic pollution from food packaging", "t": 108.84}, {"sp": "", "h": "in the ocean. But I think that most of us were already aware of that.", "t": 114.44}, {"sp": "", "h": "Yeah. But I thought we could have done more on how much food is thrown away unnecessarily", "t": 119.04}, {"sp": "", "h": "through fear of it being out of date. That was only mentioned in passing.", "t": 124.4}, {"sp": "", "h": "Okay. I&#x27;ll bear that in mind. What did you think about the sessions from visiting lecturers?", "t": 128.68}, {"sp": "", "h": "Fergus? For me, the most interesting one was about that", "t": 135.4}, {"sp": "", "h": "project to prevent companies giving incorrect information to consumers about food.", "t": 139.2}, {"sp": "", "h": "Ah. Food fraud, yes. I thought it was really good to address a problem that&#x27;s faced by", "t": 144.28}, {"sp": "", "h": "so many different groups. People with special religious rules, as well as vegetarians and", "t": 150.12}, {"sp": "", "h": "vegans. And those with allergies. Yeah. And another thing, we&#x27;ve had effective", "t": 156.04}, {"sp": "", "h": "ways of analyzing DNA for some time now. And these can easily be applied to analyzing", "t": 161.88}, {"sp": "", "h": "food. But what the researchers succeeded in doing was to ensure that these tests were", "t": 167.4}, {"sp": "", "h": "carried out at different stages in the food&#x27;s journey from the producer to the consumer.", "t": 172.16}, {"sp": "", "h": "So they knew that the food actually came from the place it was supposed to and had the ingredients", "t": 177.84}, {"sp": "", "h": "it was meant to. Exactly. So customers can be confident about", "t": 183.2}, {"sp": "", "h": "what they buy. And the researchers had a good system for publicizing their findings too.", "t": 187.52}, {"sp": "", "h": "Well, I thought there were some problems with that actually.", "t": 192.84}, {"sp": "", "h": "Okay. And do you have any recommendations for new topics that we could include in the", "t": 196.92}, {"sp": "", "h": "course? Well, I&#x27;m interested in how crop yields can", "t": 202.6}, {"sp": "", "h": "be increased without damaging the environment. But we&#x27;ve already done quite a bit on that.", "t": 206.68}, {"sp": "", "h": "But not so much on the seafood industry, where stocks are in danger of being over exploited", "t": 212.08}, {"sp": "", "h": "as a food source, unless we can find ways of keeping stocks up.", "t": 217.08}, {"sp": "", "h": "Yes. That would be a good topic. And I&#x27;m interested in the idea of a personalized approach", "t": 221.32}, {"sp": "", "h": "to diet. Now we have the technology to analyze exactly", "t": 227.6}, {"sp": "", "h": "what individuals need. Hmm. That sounds more like a medical topic", "t": 231.32}, {"sp": "", "h": "than food science. Okay. What about sessions on the variety", "t": 235.84}, {"sp": "", "h": "of food and eating habits around the world? That&#x27;s very relevant nowadays.", "t": 240.88}, {"sp": "", "h": "Yes. I think the whole class would be interested in that.", "t": 246.0}, {"sp": "", "h": "Then there&#x27;s technological stuff. Things like 3D printing of food and smart packaging.", "t": 249.36}, {"sp": "", "h": "Hmm. Maybe two specialists.", "t": 255.76}, {"sp": "", "h": "Before you hear the rest of the discussion, you have some time to look at questions 27", "t": 261.52}, {"sp": "", "h": "to 30.", "t": 268.08}, {"sp": "", "h": "Now, I&#x27;m particularly interested in your project, the one where you developed a new", "t": 276.0}, {"sp": "", "h": "food product. So talk me through the stages. First, you had to decide on your initial aim.", "t": 301.92}, {"sp": "", "h": "We decided we wanted to create something people could eat on the go, rather than in a restaurant.", "t": 310.0}, {"sp": "", "h": "Yeah. So we chose the Laffle, which was originally a Middle Eastern snack.", "t": 315.96}, {"sp": "", "h": "We made up our minds about that pretty quickly. I know some students found this a lot harder", "t": 321.44}, {"sp": "", "h": "to choose and wasted a lot of time.", "t": 326.52}, {"sp": "", "h": "Then we had to do the literature review. We hadn&#x27;t done one of these before, so the", "t": 329.64}, {"sp": "", "h": "handout with advice for the project was very useful here.", "t": 334.76}, {"sp": "", "h": "Yes. Especially the advice on how to present the information. Then product development,", "t": 338.68}, {"sp": "", "h": "actually deciding what we&#x27;d use to make the falafel. And for me, the interesting thing", "t": 345.84}, {"sp": "", "h": "about that was that we wanted it to be something a bit different from an ordinary falafel.", "t": 350.8}, {"sp": "", "h": "Hmm. We really made the right choice when we finally decided to use jackfruit, even", "t": 356.8}, {"sp": "", "h": "though it wasn&#x27;t something that either of us had ever tasted before.", "t": 362.92}, {"sp": "", "h": "Yeah. Like the name tells you, it&#x27;s a fruit, but actually it&#x27;s really good in savoury", "t": 366.64}, {"sp": "", "h": "dishes. The product production, working out how to make the falafel, was harder than I", "t": 372.76}, {"sp": "", "h": "expected because I&#x27;d never made them before.", "t": 378.72}, {"sp": "", "h": "It was mostly trial and error. We started off with the basic recipe and then experimented", "t": 381.88}, {"sp": "", "h": "and when it went wrong, which it did a lot of the time.", "t": 388.72}, {"sp": "", "h": "We just moved on and kept adapting it. And in the end, it turned out fine. And we had", "t": 393.24}, {"sp": "", "h": "a lot of fun. We did. Thank you. Well, your project was a very good.", "t": 399.2}, {"sp": "", "h": "That is the end of Part 3. You now have 30 seconds to check your answers", "t": 407.88}, {"sp": "", "h": "to Part 3.", "t": 414.64}, {"sp": "", "h": "of Part 3. You have 30 seconds to check your answers to Part 3. You have 30 seconds.", "t": 437.88}], "4": [{"sp": "", "h": "Part 4. You will hear part of a presentation by a tourism studies student", "t": 0.0}, {"sp": "", "h": "on the cruise ship industry. First, you have some time to look at questions 31 to 40.", "t": 6.48}, {"sp": "", "h": "[silence]", "t": 30.0}, {"sp": "", "h": "For my presentation today, I am going to talk about some of the issues facing the cruise", "t": 60.0}, {"sp": "", "h": "ship industry, and then some ways these can be addressed. The cruise ship industry has", "t": 79.28}, {"sp": "", "h": "partly been responsible for the effects of overtourism in recent decades. Overtourism", "t": 85.88}, {"sp": "", "h": "occurs in places where excessive numbers of tourists cause significant problems. <span class=\"tr-ans\">Pollution<sup class=\"tr-q\">Q31</sup></span>,", "t": 92.04}, {"sp": "", "h": "for example, is among the greatest threats to many popular tourist destinations. Of", "t": 98.88}, {"sp": "", "h": "course, for many places, it&#x27;s a difficult balance to achieve. They want to promote their", "t": 104.72}, {"sp": "", "h": "city or island as a desirable tourist destination, but at the same time are unable to cope with", "t": 110.48}, {"sp": "", "h": "thousands of cruise ship passengers on a daily basis. The trouble is, excessive tourism", "t": 117.16}, {"sp": "", "h": "is destroying the beauty spots and places of interest that people come to visit. Several", "t": 123.72}, {"sp": "", "h": "cities, such as Barcelona, have responded by imposing a <span class=\"tr-ans\">tax<sup class=\"tr-q\">Q32</sup></span>, which all visitors to the", "t": 129.6}, {"sp": "", "h": "city from cruise ships have to pay. But as it&#x27;s only a couple of euros, many green campaigners", "t": 135.96}, {"sp": "", "h": "think it won&#x27;t deter enough people to make any difference.", "t": 142.92}, {"sp": "", "h": "Bruges is another city which became impossible to navigate at times because of the huge numbers", "t": 147.36}, {"sp": "", "h": "of cruise passengers arriving on day trips from the port of Zebrauga. The city was becoming", "t": 153.36}, {"sp": "", "h": "like a theme park with shops only catering for tourists selling <span class=\"tr-ans\">chocolate<sup class=\"tr-q\">Q33</sup></span>, which Belgium", "t": 159.92}, {"sp": "", "h": "is famous for, and other souvenirs. The local council took action to limit cruise passengers", "t": 166.16}, {"sp": "", "h": "to a more manageable level. Dubrovnik had to limit the numbers of cruise ships after it", "t": 173.08}, {"sp": "", "h": "became extremely popular as a cruise ship destination when it featured in a hugely successful", "t": 179.76}, {"sp": "", "h": "TV series. What it does now is control the <span class=\"tr-ans\">timing<sup class=\"tr-q\">Q34</sup></span> of all cruise ship entries to the city&#x27;s", "t": 185.44}, {"sp": "", "h": "port. However, many people feel this measure does not go far enough.", "t": 192.4}, {"sp": "", "h": "Cruise ships may be unpopular in some of their destinations, but they also have an", "t": 202.88}, {"sp": "", "h": "image problem. They&#x27;ve always been perceived as a safe holiday for the elderly, with not", "t": 207.2}, {"sp": "", "h": "much on offer for families or young couples. A recent survey showed that <span class=\"tr-ans\">cost<sup class=\"tr-q\">Q35</sup></span> is also a", "t": 213.08}, {"sp": "", "h": "major factor in putting younger groups off going on a cruise. But what they don&#x27;t realize", "t": 219.88}, {"sp": "", "h": "is that compared to other types of package holidays, cruises can actually be good value,", "t": 226.36}, {"sp": "", "h": "as all activities and drinks are often included. And another perception is that cruises have", "t": 232.8}, {"sp": "", "h": "lots of <span class=\"tr-ans\">rules<sup class=\"tr-q\">Q36</sup></span> about what to wear and how to behave. But these days, most cruises are no", "t": 238.8}, {"sp": "", "h": "longer very formal and behind the times. So what solutions are there for cruise lines", "t": 244.96}, {"sp": "", "h": "to overcome some of these problems? How can they appeal to younger customers? Well, one", "t": 251.56}, {"sp": "", "h": "selling point is that cruise ships are becoming more sustainable. New ships are built with", "t": 257.92}, {"sp": "", "h": "hybrid engines, with large batteries, which means ships do not have to keep their engines", "t": 264.56}, {"sp": "", "h": "running while docked. Cruise lines are also designing ships, especially for those in the", "t": 269.88}, {"sp": "", "h": "age range of 21 to 45. The décor in these feels contemporary, and there are a range of", "t": 276.12}, {"sp": "", "h": "activities on board that you wouldn&#x27;t find on a more traditional cruise. There&#x27;s even", "t": 284.04}, {"sp": "", "h": "a boxing ring on one ship and most offer <span class=\"tr-ans\">diving<sup class=\"tr-q\">Q37</sup></span> expeditions. But there&#x27;s also a huge focus", "t": 289.0}, {"sp": "", "h": "on well-being, with a variety of sessions of different kinds.", "t": 295.4}, {"sp": "", "h": "Food is always a very important part of any cruise, and cruise ships have had to radically", "t": 301.6}, {"sp": "", "h": "update their menus to suit the tastes of their younger customers. <span class=\"tr-ans\">Vegan<sup class=\"tr-q\">Q38</sup></span> dishes are standard,", "t": 306.64}, {"sp": "", "h": "for example. The restaurants on board have also gone paperless, with menus available", "t": 312.84}, {"sp": "", "h": "on-screen. Unlike older generations who went on cruises", "t": 319.28}, {"sp": "", "h": "largely to get away from everything, younger people expect to be able to keep in touch", "t": 324.52}, {"sp": "", "h": "with friends and family. Many people going on longer cruises also spend time working,", "t": 329.64}, {"sp": "", "h": "so companies have to guarantee Wi-Fi that can be relied upon at all times.", "t": 336.24}, {"sp": "", "h": "High-grandparents used to love looking through cruise brochures, even when they weren&#x27;t planning", "t": 342.24}, {"sp": "", "h": "on going on a cruise. Until very recently, TV ads for cruises always felt dated and aimed", "t": 346.96}, {"sp": "", "h": "at retirees. Cruise lines have been slowed to adopt the", "t": 353.56}, {"sp": "", "h": "power of social media, but that&#x27;s all changing. Leading cruise lines now employ top agencies", "t": 357.84}, {"sp": "", "h": "to produce first-rate <span class=\"tr-ans\">videos<sup class=\"tr-q\">Q40</sup></span> for social media channels. It will be interesting to see whether", "t": 365.28}, {"sp": "", "h": "the cruise... That is the end of part 4. You now have", "t": 372.04}, {"sp": "", "h": "one minute to check your answers to part 4.", "t": 379.72}, {"sp": "", "h": "in the future.", "t": 402.04}, {"sp": "", "h": "That is the end of the listening test. In the IELTS test, you would now have ten minutes", "t": 432.04}, {"sp": "", "h": "to transfer your answers to the listening answer sheet.", "t": 450.92}]};
const player = document.getElementById('player');
const asrc = document.getElementById('asrc');
let curPart = 1;

function toggleTheme(){ const r=document.documentElement; const d=r.getAttribute('data-theme')==='dark'; r.setAttribute('data-theme', d?'light':'dark'); try{localStorage.setItem('theme', d?'light':'dark')}catch(e){} }
(function(){ try{ const t=localStorage.getItem('theme'); if(t) document.documentElement.setAttribute('data-theme',t);}catch(e){} })();

function badge(q){ return q.replace(/\//g, ','); }
function renderTranscript(n){
  const host=document.getElementById('trBody');
  const card=document.getElementById('trCard');
  if(!TRANSCRIPTS[n]||!TRANSCRIPTS[n].length){
    card.style.display='none';
    document.querySelector('.wrap').style.gridTemplateColumns='minmax(0,720px)';
    document.querySelector('.wrap').style.justifyContent='center';
    return;
  }
  card.style.display='';
  document.querySelector('.wrap').style.gridTemplateColumns='';
  host.innerHTML=(TRANSCRIPTS[n]||[]).map(u=>{
    let h=u.h.replace(/<sup class="tr-q">Q([^<]+)<\/sup>/g,(m,q)=>`<span class="tr-q">${badge(q)}</span>`);
    return `<div class="tr-turn" data-t="${u.t}" onclick="trSeek(${u.t})">${u.sp?`<span class="tr-sp">${u.sp}: </span>`:''}<span class="tr-tx">${h}</span></div>`;
  }).join('');
  trLast=null;
}
function toggleTr(){ const c=document.getElementById('trCard'); c.classList.toggle('open'); document.getElementById('trChev').textContent=c.classList.contains('open')?'▾':'▸'; }
function trSeek(t){ if(typeof t==='number'&&isFinite(t)){ player.currentTime=Math.max(0,t-.4); player.play().catch(()=>{}); } }
let trLast=null;
player.addEventListener('timeupdate',()=>{
  const c=document.getElementById('trCard'); if(!c.classList.contains('open'))return;
  const body=document.getElementById('trBody'); const t=player.currentTime; let act=null;
  for(const el of body.children){ if(parseFloat(el.dataset.t)<=t+.25) act=el; else break; }
  if(act!==trLast){ if(trLast)trLast.classList.remove('active'); if(act){act.classList.add('active');} trLast=act; }
});

function loadTrack(n){ asrc.src=audioTracks[n]; player.load(); }
function switchPart(n){
  curPart=n;
  document.querySelectorAll('.botnav .navbtn[data-part]').forEach(b=>b.classList.toggle('active',+b.dataset.part===n));
  document.getElementById('partTitle').textContent='Part '+n+' · '+(TITLES[n]||'');
  document.getElementById('qPane').innerHTML=PARTS[n];
  renderTranscript(n);
  loadTrack(n);
  window.scrollTo({top:0,behavior:'smooth'});
}
function setSpeed(r,btn){ player.playbackRate=r; document.querySelectorAll('.speed button').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }

/* answer widgets (referenced inline in question HTML) */
function selectMCQ(el,name){ document.querySelectorAll(`[name="${name}"]`).forEach(r=>r.closest('.mcq-option').classList.remove('selected')); el.classList.add('selected'); el.querySelector('input').checked=true; }
function toggleCheck(evt,label){ evt.preventDefault(); const cb=label.querySelector('input'); const g=label.closest('.check-group'); const max=parseInt(g.dataset.max||'99',10); if(cb.checked){cb.checked=false;label.classList.remove('selected');return;} if(g.querySelectorAll('input:checked').length>=max)return; cb.checked=true;label.classList.add('selected'); }
function updateProgress(){}

/* scoring */
const norm=s=>(s??'').toString().trim().toLowerCase().replace(/[.,!?;:'"‘’“”()]/g,'').replace(/[-_]/g,' ').replace(/\s+/g,' ').trim();
function isCorrect(u,c){ if(!u)return false; const un=norm(u); if(!un)return false; const dg=s=>s.replace(/[^\d]/g,''); const ud=dg(un);
  const tm=v=>{const vn=norm(v); if(vn===un)return true; const vd=dg(vn); if(ud&&vd&&ud.length>=3&&ud===vd)return true; return false;};
  return Array.isArray(c)?c.some(tm):tm(c); }
function getUA(){ const ua={};
  document.querySelectorAll('input[type="text"][data-q]').forEach(i=>ua[i.dataset.q]=i.value.trim());
  document.querySelectorAll('input[type="radio"]:checked').forEach(r=>{const m=r.name.match(/^q(\d+)$/); if(m){const o=r.closest('.mcq-option'); if(o)ua[m[1]]=o.querySelector('.opt-letter').textContent.trim();}});
  document.querySelectorAll('.check-group').forEach(g=>{const qs=(g.dataset.questions||'').split(',').map(s=>s.trim()).filter(Boolean); const sel=[...g.querySelectorAll('input:checked')].map(i=>i.value); qs.forEach((q,i)=>ua[q]=sel[i]||'');});
  return ua; }
/* persist across part switches: cache answers on switch */
let cache={};
function stash(){ Object.assign(cache,getUA()); }
const _sp=switchPart; switchPart=function(n){ stash(); _sp(n); restore(); };
function restore(){ document.querySelectorAll('input[type="text"][data-q]').forEach(i=>{ if(cache[i.dataset.q]!=null)i.value=cache[i.dataset.q]; });
  document.querySelectorAll('.mcq-option').forEach(o=>{ const inp=o.querySelector('input'); const m=inp.name.match(/^q(\d+)$/); if(m&&cache[m[1]]===o.querySelector('.opt-letter').textContent.trim()){o.classList.add('selected');inp.checked=true;} });
  document.querySelectorAll('.check-group').forEach(g=>{ const qs=(g.dataset.questions||'').split(',').map(s=>s.trim()); const want=qs.map(q=>cache[q]).filter(Boolean); g.querySelectorAll('.check-option').forEach(o=>{ const v=o.querySelector('input').value; if(want.includes(v)){o.classList.add('selected');o.querySelector('input').checked=true;} }); }); }
function multiPts(key,ua){ const s=multiCorrect[key]; if(!s)return 0; const acc=s.accept.map(norm); const used=new Set(); let p=0; s.inputs.map(k=>norm(ua[k]||'')).forEach(uv=>{ if(!uv)return; for(let i=0;i<acc.length;i++){ if(used.has(i))continue; if(uv===acc[i]){used.add(i);p++;break;} } }); return p; }
function score(){ stash(); const ua=cache; let c=0; const handled=new Set();
  Object.keys(multiCorrect).forEach(k=>{ c+=multiPts(k,ua); multiCorrect[k].inputs.forEach(s=>handled.add(String(s))); });
  for(let q=1;q<=40;q++){ if(handled.has(String(q)))continue; if(ua[q]&&correctAnswers[q]!==undefined&&isCorrect(ua[q],correctAnswers[q]))c++; }
  return c; }
function band(c){ if(c>=39)return'9.0';if(c>=37)return'8.5';if(c>=35)return'8.0';if(c>=32)return'7.5';if(c>=30)return'7.0';if(c>=26)return'6.5';if(c>=23)return'6.0';if(c>=18)return'5.5';if(c>=16)return'5.0';if(c>=13)return'4.5';if(c>=10)return'4.0';return'<4'; }
function submitAnswers(){ const c=score(); document.getElementById('mScore').textContent=c; document.getElementById('mBand').textContent='Estimated Band '+band(c); document.getElementById('resModal').classList.add('open'); }
function closeModal(){ document.getElementById('resModal').classList.remove('open'); }
function showReview(){ closeModal(); const ua=cache; const box=document.getElementById('revList'); let h='';
  const slotBase={}; Object.keys(multiCorrect).forEach(k=>multiCorrect[k].inputs.forEach(s=>slotBase[s]=k));
  for(let q=1;q<=40;q++){ let u=ua[q]||'',cc,ok;
    if(slotBase[q]){ const sp=multiCorrect[slotBase[q]]; cc=sp.accept.join(' / ')+' (any order)'; ok=u&&sp.accept.map(norm).includes(norm(u)); }
    else { cc=correctAnswers[q]; if(cc===undefined)continue; ok=u&&isCorrect(u,cc); cc=Array.isArray(cc)?cc[0]:cc; }
    const cls=!u?'':(ok?'correct':'incorrect');
    h+=`<div class="ans-row ${cls}"><div class="ql">Q${q}</div><div><div class="lbl">You</div><div class="yv">${u||'—'}</div></div><div><div class="lbl">Answer</div><div class="cv">${cc}</div></div></div>`; }
  box.innerHTML=h; document.getElementById('revModal').classList.add('open'); }
function resetAll(){ if(!confirm('Clear all your answers?'))return; cache={}; document.querySelectorAll('input[type="text"][data-q]').forEach(i=>i.value=''); document.querySelectorAll('.mcq-option.selected,.check-option.selected').forEach(o=>o.classList.remove('selected')); document.querySelectorAll('input:checked').forEach(i=>i.checked=false); }

switchPart(1);
</script>
