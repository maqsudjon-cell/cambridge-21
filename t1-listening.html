<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#ffffff;--panel:#fafafa;--panel2:#f4f6f5;--border:#e5e7eb;--line:#eceeed;
    --text:#0a0a0a;--muted:#6b7280;--faint:#9ca3af;
    --green:#047857;--green-d:#035c43;--green-soft:#d1fae5;--green-tint:#eafaf3;--green-line:#10b981;
    --hl:#c9f2df;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.05);--nav-h:60px;
  }
  html[data-theme="dark"],body.theme-dark{
    --bg:#0c0e0d;--panel:#141817;--panel2:#171c1a;--border:#242b28;--line:#1e2421;
    --text:#f1f5f3;--muted:#9aa6a1;--faint:#6b756f;
    --green:#10b981;--green-d:#34d399;--green-soft:#0c3b2c;--green-tint:#0e2a22;--green-line:#10b981;--hl:#0f4433;
  }
  @media(prefers-color-scheme:dark){:root:not([data-theme="light"]){
    --bg:#0c0e0d;--panel:#141817;--panel2:#171c1a;--border:#242b28;--line:#1e2421;
    --text:#f1f5f3;--muted:#9aa6a1;--faint:#6b756f;
    --green:#10b981;--green-d:#34d399;--green-soft:#0c3b2c;--green-tint:#0e2a22;--hl:#0f4433;}}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding-bottom:var(--nav-h)}
  a{color:inherit}
  .top{position:sticky;top:0;z-index:60;background:var(--bg);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;gap:14px;padding:0 20px}
  .top .back{font-size:.8rem;color:var(--muted);text-decoration:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;white-space:nowrap}
  .top .back:hover{border-color:var(--green);color:var(--green)}
  .top h1{font-family:'Source Serif 4',serif;font-size:1.02rem;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .top .tools{display:flex;gap:6px}
  .iconbtn{width:34px;height:34px;border:1px solid var(--border);background:var(--panel);border-radius:8px;cursor:pointer;font-size:.95rem;color:var(--muted);display:flex;align-items:center;justify-content:center}
  .iconbtn:hover{border-color:var(--green);color:var(--green)}
  .wrap{max-width:1320px;margin:0 auto;padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:26px}
  .col-h{font-family:'Source Serif 4',serif;font-size:1.35rem;font-weight:700;margin-bottom:4px}
  /* ---- LEFT: audio + audioscript ---- */
  .audio-box{position:sticky;top:66px;z-index:20;background:var(--bg);padding-bottom:10px}
  .player-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  audio{flex:1;min-width:220px;height:40px}
  .speed{display:inline-flex;gap:3px}
  .speed button{border:1px solid var(--border);background:var(--panel);color:var(--muted);border-radius:6px;padding:4px 9px;font:600 .72rem Inter;cursor:pointer}
  .speed button.active{background:var(--green);color:#fff;border-color:var(--green)}
  .transcript-card{margin-top:14px;border:1.5px solid var(--green-line);border-radius:var(--radius);overflow:hidden;background:var(--bg)}
  .transcript-head{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;cursor:pointer;background:var(--green-tint)}
  .transcript-head h3{font-size:.92rem;font-weight:700;color:var(--green-d)}
  .transcript-head .chev{color:var(--green);font-size:.8rem}
  .transcript-body{display:none;padding:14px 16px;max-height:none}
  .transcript-card.open .transcript-body{display:block}
  .tr-turn{padding:5px 8px;border-radius:7px;margin-bottom:3px;cursor:pointer;border-left:3px solid transparent}
  .tr-turn:hover{background:var(--panel)}
  .tr-turn.active{background:var(--green-tint);border-left-color:var(--green)}
  .tr-sp{font-weight:700;font-size:.82rem}
  .tr-tx{font-size:.92rem;line-height:1.7}
  .tr-ans{background:var(--hl);border-radius:3px;padding:1px 2px;box-decoration-break:clone;-webkit-box-decoration-break:clone}
  .tr-q{display:inline-flex;align-items:center;justify-content:center;background:var(--green);color:#fff;font-size:.66rem;font-weight:700;border-radius:5px;padding:1px 7px;margin:0 2px;vertical-align:middle;font-family:Inter;letter-spacing:.02em}
  .tr-hint{font-size:.78rem;color:var(--faint);font-style:italic;padding:2px 8px 8px}
  /* ---- RIGHT: questions ---- */
  .q-instr-top{font-size:.82rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:6px}
  .instruction{font-size:.96rem;margin-bottom:14px}
  .instruction strong{font-weight:700}
  .q-label{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:20px 0 10px}
  .section-title-r{font-family:'Source Serif 4',serif;font-size:1.15rem;font-weight:700;text-align:center;margin:6px 0 14px}
  /* notes card */
  .notes-card{border:1.5px solid var(--green-line);border-radius:var(--radius);padding:16px 18px;margin:12px 0;background:var(--panel)}
  .notes-card h4{font-family:'Source Serif 4',serif;font-size:1.02rem;font-weight:700;text-align:center;margin-bottom:12px}
  .notes-card h5{font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--green-d);margin:14px 0 6px;border-bottom:1px solid var(--green-soft);padding-bottom:4px}
  .notes-card ul{list-style:none;padding-left:4px}
  .notes-card ul li{padding:5px 0;font-size:.92rem;line-height:1.7}
  .notes-card ul li::before{content:"•";color:var(--green);margin-right:7px}
  .notes-card p{font-size:.92rem;margin:6px 0}
  /* table */
  .data-table-wrap{border:1.5px solid var(--green-line);border-radius:var(--radius);overflow:hidden;margin:12px 0}
  .data-table-title{background:var(--green);color:#fff;text-align:center;padding:10px;font-family:'Source Serif 4',serif;font-weight:700}
  .data-table{width:100%;border-collapse:collapse}
  .data-table th{background:var(--green-tint);color:var(--green-d);padding:9px 12px;text-align:left;font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--green-soft)}
  .data-table td{padding:11px 12px;font-size:.86rem;vertical-align:top;border-bottom:1px solid var(--line);border-right:1px solid var(--line)}
  .data-table td:last-child,.data-table th:last-child{border-right:none}
  .data-table td:first-child{font-weight:600}
  .data-table tr:last-child td{border-bottom:none}
  .data-table ul{list-style:none}.data-table ul li{padding:2px 0;font-size:.85rem}
  .data-table ul li::before{content:"•";color:var(--green);margin-right:5px}
  /* inputs */
  input.ans-input{border:1.5px solid var(--border);border-radius:6px;padding:5px 9px;font:400 .88rem Inter;color:var(--text);background:var(--bg);outline:none;width:130px;vertical-align:middle}
  input.ans-input:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  input.ans-input.correct{border-color:var(--green);background:var(--green-tint)}
  input.ans-input.incorrect{border-color:#dc2626;background:#fef2f2}
  html[data-theme="dark"] input.ans-input.incorrect{background:#3a1d1d}
  .qnum-prefix{display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:22px;background:var(--green);color:#fff;border-radius:6px;padding:2px 7px;font-size:.72rem;font-weight:700;margin-right:5px}
  /* mcq */
  .mcq-group{margin:12px 0 16px}
  .mcq-question{font-size:.92rem;font-weight:600;margin-bottom:8px;display:flex;gap:8px}
  .mcq-question .qnum{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--green-soft);color:var(--green-d);font-size:.72rem;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
  .mcq-options{display:flex;flex-direction:column;gap:6px}
  .mcq-option{display:flex;align-items:flex-start;gap:9px;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.88rem;background:var(--panel);transition:all .13s}
  .mcq-option:hover{border-color:var(--green);background:var(--green-tint)}
  .mcq-option input{display:none}
  .mcq-radio{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-top:1px;position:relative;display:flex;align-items:center;justify-content:center}
  .mcq-option.selected{border-color:var(--green);background:var(--green-tint)}
  .mcq-option.selected .mcq-radio{border-color:var(--green);background:var(--green)}
  .mcq-option.selected .mcq-radio::after{content:'';width:6px;height:6px;border-radius:50%;background:#fff;position:absolute}
  .opt-letter{font-weight:700;color:var(--muted);min-width:14px;font-size:.82rem}
  .mcq-option.selected .opt-letter{color:var(--green-d)}
  /* checkbox groups */
  .check-group{margin:12px 0 16px;border:1.5px solid var(--green-line);border-radius:var(--radius);padding:12px 14px;background:var(--panel)}
  .check-group-hint{font-size:.78rem;color:var(--muted);font-style:italic;margin-bottom:8px}
  .check-option{display:flex;align-items:flex-start;gap:9px;padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.88rem;background:var(--bg);margin-bottom:6px}
  .check-option:hover{border-color:var(--green);background:var(--green-tint)}
  .check-option input{display:none}
  .check-box{width:16px;height:16px;border-radius:4px;border:2px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center}
  .check-option.selected{border-color:var(--green);background:var(--green-tint)}
  .check-option.selected .check-box{border-color:var(--green);background:var(--green)}
  .check-option.selected .check-box::after{content:'✓';color:#fff;font-size:11px;font-weight:700;line-height:1}
  .check-option.selected .opt-letter{color:var(--green-d)}
  /* letter bank */
  .letter-bank{border:1.5px solid var(--green-line);border-radius:var(--radius);background:var(--panel);padding:12px 16px;margin:8px 0 14px}
  .letter-bank .row{padding:4px 0;font-size:.88rem}
  .letter-bank .row strong{color:var(--green-d);font-weight:700;margin-right:6px;min-width:18px;display:inline-block}
  /* label rows (matching) */
  .label-row{display:flex;flex-direction:column;gap:8px;margin:8px 0 12px}
  .label-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--panel)}
  .label-item label{font-size:.9rem;font-weight:500;flex:1}
  /* map */
  .map-wrap{border:1.5px solid var(--green-line);border-radius:var(--radius);padding:12px;margin:12px 0;background:var(--panel);text-align:center}
  .map-wrap img{max-width:100%;height:auto;border-radius:6px}
  .map-title{font-family:'Source Serif 4',serif;font-weight:700;margin-bottom:8px}
  /* flow chart */
  .flowchart{display:flex;flex-direction:column;align-items:center;gap:4px;margin:12px 0}
  .flow-step{border:1.5px solid var(--green-line);border-radius:var(--radius);padding:12px 16px;width:100%;max-width:420px;text-align:center;font-size:.9rem;background:var(--panel)}
  .flow-step .qnum-prefix{margin-right:6px}
  .flow-arrow{color:var(--green);font-size:1.1rem;font-weight:700}
  .example-block{border:1px dashed var(--green-line);border-radius:8px;padding:10px 14px;margin:8px 0 14px;background:var(--green-tint);font-size:.86rem}
  /* ---- bottom nav ---- */
  .botnav{position:fixed;left:0;right:0;bottom:0;height:var(--nav-h);background:var(--bg);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:6px;z-index:70;padding:0 12px;overflow-x:auto}
  .botnav .navbtn{flex:none;min-width:42px;height:38px;border:1px solid var(--border);background:var(--panel);border-radius:9px;font:600 .84rem Inter;color:var(--muted);cursor:pointer;padding:0 13px;display:inline-flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap}
  .botnav .navbtn:hover{border-color:var(--green);color:var(--green)}
  .botnav .navbtn.active{background:var(--green);color:#fff;border-color:var(--green)}
  .botnav .navbtn.wide{padding:0 16px}
  .botnav a.navbtn{text-decoration:none}
  .nav-sep{flex:none;width:1px;height:22px;background:var(--border);margin:0 3px}
  /* modal */
  .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.2s;padding:20px}
  .modal-ov.open{opacity:1;pointer-events:all}
  .modal{background:var(--bg);border:1px solid var(--border);border-radius:16px;max-width:440px;width:100%;padding:30px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
  .modal .score{font-family:'Source Serif 4',serif;font-size:3rem;font-weight:700;color:var(--green);line-height:1}
  .modal .of{color:var(--muted);font-size:.9rem;margin-bottom:12px}
  .modal .band{display:inline-block;background:var(--green-soft);color:var(--green-d);font-weight:700;padding:6px 18px;border-radius:20px;margin-bottom:18px}
  .modal button{padding:9px 20px;border-radius:9px;border:1px solid var(--border);background:var(--panel);font:600 .85rem Inter;color:var(--text);cursor:pointer;margin:4px}
  .modal button.primary{background:var(--green);color:#fff;border-color:var(--green)}
  .review-list{text-align:left;max-height:60vh;overflow:auto;margin-top:8px}
  .ans-row{display:grid;grid-template-columns:52px 1fr 1fr;gap:10px;padding:8px 11px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px;align-items:center;font-size:.85rem}
  .ans-row.correct{border-color:var(--green);background:var(--green-tint)}
  .ans-row.incorrect{border-color:#dc2626;background:#fef2f2}
  html[data-theme="dark"] .ans-row.incorrect{background:#2a1717}
  .ans-row .ql{font-family:'Source Serif 4',serif;font-weight:700;color:var(--muted)}
  .ans-row .lbl{font-size:.64rem;text-transform:uppercase;color:var(--faint);font-weight:700}
  .ans-row .yv{font-weight:600}
  .ans-row.incorrect .yv{color:#dc2626;text-decoration:line-through}
  .ans-row .cv{color:var(--green-d);font-weight:700}
  ::selection{background:var(--hl)}
  @media(max-width:900px){.wrap{grid-template-columns:1fr;gap:16px}.audio-box{position:static}.top h1{font-size:.9rem}.tr-tx{font-size:.9rem}}
</style>
</head>

<script>
const PARTS = {"1": "<h2 class=\"section-title\">Oyster Bay Sailing Club</h2>\n      \n  <p class=\"q-label\">Questions 1–6</p>\n  <p class=\"instruction\">Complete the table below.<br><strong>Write ONE WORD AND/OR A NUMBER for each answer.</strong></p>\n  <div class=\"data-table-wrap\">\n    <div class=\"data-table-title\">Oyster Bay Sailing Club Courses</div>\n    <table class=\"data-table compact\">\n      <thead><tr><th>Name of course</th><th>What you learn</th><th>Cost</th><th>Other information</th></tr></thead>\n      <tbody>\n        <tr>\n          <td>Taster day</td>\n          <td>introduction to sailing</td>\n          <td>£120 if booking one place</td>\n          <td>small groups (max <span class=\"qnum-prefix\">1</span><input type=\"text\" class=\"ans-input\" data-q=\"1\" oninput=\"updateProgress()\" style=\"width:80px\"> people)</td>\n        </tr>\n        <tr>\n          <td>Level 1</td>\n          <td><ul>\n            <li>basic theory e.g. understanding the <span class=\"qnum-prefix\">2</span><input type=\"text\" class=\"ans-input\" data-q=\"2\" oninput=\"updateProgress()\" style=\"width:110px\"> and tides</li>\n            <li>basic sailing skills including <span class=\"qnum-prefix\">3</span><input type=\"text\" class=\"ans-input\" data-q=\"3\" oninput=\"updateProgress()\" style=\"width:110px\"> information</li>\n          </ul></td>\n          <td><ul>\n            <li>£200</li>\n            <li><span class=\"qnum-prefix\">4</span><input type=\"text\" class=\"ans-input\" data-q=\"4\" oninput=\"updateProgress()\" style=\"width:110px\"> available for club members</li>\n            <li>all inclusive (plus a useful <span class=\"qnum-prefix\">5</span><input type=\"text\" class=\"ans-input\" data-q=\"5\" oninput=\"updateProgress()\" style=\"width:110px\"> )</li>\n          </ul></td>\n          <td>a <span class=\"qnum-prefix\">6</span><input type=\"text\" class=\"ans-input\" data-q=\"6\" oninput=\"updateProgress()\" style=\"width:110px\"> at the end of the course for all participants</td>\n        </tr>\n      </tbody>\n    </table>\n  </div>\n  <p class=\"q-label\" style=\"margin-top:24px\">Questions 7–10</p>\n  <p class=\"instruction\">Complete the notes below.<br><strong>Write ONE WORD ONLY for each answer.</strong></p>\n  <div class=\"notes-card\"><h4>General information</h4>\n    <ul>\n      <li>Participants must be able to swim.</li>\n      <li>Bring suitable clothing, a <span class=\"qnum-prefix\">7</span><input type=\"text\" class=\"ans-input\" data-q=\"7\" oninput=\"updateProgress()\" style=\"width:130px\"> and toiletries (e.g. shampoo).</li>\n      <li>There is a <span class=\"qnum-prefix\">8</span><input type=\"text\" class=\"ans-input\" data-q=\"8\" oninput=\"updateProgress()\" style=\"width:130px\"> at the club.</li>\n      <li>Online training <span class=\"qnum-prefix\">9</span><input type=\"text\" class=\"ans-input\" data-q=\"9\" oninput=\"updateProgress()\" style=\"width:130px\"> are recommended.</li>\n      <li><span class=\"qnum-prefix\">10</span><input type=\"text\" class=\"ans-input\" data-q=\"10\" oninput=\"updateProgress()\" style=\"width:130px\"> are available for course participants.</li>\n    </ul>\n  </div>", "2": "<h2 class=\"section-title\">Working as a Makeup Trainee</h2>\n      \n  <p class=\"q-label\">Questions 11–16</p>\n  <p class=\"instruction\">Choose the correct letter, <strong>A, B</strong> or <strong>C</strong>.</p>\n  <div class=\"mcq-group\">\n      <div class=\"mcq-question\"><span class=\"qnum\">11</span> What should trainees always expect to get when working on low budget short films?</div>\n      <div class=\"mcq-options\"><label class=\"mcq-option\" onclick=\"selectMCQ(this,'q11')\"><input type=\"radio\" name=\"q11\"><span class=\"mcq-radio\"></span><span class=\"opt-letter\">A</span> travel expenses</label>\n<label class=\"mcq-option\" onclick=\"selectMCQ(this,'q11')\"><input type=\"radio\" name=\"q11\"><span class=\"mcq-radio\"></span><span class=\"opt-letter\">B</span> a minimum wage</label>\n<label class=\"mcq-option\" onclick=\"selectMCQ(this,'q11')\"><input type=\"radio\" name=\"q11\"><span class=\"mcq-radio\"></span><span class=\"opt-letter\">C</span> meals</label></div>\n    </div>\n  <div class=\"mcq-group\">\n      <div class=\"mcq-question\"><span class=\"qnum\">12</span> According to the speaker, on big budget films trainees may get experience of</div>\n      <div class=\"mcq-options\"><label class=\"mcq-option\" onclick=\"selectMCQ(this,'q12')\"><input type=\"radio\" name=\"q12\"><span class=\"mcq-radio\"></span><span class=\"opt-letter\">A</span> makeup for special effects.</label>\n<label class=\"mcq-option\" onclick=\"selectMCQ(this,'q12')\"><input type=\"radio\" name=\"q12\"><span class=\"mcq-radio\"></span><span class=\"opt-letter\">B</span> working with different ethnicities.</label>\n<label class=\"mcq-option\" onclick=\"selectMCQ(this,'q12')\"><input type=\"radio\" name=\"q12\"><span class=\"mcq-radio\"></span><span class=\"opt-letter\">C</span> creating a variety of hair styles.</label></div>\n    </div>\n  <div class=\"mcq-group\">\n      <div class=\"mcq-question\"><span class=\"qnum\">13</span> The speaker says a problem for makeup artists is</div>\n      <div class=\"mcq-options\"><label class=\"mcq-option\" onclick=\"selectMCQ(this,'q13')\"><input type=\"radio\" name=\"q13\"><span class=\"mcq-radio\"></span><span class=\"opt-letter\">A</span> dealing with difficult directors.</label>\n<label class=\"mcq-option\" onclick=\"selectMCQ(this,'q13')\"><input type=\"radio\" name=\"q13\"><span class=\"mcq-radio\"></span><span class=\"opt-letter\">B</span> being shouted at by their supervisor.</label>\n<label class=\"mcq-option\" onclick=\"selectMCQ(this,'q13')\"><input type=\"radio\" name=\"q13\"><span class=\"mcq-radio\"></span><span class=\"opt-letter\">C</span> waiting around for hours doing nothing.</label></div>\n    </div>\n  <div class=\"mcq-group\">\n      <div class=\"mcq-question\"><span class=\"qnum\">14</span> How did the speaker feel when she met famous actors for the first time?</div>\n      <div class=\"mcq-options\"><label class=\"mcq-option\" onclick=\"selectMCQ(this,'q14')\"><input type=\"radio\" name=\"q14\"><span class=\"mcq-radio\"></span><span class=\"opt-letter\">A</span> very shy</label>\n<label class=\"mcq-option\" onclick=\"selectMCQ(this,'q14')\"><input type=\"radio\" name=\"q14\"><span class=\"mcq-radio\"></span><span class=\"opt-letter\">B</span> very proud</label>\n<label class=\"mcq-option\" onclick=\"selectMCQ(this,'q14')\"><input type=\"radio\" name=\"q14\"><span class=\"mcq-radio\"></span><span class=\"opt-letter\">C</span> very disappointed</label></div>\n    </div>\n  <div class=\"mcq-group\">\n      <div class=\"mcq-question\"><span class=\"qnum\">15</span> What advice does the speaker give about makeup kits?</div>\n      <div class=\"mcq-options\"><label class=\"mcq-option\" onclick=\"selectMCQ(this,'q15')\"><input type=\"radio\" name=\"q15\"><span class=\"mcq-radio\"></span><span class=\"opt-letter\">A</span> Always carry a basic kit with you.</label>\n<label class=\"mcq-option\" onclick=\"selectMCQ(this,'q15')\"><input type=\"radio\" name=\"q15\"><span class=\"mcq-radio\"></span><span class=\"opt-letter\">B</span> Only buy the best products for a makeup kit.</label>\n<label class=\"mcq-option\" onclick=\"selectMCQ(this,'q15')\"><input type=\"radio\" name=\"q15\"><span class=\"mcq-radio\"></span><span class=\"opt-letter\">C</span> Ask other makeup artists to check your kit.</label></div>\n    </div>\n  <div class=\"mcq-group\">\n      <div class=\"mcq-question\"><span class=\"qnum\">16</span> What advice does the speaker give about creating a portfolio?</div>\n      <div class=\"mcq-options\"><label class=\"mcq-option\" onclick=\"selectMCQ(this,'q16')\"><input type=\"radio\" name=\"q16\"><span class=\"mcq-radio\"></span><span class=\"opt-letter\">A</span> Keep print and digital photos.</label>\n<label class=\"mcq-option\" onclick=\"selectMCQ(this,'q16')\"><input type=\"radio\" name=\"q16\"><span class=\"mcq-radio\"></span><span class=\"opt-letter\">B</span> Only include a small selection of photos.</label>\n<label class=\"mcq-option\" onclick=\"selectMCQ(this,'q16')\"><input type=\"radio\" name=\"q16\"><span class=\"mcq-radio\"></span><span class=\"opt-letter\">C</span> Get permission to use photos.</label></div>\n    </div>\n  <p class=\"q-label\" style=\"margin-top:24px\">Questions 17–20</p>\n  <p class=\"instruction\">What ability is required for each of the following duties?<br>Write the correct letter, <strong>A, B</strong> or <strong>C</strong>, next to questions 17–20.</p>\n  <div class=\"letter-bank\"><div class=\"row\"><strong>A</strong> being well-organised</div>\n<div class=\"row\"><strong>B</strong> being flexible</div>\n<div class=\"row\"><strong>C</strong> working quickly</div></div>\n  <p class=\"q-label\">Duties</p>\n  <div class=\"label-row\">\n    <div class=\"label-item\"><span class=\"qnum-prefix\">17</span><label>Prepping an actor</label><input type=\"text\" class=\"ans-input\" data-q=\"17\" oninput=\"updateProgress()\" style=\"width:60px; text-transform:uppercase\" maxlength=\"1\"></div>\n    <div class=\"label-item\"><span class=\"qnum-prefix\">18</span><label>Continuity</label><input type=\"text\" class=\"ans-input\" data-q=\"18\" oninput=\"updateProgress()\" style=\"width:60px; text-transform:uppercase\" maxlength=\"1\"></div>\n    <div class=\"label-item\"><span class=\"qnum-prefix\">19</span><label>General</label><input type=\"text\" class=\"ans-input\" data-q=\"19\" oninput=\"updateProgress()\" style=\"width:60px; text-transform:uppercase\" maxlength=\"1\"></div>\n    <div class=\"label-item\"><span class=\"qnum-prefix\">20</span><label>Applying makeup</label><input type=\"text\" class=\"ans-input\" data-q=\"20\" oninput=\"updateProgress()\" style=\"width:60px; text-transform:uppercase\" maxlength=\"1\"></div>\n  </div>", "3": "<h2 class=\"section-title\">Ocean Biodiversity — Student Discussion</h2>\n      \n  <p class=\"q-label\">Questions 21 and 22</p>\n  <p class=\"instruction\">Choose <strong>TWO</strong> letters, <strong>A–E</strong>.<br>Which <strong>TWO</strong> features of the lecture on ocean biodiversity had the greatest impact on the students?</p>\n  <div class=\"check-group\" data-questions=\"21,22\" data-max=\"2\">\n<label class=\"check-option\" onclick=\"toggleCheck(event,this,'A')\"><input type=\"checkbox\" value=\"A\"><span class=\"check-box\"></span><span class=\"opt-letter\">A</span> the references to local problems</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this,'B')\"><input type=\"checkbox\" value=\"B\"><span class=\"check-box\"></span><span class=\"opt-letter\">B</span> the broad focus of the examples</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this,'C')\"><input type=\"checkbox\" value=\"C\"><span class=\"check-box\"></span><span class=\"opt-letter\">C</span> the practical suggestions for solutions</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this,'D')\"><input type=\"checkbox\" value=\"D\"><span class=\"check-box\"></span><span class=\"opt-letter\">D</span> the type of issues discussed</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this,'E')\"><input type=\"checkbox\" value=\"E\"><span class=\"check-box\"></span><span class=\"opt-letter\">E</span> the implications for government policy</label>\n  </div>\n  <p class=\"q-label\" style=\"margin-top:24px\">Questions 23 and 24</p>\n  <p class=\"instruction\">Choose <strong>TWO</strong> letters, <strong>A–E</strong>.<br>Which <strong>TWO</strong> details about the research project particularly impressed the students?</p>\n  <div class=\"check-group\" data-questions=\"23,24\" data-max=\"2\">\n<label class=\"check-option\" onclick=\"toggleCheck(event,this,'A')\"><input type=\"checkbox\" value=\"A\"><span class=\"check-box\"></span><span class=\"opt-letter\">A</span> the team's previous successes</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this,'B')\"><input type=\"checkbox\" value=\"B\"><span class=\"check-box\"></span><span class=\"opt-letter\">B</span> its wide geographical scale</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this,'C')\"><input type=\"checkbox\" value=\"C\"><span class=\"check-box\"></span><span class=\"opt-letter\">C</span> the use of new technology</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this,'D')\"><input type=\"checkbox\" value=\"D\"><span class=\"check-box\"></span><span class=\"opt-letter\">D</span> the extensive statistical evidence</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this,'E')\"><input type=\"checkbox\" value=\"E\"><span class=\"check-box\"></span><span class=\"opt-letter\">E</span> the large range of specialists involved</label>\n  </div>\n  <p class=\"q-label\" style=\"margin-top:24px\">Questions 25–30</p>\n  <p class=\"instruction\">What is the students' opinion of each of the following resources related to ocean biodiversity?<br>Choose <strong>SIX</strong> answers from the box and write the correct letter, <strong>A–H</strong>, next to questions 25–30.</p>\n  <div class=\"letter-bank\"><div class=\"row\" style=\"text-align:center\"><strong style=\"min-width:0\">Opinions</strong></div>\n<div class=\"row\"><strong>A</strong> This is aimed at a very specialist audience.</div>\n<div class=\"row\"><strong>B</strong> This is now rather outdated.</div>\n<div class=\"row\"><strong>C</strong> This was an effective description of a new danger.</div>\n<div class=\"row\"><strong>D</strong> This suggests possible ways to improve the situation.</div>\n<div class=\"row\"><strong>E</strong> This does not give a balanced account.</div>\n<div class=\"row\"><strong>F</strong> This is too predictable to be useful.</div>\n<div class=\"row\"><strong>G</strong> This gives insufficient evidence for its claims.</div>\n<div class=\"row\"><strong>H</strong> This gives a clear explanation of the problems.</div></div>\n  <p class=\"q-label\">Resources</p>\n  <div class=\"label-row\">\n    <div class=\"label-item\"><span class=\"qnum-prefix\">25</span><label>Article on invasive lionfish</label><input type=\"text\" class=\"ans-input\" data-q=\"25\" oninput=\"updateProgress()\" style=\"width:60px; text-transform:uppercase\" maxlength=\"1\"></div>\n    <div class=\"label-item\"><span class=\"qnum-prefix\">26</span><label>Documentary on microplastics</label><input type=\"text\" class=\"ans-input\" data-q=\"26\" oninput=\"updateProgress()\" style=\"width:60px; text-transform:uppercase\" maxlength=\"1\"></div>\n    <div class=\"label-item\"><span class=\"qnum-prefix\">27</span><label>Podcast on ocean pollution</label><input type=\"text\" class=\"ans-input\" data-q=\"27\" oninput=\"updateProgress()\" style=\"width:60px; text-transform:uppercase\" maxlength=\"1\"></div>\n    <div class=\"label-item\"><span class=\"qnum-prefix\">28</span><label>Book on coastal ecosystems</label><input type=\"text\" class=\"ans-input\" data-q=\"28\" oninput=\"updateProgress()\" style=\"width:60px; text-transform:uppercase\" maxlength=\"1\"></div>\n    <div class=\"label-item\"><span class=\"qnum-prefix\">29</span><label>Article on metal toxicity</label><input type=\"text\" class=\"ans-input\" data-q=\"29\" oninput=\"updateProgress()\" style=\"width:60px; text-transform:uppercase\" maxlength=\"1\"></div>\n    <div class=\"label-item\"><span class=\"qnum-prefix\">30</span><label>Podcast on floating marine cities</label><input type=\"text\" class=\"ans-input\" data-q=\"30\" oninput=\"updateProgress()\" style=\"width:60px; text-transform:uppercase\" maxlength=\"1\"></div>\n  </div>", "4": "<h2 class=\"section-title\">Sources of Rubber</h2>\n      \n  <p class=\"q-label\">Questions 31–40</p>\n  <p class=\"instruction\">Complete the notes below.<br><strong>Write ONE WORD ONLY for each answer.</strong></p>\n  <div class=\"notes-card\"><h4>Sources of rubber</h4>\n    <p>Three resources which are essential for industrial civilisation</p>\n    <ul>\n      <li><span class=\"qnum-prefix\">31</span><input type=\"text\" class=\"ans-input\" data-q=\"31\" oninput=\"updateProgress()\" style=\"width:130px\"></li>\n      <li>fossil fuels</li>\n      <li>rubber</li>\n    </ul>\n    <h5>Natural rubber</h5>\n    <p>This mainly comes from the Pará rubber tree, now cultivated in South-East Asia. The supply is limited because</p>\n    <ul>\n      <li>the growth of the tree is <span class=\"qnum-prefix\">32</span><input type=\"text\" class=\"ans-input\" data-q=\"32\" oninput=\"updateProgress()\" style=\"width:130px\"></li>\n      <li>production cannot easily be adjusted because of increasing or decreasing <span class=\"qnum-prefix\">33</span><input type=\"text\" class=\"ans-input\" data-q=\"33\" oninput=\"updateProgress()\" style=\"width:130px\"></li>\n      <li>the tree only grows near the <span class=\"qnum-prefix\">34</span><input type=\"text\" class=\"ans-input\" data-q=\"34\" oninput=\"updateProgress()\" style=\"width:130px\"></li>\n      <li>extracting the latex (rubber) is labour-intensive</li>\n      <li>it is very difficult to <span class=\"qnum-prefix\">35</span><input type=\"text\" class=\"ans-input\" data-q=\"35\" oninput=\"updateProgress()\" style=\"width:130px\"> rubber after production.</li>\n    </ul>\n    <h5>New threats include</h5>\n    <ul>\n      <li>lack of genetic diversity, leading to danger of disease caused by a <span class=\"qnum-prefix\">36</span><input type=\"text\" class=\"ans-input\" data-q=\"36\" oninput=\"updateProgress()\" style=\"width:130px\"></li>\n      <li>a shift to the cultivation of palm oil</li>\n      <li>extreme <span class=\"qnum-prefix\">37</span><input type=\"text\" class=\"ans-input\" data-q=\"37\" oninput=\"updateProgress()\" style=\"width:130px\"> events.</li>\n    </ul>\n    <h5>Synthetic rubber</h5>\n    <ul>\n      <li>may be used for engine parts and cooking utensils</li>\n      <li>is less <span class=\"qnum-prefix\">38</span><input type=\"text\" class=\"ans-input\" data-q=\"38\" oninput=\"updateProgress()\" style=\"width:130px\"> than natural rubber</li>\n      <li>is unsuitable for many purposes e.g. the tyres of aircraft.</li>\n    </ul>\n    <h5>An alternative source of natural rubber</h5>\n    <ul>\n      <li>A wild flower (a type of dandelion) has rubber in its <span class=\"qnum-prefix\">39</span><input type=\"text\" class=\"ans-input\" data-q=\"39\" oninput=\"updateProgress()\" style=\"width:130px\"> .</li>\n      <li>It can be grown in many locations and does not require good <span class=\"qnum-prefix\">40</span><input type=\"text\" class=\"ans-input\" data-q=\"40\" oninput=\"updateProgress()\" style=\"width:130px\"> .</li>\n    </ul>\n  </div>"};

const TRANSCRIPTS = {"1": [{"sp": "WOMAN", "h": "Hello, Oyster Bay Sailing Club. How can I help you?", "t": 114.88}, {"sp": "MAN", "h": "Oh hi. I'd like to find out about sailing courses for beginners.", "t": 121.16}, {"sp": "WOMAN", "h": "No problem. Is it for yourself?", "t": 126.64}, {"sp": "MAN", "h": "Yes. I had a look online but I'm not sure which course would be best.", "t": 127.14}, {"sp": "WOMAN", "h": "OK. Well you might be interested in our Taster Days?", "t": 134.2}, {"sp": "MAN", "h": "Possibly.", "t": 139.32}, {"sp": "WOMAN", "h": "So these are for people who've never sailed before – it's basically an introduction to sailing to find out whether you enjoy it and want to carry on with it.", "t": 140.32}, {"sp": "MAN", "h": "And how much is that?", "t": 150.48}, {"sp": "WOMAN", "h": "It's £120 for the day – but it's reduced to £110 each if there are two of you.", "t": 152.48}, {"sp": "MAN", "h": "No, it would just be me.", "t": 159.72}, {"sp": "WOMAN", "h": "Oh that's fine. You'd be in a small group, usually about eight people but no more than <span class=\"tr-ans\">ten<sup class=\"tr-q\">Q1</sup></span> – and everyone's always very friendly.", "t": 161.64}, {"sp": "MAN", "h": "Uh huh. And are there any other suitable courses?", "t": 171.4}, {"sp": "WOMAN", "h": "The other option is the Level 1 course. These are two-day weekend courses and we run those all year round.", "t": 176.16}, {"sp": "MAN", "h": "OK. And what do you learn on that course?", "t": 184.72}, {"sp": "WOMAN", "h": "This is a mix of theory and practical skills. So you learn about things like the <span class=\"tr-ans\">weather<sup class=\"tr-q\">Q2</sup></span>, which is obviously really important and also the tides, as well as learning basic sailing skills. You go out into the harbour in special training dinghies for beginners, two people in each dinghy and an instructor. He or she will make sure you understand everything you need to know about <span class=\"tr-ans\">safety<sup class=\"tr-q\">Q3</sup></span>.", "t": 188.84}, {"sp": "MAN", "h": "It sounds like hard work!", "t": 219.28}, {"sp": "WOMAN", "h": "Yes, but you'll have a lot of fun too.", "t": 221.12}, {"sp": "MAN", "h": "And the cost of that one is…?", "t": 221.62}, {"sp": "WOMAN", "h": "£200. But it's a bit cheaper if you decide to join the club. There's a <span class=\"tr-ans\">discount<sup class=\"tr-q\">Q4</sup></span> for members.", "t": 222.12}, {"sp": "MAN", "h": "Well, I'm not sure about that yet.", "t": 234.52}, {"sp": "WOMAN", "h": "You've got plenty of time to decide.", "t": 237.32}, {"sp": "MAN", "h": "And does the cost include everything?", "t": 237.82}, {"sp": "WOMAN", "h": "Yes, everything's included and you also get a really good <span class=\"tr-ans\">dictionary<sup class=\"tr-q\">Q5</sup></span> explaining all the sailing terminology. A lot of people struggle with this at first. It's got lots of pictures, so I'm sure you'd find it really helpful. And on completion of the course you get a <span class=\"tr-ans\">certificate<sup class=\"tr-q\">Q6</sup></span>. Then you're ready to move on to the Level 2 course.", "t": 242.68}, {"sp": "MAN", "h": "Sounds good.", "t": 267.8}, {"sp": "WOMAN", "h": "I think that's all the info you need for now. Just a couple of general things. For example, it's really important that you know how to swim.", "t": 311.28}, {"sp": "MAN", "h": "Yes, I'm pretty confident in the water.", "t": 322.28}, {"sp": "WOMAN", "h": "Great. The other thing I should tell you is that we provide wetsuits and life jackets but you need to bring swimming trunks and some old trainers.", "t": 324.92}, {"sp": "MAN", "h": "And a <span class=\"tr-ans\">towel<sup class=\"tr-q\">Q7</sup></span>?", "t": 335.72}, {"sp": "WOMAN", "h": "Yes definitely. And you might want to bring your own toiletries, things like shampoo.", "t": 336.22}, {"sp": "MAN", "h": "OK. What about food and drink? Do I need to bring that or is there a <span class=\"tr-ans\">café<sup class=\"tr-q\">Q8</sup></span> at the club?", "t": 342.48}, {"sp": "WOMAN", "h": "Yes, you can get sandwiches, cakes and snacks there. The food's pretty reasonable.", "t": 349.48}, {"sp": "MAN", "h": "OK good. Well I think I'm interested in the Level 1 course. But I know absolutely nothing about sailing so is there anything I can do to prepare myself a bit?", "t": 355.48}, {"sp": "WOMAN", "h": "I recommend you watch some <span class=\"tr-ans\">videos<sup class=\"tr-q\">Q9</sup></span> we use for training. They're available online. I can send you the link. They'll give you an idea of what to expect.", "t": 367.52}, {"sp": "MAN", "h": "Perfect, thanks. That would be very helpful. Oh and just one other thing – I'll be cycling to the club and will need somewhere to put valuables. I'm just wondering if there are <span class=\"tr-ans\">lockers<sup class=\"tr-q\">Q10</sup></span> for people to use?", "t": 378.0}, {"sp": "WOMAN", "h": "Yes, there are plenty in the changing rooms.", "t": 388.76}, {"sp": "MAN", "h": "Great. OK well could you book me onto…", "t": 389.26}], "2": [{"sp": "MAN", "h": "Hello and welcome to the film making podcast. In this week's episode, Claire Lemarre talks to us about how to become a makeup artist. Claire's been working as a makeup artist in the film industry for over 20 years and has lots of useful advice about how to get started.", "t": 68.0}, {"sp": "WOMAN", "h": "Thanks Ian. Well, before you can become a makeup artist on films you have to spend about 2 years working as a makeup trainee.", "t": 95.0}, {"sp": "", "h": "A good place to get your first job would be on a low budget short film. Of course, this means that you'll be working for free. But it's often worth it for the experience. <span class=\"tr-ans\">Make sure your transport costs are covered<sup class=\"tr-q\">Q11</sup></span> – and remember, there's very unlikely to be any catering provided, so bring plenty of food.", "t": 105.0}, {"sp": "", "h": "If you're lucky, you might start out on a big budget film where you'll get the most useful experience. On productions like this, makeup and hair styling are separate departments – so you won't need to bring your curling tongs! <span class=\"tr-ans\">But you're likely to get the opportunity to work with a range of age groups, as well as different ethnicities<sup class=\"tr-q\">Q12</sup></span>. Doing makeup for special effects is highly specialised, so don't expect to be offered any practical experience in that.", "t": 128.0}, {"sp": "", "h": "One problem with working in the makeup department is that it's a high-pressure environment. There are very few times when you'll be bored or have nothing to do. It can be stressful but you'll see that the top makeup artists are very professional – <span class=\"tr-ans\">even when they're having to work with directors who are impatient, or unhappy<sup class=\"tr-q\">Q13</sup></span> with the makeup artist's work. Follow your supervisor's lead and try to remain calm at all times.", "t": 161.0}, {"sp": "", "h": "I've worked with many very famous actors over the years. <span class=\"tr-ans\">At first, I found it overwhelming and could hardly speak, I was so in awe<sup class=\"tr-q\">Q14</sup></span>. That's preferable, by the way, to becoming too excited and asking for selfies. Now meeting the talent is just a normal part of the job and to be honest most actors don't look that special without all the makeup!", "t": 191.0}, {"sp": "", "h": "<span class=\"tr-ans\">Every makeup trainee will need a makeup kit, which they'll be expected to have with them at all times. Just the essentials<sup class=\"tr-q\">Q15</sup></span> will do for the kinds of tasks you'll be given – it won't be anything complicated. It's worth looking at what the other makeup artists have in their kits – but whatever you do, don't borrow anything without asking first.", "t": 216.0}, {"sp": "", "h": "It's very important to build your portfolio. You should take photos of all the work you do and ideally show the different stages of makeup application if you can. <span class=\"tr-ans\">But remember you'll need to get approval<sup class=\"tr-q\">Q16</sup></span> from the makeup designer in charge of the department. As you'll be sending your portfolio digitally, you won't need to get photos printed.", "t": 239.0}, {"sp": "WOMAN", "h": "So what does a makeup trainee actually do? You need to think about whether you're the right kind of person to do the job and whether you'd enjoy it. So, to give you some idea, here are some of the things you might be required to do.", "t": 311.0}, {"sp": "", "h": "You may be asked to help prep an actor ready for makeup. Some actors will arrive having already cleansed and moisturized their skin. But sometimes you'll need to step in and <span class=\"tr-ans\">get this done without wasting any time<sup class=\"tr-q\">Q17</sup></span>, otherwise the makeup artist will get behind schedule.", "t": 327.0}, {"sp": "", "h": "Trainees play a useful role in continuity. It will be your responsibility to take photos, log them digitally and print out a hard copy to put in each actor's file. <span class=\"tr-ans\">This information needs to be kept in good order<sup class=\"tr-q\">Q18</sup></span> as a reshoot can mean replicating makeup months later.", "t": 347.0}, {"sp": "", "h": "General duties mean doing anything from getting the teas and coffees to putting on a wash. <span class=\"tr-ans\">Having a positive attitude and being willing to do whatever is asked<sup class=\"tr-q\">Q19</sup></span> of you will help you get your next film job.", "t": 368.0}, {"sp": "", "h": "You won't be asked to apply makeup to any of the principal cast, only the extras. If there are dozens of extras involved <span class=\"tr-ans\">you'll need to keep up a swift pace and not spend too long on each person<sup class=\"tr-q\">Q20</sup></span>. It takes quite a lot of confidence to be able to do this well.", "t": 383.0}, {"sp": "", "h": "OK now about terms and conditions…", "t": 400.0}], "3": [{"sp": "PHIL", "h": "That lecture from the visiting speaker yesterday was good, wasn't it?", "t": 58.08}, {"sp": "LUCY", "h": "Yeah. I learned a lot from her about ocean biodiversity. I've already done some reading on it, and I did an assignment on some of the problems associated with it last year, but <span class=\"tr-ans\">I especially liked the way her lecture focused on more long-term issues<sup class=\"tr-q\">Q21/22</sup></span>.", "t": 62.12}, {"sp": "PHIL", "h": "Yes, things that aren't currently receiving widespread attention but are likely to be important in the future. That impressed me too. It wasn't exactly a feel-good conclusion because it's hard to see any real solution for a lot of the problems.", "t": 79.4}, {"sp": "LUCY", "h": "No, though she did point to where policy changes could be made to protect our marine and coastal environments.", "t": 95.96}, {"sp": "PHIL", "h": "Mm. But that's just at a national level. <span class=\"tr-ans\">The examples she gave were at a more global level<sup class=\"tr-q\">Q21/22</sup></span>, and they really made it clear to me just how wide-ranging the threats to ocean biodiversity are.", "t": 103.56}, {"sp": "LUCY", "h": "Yes, me too.", "t": 116.72}, {"sp": "PHIL", "h": "The research project she described was impressive, wasn't it? I'd have thought it was quite unusual to have <span class=\"tr-ans\">so many experts working together<sup class=\"tr-q\">Q23/24</sup></span>.", "t": 117.88}, {"sp": "LUCY", "h": "<span class=\"tr-ans\">Yeah, and from such different backgrounds. Must have been a really exciting team to work with<sup class=\"tr-q\">Q23/24</sup></span>. I'd heard of a couple of them before – they were involved in research way back in 2009 warning about the dangers of ocean pollution.", "t": 126.52}, {"sp": "PHIL", "h": "But now people are much more aware of that, aren't they?", "t": 142.16}, {"sp": "LUCY", "h": "I suppose so.", "t": 145.44}, {"sp": "PHIL", "h": "Another thing about the research is that the team members came from all round the world. Though I suppose that's not unusual nowadays, now everyone can work remotely.", "t": 146.92}, {"sp": "LUCY", "h": "Right. I liked the way she didn't bombard us with figures – I mean, they were available, but she focused more on the general points they indicated.", "t": 157.52}, {"sp": "PHIL", "h": "Mm. <span class=\"tr-ans\">And the description of improvements in systems used for tracking marine animals and things like robots were really interesting<sup class=\"tr-q\">Q23/24</sup></span>.", "t": 163.92}, {"sp": "LUCY", "h": "<span class=\"tr-ans\">Yes, and her description of how robotics<sup class=\"tr-q\">Q23/24</sup></span> can be used to investigate threats to biodiversity.", "t": 177.12}, {"sp": "PHIL", "h": "Absolutely.", "t": 184.44}, {"sp": "PHIL", "h": "While you're here, can we talk about the list of resources we have to evaluate for the seminar tomorrow? I've had a look at them all, but it's been a bit of a rush.", "t": 219.0}, {"sp": "LUCY", "h": "Yeah. What did you think of that article on invasive lionfish? The one claiming they were expanding their habitat throughout the Mediterranean Sea.", "t": 249.92}, {"sp": "PHIL", "h": "Well, the writer went on about how dangerous they were in environmental terms, which is probably true, but <span class=\"tr-ans\">he didn't really provide much information<sup class=\"tr-q\">Q25</sup></span> to explain why.", "t": 259.8}, {"sp": "LUCY", "h": "I know what you mean.", "t": 271.48}, {"sp": "PHIL", "h": "I watched the documentary on microplastics, at least I started to, but then I found it was made ten years ago so I gave up.", "t": 273.24}, {"sp": "LUCY", "h": "I watched to the end but you're right, <span class=\"tr-ans\">it was showing its age<sup class=\"tr-q\">Q26</sup></span>. People had hardly heard of microplastics then, whereas now everyone knows about them and how dangerous they are.", "t": 282.56}, {"sp": "PHIL", "h": "Yeah. Did you listen to the podcast on ocean pollution?", "t": 294.16}, {"sp": "LUCY", "h": "Mm. I didn't get anything out of it though. Most of it was stating the obvious.", "t": 298.24}, {"sp": "PHIL", "h": "Yes, it mentioned pesticides and plastic and things, and it clearly made the point that they were a bad thing, but <span class=\"tr-ans\">everybody knows that anyway<sup class=\"tr-q\">Q27</sup></span>. Did you read that book on coastal ecosystems?", "t": 303.2}, {"sp": "LUCY", "h": "The one by John Harper? Yes, I found it hard going at first, it went into a lot of detail about things like the effects of offshore windfarms and fish farms, but actually I ended up with a much better understanding of the issues.", "t": 317.48}, {"sp": "PHIL", "h": "Yes, I agree and <span class=\"tr-ans\">I thought it was a well-written summary of those<sup class=\"tr-q\">Q28</sup></span>. And the diagrams helped a lot too.", "t": 333.2}, {"sp": "LUCY", "h": "<span class=\"tr-ans\">The article on metal toxicity was way above my head, I didn't know anything about how metals from industrial emissions react in the ocean<sup class=\"tr-q\">Q29</sup></span>… and I still don't understand it.", "t": 340.72}, {"sp": "PHIL", "h": "I gave up reading after the first chapter – I just couldn't follow it.", "t": 353.48}, {"sp": "LUCY", "h": "That podcast on floating marine cities was interesting, <span class=\"tr-ans\">though it presented a rather one-sided picture<sup class=\"tr-q\">Q30</sup></span>, I thought.", "t": 358.36}, {"sp": "PHIL", "h": "Yes, it focused on how this would benefit people and ignored the effects on the environment.", "t": 366.36}, {"sp": "LUCY", "h": "But anyway, shall we …", "t": 372.92}], "4": [{"sp": "LECTURER", "h": "Much of the world now lives in an industrial civilisation. But this has only become possible because we have the necessary natural resources. There are three types of natural resource without which industry could not exist. One of these is <span class=\"tr-ans\">metal<sup class=\"tr-q\">Q31</sup></span> – without that we'd have no machines and no transportation. Another is fossil fuels, which we need to power those machines. But there's a third resource that's essential to connect the different parts of a machine together with belts and pipes and shock absorbers, and that is rubber. It's now used in over 40,000 products, from waterproof footwear to surgical gloves.", "t": 60.0}, {"sp": "", "h": "At present, we have two types of rubber in common use. One is natural rubber, which nearly all comes from the Pará rubber tree. This was originally native to Brazil, but is now cultivated on plantations in South-East Asia. Recently, however, concern's been growing that supplies may soon be insufficient for the world's needs. So what exactly is limiting the supply of natural rubber?", "t": 119.36}, {"sp": "", "h": "Well, for one thing, rubber trees don't just spring up overnight. It can take eight to ten years for a tree to start producing rubber, so cultivating them's a <span class=\"tr-ans\">slow<sup class=\"tr-q\">Q32</sup></span> process. And this leads to another problem. With most crops, farmers don't have to think very far ahead, so they can easily change what crop they produce, or how much of a crop they produce, if they find the <span class=\"tr-ans\">demand<sup class=\"tr-q\">Q33</sup></span> for that crop is rising or falling. But if you have to plant eight or ten years ahead, that's much harder. And also the rubber tree's very choosy about where it grows. It needs the right temperature, the right amount of rainfall, and the right altitude – not too high and not too low. The result is that it can't be grown in the northern or southern parts of the globe, only around the <span class=\"tr-ans\">equator<sup class=\"tr-q\">Q34</sup></span>. Another problem is that the rubber is basically extracted in the same way as it's been done for hundreds of years, and that's by hand, by making small cuts in the trunk of the tree, and putting a little cup there to catch the latex, as the rubber is called. It's very labour-intensive. And it's not just the initial production that's limiting supplies. With other resources such as water and glass, when we've finished using them we can <span class=\"tr-ans\">recycle<sup class=\"tr-q\">Q35</sup></span> them, but although this is also possible with rubber, it's very difficult, so that also reduces the amount we have available.", "t": 151.84}, {"sp": "", "h": "And in the last few years, there have been new threats to the supply of natural rubber. One problem is linked to the fact that nearly all the rubber trees in South-East Asia are descended from just a small number of seeds brought from Brazil in the nineteenth century. This means that there's very little genetic diversity among the trees, which in turn makes them very vulnerable to disease. The most dangerous threat is a <span class=\"tr-ans\">fungus<sup class=\"tr-q\">Q36</sup></span>, which destroyed large numbers of rubber trees in Brazil, and which could cause devastation to plantations worldwide. Another problem is that farmers in South-East Asia are increasingly turning to the cultivation of palm oil, which is easier and more profitable for them. And finally, in recent years South-East Asia, like other parts of the world, has been repeatedly hit by extreme types of <span class=\"tr-ans\">weather<sup class=\"tr-q\">Q37</sup></span>, and this looks likely to continue in the future.", "t": 270.96}, {"sp": "", "h": "However, as well as using natural rubber, it's also possible to make rubber synthetically. This works very well for some purposes, for example, making engine parts, or silicone pots and pans used for cooking. But compared with natural rubber, it's not anything like as <span class=\"tr-ans\">strong<sup class=\"tr-q\">Q38</sup></span>, and this means it can't replace natural rubber in other products. For example, while a mixture of natural rubber and synthetic rubber works well in car tyres, only natural rubber can stand up to the extreme speeds of aircraft tyres during take-off and landing.", "t": 347.2}, {"sp": "", "h": "So for some time, scientists have been looking for alternative sources of natural rubber. One that's been known about for some time seems initially to be a rather unlikely source. It's a wild plant with yellow flowers that we normally regard as a weed when we see it in our gardens. But when it's pulled up and its <span class=\"tr-ans\">roots<sup class=\"tr-q\">Q39</sup></span> cut open, they're found to contain rubber.", "t": 394.48}, {"sp": "", "h": "Now, compared to the rubber tree, dandelions produce relatively small amounts of rubber, but unlike rubber trees, they're very adaptable. They'll grow in all sorts of places, and they don't need rich <span class=\"tr-ans\">soil<sup class=\"tr-q\">Q40</sup></span>.", "t": 424.48}, {"sp": "", "h": "So, at present, there are several projects underway investigating the possibility of using dandelions as a source of rubber. Another possibility is a desert shrub grown in Mexico and Texas, which is also…", "t": 439.12}]};
const player = document.getElementById('player');
const asrc = document.getElementById('asrc');
let curPart = 1;

function toggleTheme(){ const r=document.documentElement; const d=r.getAttribute('data-theme')==='dark'; r.setAttribute('data-theme', d?'light':'dark'); try{localStorage.setItem('theme', d?'light':'dark')}catch(e){} }
(function(){ try{ const t=localStorage.getItem('theme'); if(t) document.documentElement.setAttribute('data-theme',t);}catch(e){} })();

function badge(q){ return q.replace(/\//g, ','); }
function renderTranscript(n){
  const host=document.getElementById('trBody');
  const card=document.getElementById('trCard');
  if(!TRANSCRIPTS[n]||!TRANSCRIPTS[n].length){
    card.style.display='none';
    document.querySelector('.wrap').style.gridTemplateColumns='minmax(0,720px)';
    document.querySelector('.wrap').style.justifyContent='center';
    return;
  }
  card.style.display='';
  document.querySelector('.wrap').style.gridTemplateColumns='';
  host.innerHTML=(TRANSCRIPTS[n]||[]).map(u=>{
    let h=u.h.replace(/<sup class="tr-q">Q([^<]+)<\/sup>/g,(m,q)=>`<span class="tr-q">${badge(q)}</span>`);
    return `<div class="tr-turn" data-t="${u.t}" onclick="trSeek(${u.t})">${u.sp?`<span class="tr-sp">${u.sp}: </span>`:''}<span class="tr-tx">${h}</span></div>`;
  }).join('');
  trLast=null;
}
function toggleTr(){ const c=document.getElementById('trCard'); c.classList.toggle('open'); document.getElementById('trChev').textContent=c.classList.contains('open')?'▾':'▸'; }
function trSeek(t){ if(typeof t==='number'&&isFinite(t)){ player.currentTime=Math.max(0,t-.4); player.play().catch(()=>{}); } }
let trLast=null;
player.addEventListener('timeupdate',()=>{
  const c=document.getElementById('trCard'); if(!c.classList.contains('open'))return;
  const body=document.getElementById('trBody'); const t=player.currentTime; let act=null;
  for(const el of body.children){ if(parseFloat(el.dataset.t)<=t+.25) act=el; else break; }
  if(act!==trLast){ if(trLast)trLast.classList.remove('active'); if(act){act.classList.add('active');} trLast=act; }
});

function loadTrack(n){ asrc.src=audioTracks[n]; player.load(); }
function switchPart(n){
  curPart=n;
  document.querySelectorAll('.botnav .navbtn[data-part]').forEach(b=>b.classList.toggle('active',+b.dataset.part===n));
  document.getElementById('partTitle').textContent='Part '+n+' · '+(TITLES[n]||'');
  document.getElementById('qPane').innerHTML=PARTS[n];
  renderTranscript(n);
  loadTrack(n);
  window.scrollTo({top:0,behavior:'smooth'});
}
function setSpeed(r,btn){ player.playbackRate=r; document.querySelectorAll('.speed button').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }

/* answer widgets (referenced inline in question HTML) */
function selectMCQ(el,name){ document.querySelectorAll(`[name="${name}"]`).forEach(r=>r.closest('.mcq-option').classList.remove('selected')); el.classList.add('selected'); el.querySelector('input').checked=true; }
function toggleCheck(evt,label){ evt.preventDefault(); const cb=label.querySelector('input'); const g=label.closest('.check-group'); const max=parseInt(g.dataset.max||'99',10); if(cb.checked){cb.checked=false;label.classList.remove('selected');return;} if(g.querySelectorAll('input:checked').length>=max)return; cb.checked=true;label.classList.add('selected'); }
function updateProgress(){}

/* scoring */
const norm=s=>(s??'').toString().trim().toLowerCase().replace(/[.,!?;:'"‘’“”()]/g,'').replace(/[-_]/g,' ').replace(/\s+/g,' ').trim();
function isCorrect(u,c){ if(!u)return false; const un=norm(u); if(!un)return false; const dg=s=>s.replace(/[^\d]/g,''); const ud=dg(un);
  const tm=v=>{const vn=norm(v); if(vn===un)return true; const vd=dg(vn); if(ud&&vd&&ud.length>=3&&ud===vd)return true; return false;};
  return Array.isArray(c)?c.some(tm):tm(c); }
function getUA(){ const ua={};
  document.querySelectorAll('input[type="text"][data-q]').forEach(i=>ua[i.dataset.q]=i.value.trim());
  document.querySelectorAll('input[type="radio"]:checked').forEach(r=>{const m=r.name.match(/^q(\d+)$/); if(m){const o=r.closest('.mcq-option'); if(o)ua[m[1]]=o.querySelector('.opt-letter').textContent.trim();}});
  document.querySelectorAll('.check-group').forEach(g=>{const qs=(g.dataset.questions||'').split(',').map(s=>s.trim()).filter(Boolean); const sel=[...g.querySelectorAll('input:checked')].map(i=>i.value); qs.forEach((q,i)=>ua[q]=sel[i]||'');});
  return ua; }
/* persist across part switches: cache answers on switch */
let cache={};
function stash(){ Object.assign(cache,getUA()); }
const _sp=switchPart; switchPart=function(n){ stash(); _sp(n); restore(); };
function restore(){ document.querySelectorAll('input[type="text"][data-q]').forEach(i=>{ if(cache[i.dataset.q]!=null)i.value=cache[i.dataset.q]; });
  document.querySelectorAll('.mcq-option').forEach(o=>{ const inp=o.querySelector('input'); const m=inp.name.match(/^q(\d+)$/); if(m&&cache[m[1]]===o.querySelector('.opt-letter').textContent.trim()){o.classList.add('selected');inp.checked=true;} });
  document.querySelectorAll('.check-group').forEach(g=>{ const qs=(g.dataset.questions||'').split(',').map(s=>s.trim()); const want=qs.map(q=>cache[q]).filter(Boolean); g.querySelectorAll('.check-option').forEach(o=>{ const v=o.querySelector('input').value; if(want.includes(v)){o.classList.add('selected');o.querySelector('input').checked=true;} }); }); }
function multiPts(key,ua){ const s=multiCorrect[key]; if(!s)return 0; const acc=s.accept.map(norm); const used=new Set(); let p=0; s.inputs.map(k=>norm(ua[k]||'')).forEach(uv=>{ if(!uv)return; for(let i=0;i<acc.length;i++){ if(used.has(i))continue; if(uv===acc[i]){used.add(i);p++;break;} } }); return p; }
function score(){ stash(); const ua=cache; let c=0; const handled=new Set();
  Object.keys(multiCorrect).forEach(k=>{ c+=multiPts(k,ua); multiCorrect[k].inputs.forEach(s=>handled.add(String(s))); });
  for(let q=1;q<=40;q++){ if(handled.has(String(q)))continue; if(ua[q]&&correctAnswers[q]!==undefined&&isCorrect(ua[q],correctAnswers[q]))c++; }
  return c; }
function band(c){ if(c>=39)return'9.0';if(c>=37)return'8.5';if(c>=35)return'8.0';if(c>=32)return'7.5';if(c>=30)return'7.0';if(c>=26)return'6.5';if(c>=23)return'6.0';if(c>=18)return'5.5';if(c>=16)return'5.0';if(c>=13)return'4.5';if(c>=10)return'4.0';return'<4'; }
function submitAnswers(){ const c=score(); document.getElementById('mScore').textContent=c; document.getElementById('mBand').textContent='Estimated Band '+band(c); document.getElementById('resModal').classList.add('open'); }
function closeModal(){ document.getElementById('resModal').classList.remove('open'); }
function showReview(){ closeModal(); const ua=cache; const box=document.getElementById('revList'); let h='';
  const slotBase={}; Object.keys(multiCorrect).forEach(k=>multiCorrect[k].inputs.forEach(s=>slotBase[s]=k));
  for(let q=1;q<=40;q++){ let u=ua[q]||'',cc,ok;
    if(slotBase[q]){ const sp=multiCorrect[slotBase[q]]; cc=sp.accept.join(' / ')+' (any order)'; ok=u&&sp.accept.map(norm).includes(norm(u)); }
    else { cc=correctAnswers[q]; if(cc===undefined)continue; ok=u&&isCorrect(u,cc); cc=Array.isArray(cc)?cc[0]:cc; }
    const cls=!u?'':(ok?'correct':'incorrect');
    h+=`<div class="ans-row ${cls}"><div class="ql">Q${q}</div><div><div class="lbl">You</div><div class="yv">${u||'—'}</div></div><div><div class="lbl">Answer</div><div class="cv">${cc}</div></div></div>`; }
  box.innerHTML=h; document.getElementById('revModal').classList.add('open'); }
function resetAll(){ if(!confirm('Clear all your answers?'))return; cache={}; document.querySelectorAll('input[type="text"][data-q]').forEach(i=>i.value=''); document.querySelectorAll('.mcq-option.selected,.check-option.selected').forEach(o=>o.classList.remove('selected')); document.querySelectorAll('input:checked').forEach(i=>i.checked=false); }
