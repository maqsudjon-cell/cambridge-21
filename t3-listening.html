<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Cambridge 21 Listening – Test 3 | pangea8.com</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#ffffff;--panel:#fafafa;--panel2:#f4f6f5;--border:#e5e7eb;--line:#eceeed;
    --text:#0a0a0a;--muted:#6b7280;--faint:#9ca3af;
    --green:#047857;--green-d:#035c43;--green-soft:#d1fae5;--green-tint:#eafaf3;--green-line:#10b981;
    --hl:#c9f2df;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.05);--nav-h:60px;
  }
  html[data-theme="dark"],body.theme-dark{
    --bg:#0c0e0d;--panel:#141817;--panel2:#171c1a;--border:#242b28;--line:#1e2421;
    --text:#f1f5f3;--muted:#9aa6a1;--faint:#6b756f;
    --green:#10b981;--green-d:#34d399;--green-soft:#0c3b2c;--green-tint:#0e2a22;--green-line:#10b981;--hl:#0f4433;
  }
  @media(prefers-color-scheme:dark){:root:not([data-theme="light"]){
    --bg:#0c0e0d;--panel:#141817;--panel2:#171c1a;--border:#242b28;--line:#1e2421;
    --text:#f1f5f3;--muted:#9aa6a1;--faint:#6b756f;
    --green:#10b981;--green-d:#34d399;--green-soft:#0c3b2c;--green-tint:#0e2a22;--hl:#0f4433;}}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding-bottom:var(--nav-h)}
  a{color:inherit}
  .top{position:sticky;top:0;z-index:60;background:var(--bg);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;gap:14px;padding:0 20px}
  .top .back{font-size:.8rem;color:var(--muted);text-decoration:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;white-space:nowrap}
  .top .back:hover{border-color:var(--green);color:var(--green)}
  .top h1{font-family:'Source Serif 4',serif;font-size:1.02rem;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .top .tools{display:flex;gap:6px}
  .iconbtn{width:34px;height:34px;border:1px solid var(--border);background:var(--panel);border-radius:8px;cursor:pointer;font-size:.95rem;color:var(--muted);display:flex;align-items:center;justify-content:center}
  .iconbtn:hover{border-color:var(--green);color:var(--green)}
  .wrap{max-width:1320px;margin:0 auto;padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:26px}
  .col-h{font-family:'Source Serif 4',serif;font-size:1.35rem;font-weight:700;margin-bottom:4px}
  /* ---- LEFT: audio + audioscript ---- */
  .audio-box{position:sticky;top:66px;z-index:20;background:var(--bg);padding-bottom:10px}
  .player-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  audio{flex:1;min-width:220px;height:40px}
  .speed{display:inline-flex;gap:3px}
  .speed button{border:1px solid var(--border);background:var(--panel);color:var(--muted);border-radius:6px;padding:4px 9px;font:600 .72rem Inter;cursor:pointer}
  .speed button.active{background:var(--green);color:#fff;border-color:var(--green)}
  .transcript-card{margin-top:14px;border:1.5px solid var(--green-line);border-radius:var(--radius);overflow:hidden;background:var(--bg)}
  .transcript-head{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;cursor:pointer;background:var(--green-tint)}
  .transcript-head h3{font-size:.92rem;font-weight:700;color:var(--green-d)}
  .transcript-head .chev{color:var(--green);font-size:.8rem}
  .transcript-body{display:none;padding:14px 16px;max-height:none}
  .transcript-card.open .transcript-body{display:block}
  .tr-turn{padding:5px 8px;border-radius:7px;margin-bottom:3px;cursor:pointer;border-left:3px solid transparent}
  .tr-turn:hover{background:var(--panel)}
  .tr-turn.active{background:var(--green-tint);border-left-color:var(--green)}
  .tr-sp{font-weight:700;font-size:.82rem}
  .tr-tx{font-size:.92rem;line-height:1.7}
  .tr-ans{background:var(--hl);border-radius:3px;padding:1px 2px;box-decoration-break:clone;-webkit-box-decoration-break:clone}
  .tr-q{display:inline-flex;align-items:center;justify-content:center;background:var(--green);color:#fff;font-size:.66rem;font-weight:700;border-radius:5px;padding:1px 7px;margin:0 2px;vertical-align:middle;font-family:Inter;letter-spacing:.02em}
  .tr-hint{font-size:.78rem;color:var(--faint);font-style:italic;padding:2px 8px 8px}
  /* ---- RIGHT: questions ---- */
  .q-instr-top{font-size:.82rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:6px}
  .instruction{font-size:.96rem;margin-bottom:14px}
  .instruction strong{font-weight:700}
  .q-label{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:20px 0 10px}
  .section-title-r{font-family:'Source Serif 4',serif;font-size:1.15rem;font-weight:700;text-align:center;margin:6px 0 14px}
  /* notes card */
  .notes-card{border:1.5px solid var(--green-line);border-radius:var(--radius);padding:16px 18px;margin:12px 0;background:var(--panel)}
  .notes-card h4{font-family:'Source Serif 4',serif;font-size:1.02rem;font-weight:700;text-align:center;margin-bottom:12px}
  .notes-card h5{font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--green-d);margin:14px 0 6px;border-bottom:1px solid var(--green-soft);padding-bottom:4px}
  .notes-card ul{list-style:none;padding-left:4px}
  .notes-card ul li{padding:5px 0;font-size:.92rem;line-height:1.7}
  .notes-card ul li::before{content:"•";color:var(--green);margin-right:7px}
  .notes-card p{font-size:.92rem;margin:6px 0}
  /* table */
  .data-table-wrap{border:1.5px solid var(--green-line);border-radius:var(--radius);overflow:hidden;margin:12px 0}
  .data-table-title{background:var(--green);color:#fff;text-align:center;padding:10px;font-family:'Source Serif 4',serif;font-weight:700}
  .data-table{width:100%;border-collapse:collapse}
  .data-table th{background:var(--green-tint);color:var(--green-d);padding:9px 12px;text-align:left;font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--green-soft)}
  .data-table td{padding:11px 12px;font-size:.86rem;vertical-align:top;border-bottom:1px solid var(--line);border-right:1px solid var(--line)}
  .data-table td:last-child,.data-table th:last-child{border-right:none}
  .data-table td:first-child{font-weight:600}
  .data-table tr:last-child td{border-bottom:none}
  .data-table ul{list-style:none}.data-table ul li{padding:2px 0;font-size:.85rem}
  .data-table ul li::before{content:"•";color:var(--green);margin-right:5px}
  /* inputs */
  input.ans-input{border:1.5px solid var(--border);border-radius:6px;padding:5px 9px;font:400 .88rem Inter;color:var(--text);background:var(--bg);outline:none;width:130px;vertical-align:middle}
  input.ans-input:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  input.ans-input.correct{border-color:var(--green);background:var(--green-tint)}
  input.ans-input.incorrect{border-color:#dc2626;background:#fef2f2}
  html[data-theme="dark"] input.ans-input.incorrect{background:#3a1d1d}
  .qnum-prefix{display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:22px;background:var(--green);color:#fff;border-radius:6px;padding:2px 7px;font-size:.72rem;font-weight:700;margin-right:5px}
  /* mcq */
  .mcq-group{margin:12px 0 16px}
  .mcq-question{font-size:.92rem;font-weight:600;margin-bottom:8px;display:flex;gap:8px}
  .mcq-question .qnum{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--green-soft);color:var(--green-d);font-size:.72rem;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
  .mcq-options{display:flex;flex-direction:column;gap:6px}
  .mcq-option{display:flex;align-items:flex-start;gap:9px;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.88rem;background:var(--panel);transition:all .13s}
  .mcq-option:hover{border-color:var(--green);background:var(--green-tint)}
  .mcq-option input{display:none}
  .mcq-radio{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-top:1px;position:relative;display:flex;align-items:center;justify-content:center}
  .mcq-option.selected{border-color:var(--green);background:var(--green-tint)}
  .mcq-option.selected .mcq-radio{border-color:var(--green);background:var(--green)}
  .mcq-option.selected .mcq-radio::after{content:'';width:6px;height:6px;border-radius:50%;background:#fff;position:absolute}
  .opt-letter{font-weight:700;color:var(--muted);min-width:14px;font-size:.82rem}
  .mcq-option.selected .opt-letter{color:var(--green-d)}
  /* checkbox groups */
  .check-group{margin:12px 0 16px;border:1.5px solid var(--green-line);border-radius:var(--radius);padding:12px 14px;background:var(--panel)}
  .check-group-hint{font-size:.78rem;color:var(--muted);font-style:italic;margin-bottom:8px}
  .check-option{display:flex;align-items:flex-start;gap:9px;padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.88rem;background:var(--bg);margin-bottom:6px}
  .check-option:hover{border-color:var(--green);background:var(--green-tint)}
  .check-option input{display:none}
  .check-box{width:16px;height:16px;border-radius:4px;border:2px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center}
  .check-option.selected{border-color:var(--green);background:var(--green-tint)}
  .check-option.selected .check-box{border-color:var(--green);background:var(--green)}
  .check-option.selected .check-box::after{content:'✓';color:#fff;font-size:11px;font-weight:700;line-height:1}
  .check-option.selected .opt-letter{color:var(--green-d)}
  /* letter bank */
  .letter-bank{border:1.5px solid var(--green-line);border-radius:var(--radius);background:var(--panel);padding:12px 16px;margin:8px 0 14px}
  .letter-bank .row{padding:4px 0;font-size:.88rem}
  .letter-bank .row strong{color:var(--green-d);font-weight:700;margin-right:6px;min-width:18px;display:inline-block}
  /* label rows (matching) */
  .label-row{display:flex;flex-direction:column;gap:8px;margin:8px 0 12px}
  .label-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--panel)}
  .label-item label{font-size:.9rem;font-weight:500;flex:1}
  /* map */
  .map-wrap{border:1.5px solid var(--green-line);border-radius:var(--radius);padding:12px;margin:12px 0;background:var(--panel);text-align:center}
  .map-wrap img{max-width:100%;height:auto;border-radius:6px}
  .map-title{font-family:'Source Serif 4',serif;font-weight:700;margin-bottom:8px}
  /* flow chart */
  .flowchart{display:flex;flex-direction:column;align-items:center;gap:4px;margin:12px 0}
  .flow-step{border:1.5px solid var(--green-line);border-radius:var(--radius);padding:12px 16px;width:100%;max-width:420px;text-align:center;font-size:.9rem;background:var(--panel)}
  .flow-step .qnum-prefix{margin-right:6px}
  .flow-arrow{color:var(--green);font-size:1.1rem;font-weight:700}
  .example-block{border:1px dashed var(--green-line);border-radius:8px;padding:10px 14px;margin:8px 0 14px;background:var(--green-tint);font-size:.86rem}
  /* ---- bottom nav ---- */
  .botnav{position:fixed;left:0;right:0;bottom:0;height:var(--nav-h);background:var(--bg);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:6px;z-index:70;padding:0 12px;overflow-x:auto}
  .botnav .navbtn{flex:none;min-width:42px;height:38px;border:1px solid var(--border);background:var(--panel);border-radius:9px;font:600 .84rem Inter;color:var(--muted);cursor:pointer;padding:0 13px;display:inline-flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap}
  .botnav .navbtn:hover{border-color:var(--green);color:var(--green)}
  .botnav .navbtn.active{background:var(--green);color:#fff;border-color:var(--green)}
  .botnav .navbtn.wide{padding:0 16px}
  .botnav a.navbtn{text-decoration:none}
  .nav-sep{flex:none;width:1px;height:22px;background:var(--border);margin:0 3px}
  /* modal */
  .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.2s;padding:20px}
  .modal-ov.open{opacity:1;pointer-events:all}
  .modal{background:var(--bg);border:1px solid var(--border);border-radius:16px;max-width:440px;width:100%;padding:30px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
  .modal .score{font-family:'Source Serif 4',serif;font-size:3rem;font-weight:700;color:var(--green);line-height:1}
  .modal .of{color:var(--muted);font-size:.9rem;margin-bottom:12px}
  .modal .band{display:inline-block;background:var(--green-soft);color:var(--green-d);font-weight:700;padding:6px 18px;border-radius:20px;margin-bottom:18px}
  .modal button{padding:9px 20px;border-radius:9px;border:1px solid var(--border);background:var(--panel);font:600 .85rem Inter;color:var(--text);cursor:pointer;margin:4px}
  .modal button.primary{background:var(--green);color:#fff;border-color:var(--green)}
  .review-list{text-align:left;max-height:60vh;overflow:auto;margin-top:8px}
  .ans-row{display:grid;grid-template-columns:52px 1fr 1fr;gap:10px;padding:8px 11px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px;align-items:center;font-size:.85rem}
  .ans-row.correct{border-color:var(--green);background:var(--green-tint)}
  .ans-row.incorrect{border-color:#dc2626;background:#fef2f2}
  html[data-theme="dark"] .ans-row.incorrect{background:#2a1717}
  .ans-row .ql{font-family:'Source Serif 4',serif;font-weight:700;color:var(--muted)}
  .ans-row .lbl{font-size:.64rem;text-transform:uppercase;color:var(--faint);font-weight:700}
  .ans-row .yv{font-weight:600}
  .ans-row.incorrect .yv{color:#dc2626;text-decoration:line-through}
  .ans-row .cv{color:var(--green-d);font-weight:700}
  ::selection{background:var(--hl)}
  @media(max-width:900px){.wrap{grid-template-columns:1fr;gap:16px}.audio-box{position:static}.top h1{font-size:.9rem}.tr-tx{font-size:.9rem}}
</style>
</head>

<script>
const PARTS = {"1": "\n  <p class=\"q-label\">Questions 1–10</p>\n  <p class=\"instruction\">Complete the notes below.<br><strong>Write ONE WORD AND/OR A NUMBER for each answer.</strong></p>\n  <div class=\"notes-card\"><h4>Ferry to Shetland Islands</h4>\n    <ul>\n      <li>Name of ferry company: <span class=\"qnum-prefix\">1</span><input type=\"text\" class=\"ans-input\" data-q=\"1\" oninput=\"updateProgress()\" style=\"width:110px\"> Ferries</li>\n      <li>Ferries depart seven times per <span class=\"qnum-prefix\">2</span><input type=\"text\" class=\"ans-input\" data-q=\"2\" oninput=\"updateProgress()\" style=\"width:100px\"> in summer</li>\n      <li>Cost for four people with car: a little less than £ <span class=\"qnum-prefix\">3</span><input type=\"text\" class=\"ans-input\" data-q=\"3\" oninput=\"updateProgress()\" style=\"width:90px\"></li>\n      <li>Cancellation policy: receive a <span class=\"qnum-prefix\">4</span><input type=\"text\" class=\"ans-input\" data-q=\"4\" oninput=\"updateProgress()\" style=\"width:110px\"> (if cancelled a month in advance)</li>\n    </ul>\n    <h5>Advice</h5>\n    <ul>\n      <li>Cabins: book one with a <span class=\"qnum-prefix\">5</span><input type=\"text\" class=\"ans-input\" data-q=\"5\" oninput=\"updateProgress()\" style=\"width:110px\">; luxury cabins have a TV</li>\n      <li>Bring snacks and <span class=\"qnum-prefix\">6</span><input type=\"text\" class=\"ans-input\" data-q=\"6\" oninput=\"updateProgress()\" style=\"width:110px\"> for the children</li>\n      <li>A <span class=\"qnum-prefix\">7</span><input type=\"text\" class=\"ans-input\" data-q=\"7\" oninput=\"updateProgress()\" style=\"width:110px\"> is required for the dog kennels</li>\n      <li>Try to see <span class=\"qnum-prefix\">8</span><input type=\"text\" class=\"ans-input\" data-q=\"8\" oninput=\"updateProgress()\" style=\"width:110px\"> in the morning</li>\n      <li>If time, visit <span class=\"qnum-prefix\">9</span><input type=\"text\" class=\"ans-input\" data-q=\"9\" oninput=\"updateProgress()\" style=\"width:110px\"> Castle</li>\n      <li>The <span class=\"qnum-prefix\">10</span><input type=\"text\" class=\"ans-input\" data-q=\"10\" oninput=\"updateProgress()\" style=\"width:110px\"> restaurant in a nearby village is recommended</li>\n    </ul>\n  </div>\n", "2": "\n  <p class=\"q-label\">Questions 11 and 12</p>\n  <p class=\"instruction\">Which <strong>TWO</strong> explanations for the popularity of street food are given?</p>\n  <div class=\"check-group\" data-questions=\"11,12\" data-max=\"2\"><div class=\"check-group-hint\">Choose TWO letters, A–E.</div><label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"A\"><span class=\"check-box\"></span><span class=\"opt-letter\">A</span> low price</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"B\"><span class=\"check-box\"></span><span class=\"opt-letter\">B</span> locally sourced</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"C\"><span class=\"check-box\"></span><span class=\"opt-letter\">C</span> freshly made</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"D\"><span class=\"check-box\"></span><span class=\"opt-letter\">D</span> convenience</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"E\"><span class=\"check-box\"></span><span class=\"opt-letter\">E</span> unusual food</label>\n</div>\n  <p class=\"q-label\" style=\"margin-top:22px\">Questions 13 and 14</p>\n  <p class=\"instruction\">Which <strong>TWO</strong> places are recommended for new street food businesses?</p>\n  <div class=\"check-group\" data-questions=\"13,14\" data-max=\"2\"><div class=\"check-group-hint\">Choose TWO letters, A–E.</div><label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"A\"><span class=\"check-box\"></span><span class=\"opt-letter\">A</span> music festivals</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"B\"><span class=\"check-box\"></span><span class=\"opt-letter\">B</span> food markets</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"C\"><span class=\"check-box\"></span><span class=\"opt-letter\">C</span> weddings</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"D\"><span class=\"check-box\"></span><span class=\"opt-letter\">D</span> parties</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"E\"><span class=\"check-box\"></span><span class=\"opt-letter\">E</span> parks</label>\n</div>\n  <p class=\"q-label\" style=\"margin-top:22px\">Questions 15 and 16</p>\n  <p class=\"instruction\">Choose the correct letter, <strong>A, B</strong> or <strong>C</strong>.</p>\n  <div class=\"mcq-group\"><div class=\"mcq-question\"><span class=\"qnum\">15</span> What does the speaker say about getting equipment for a street food business?</div><div class=\"mcq-options\"><label class=\"mcq-option\" onclick=\"selectMCQ(this,'q15')\"><input type=\"radio\" name=\"q15\"><span class=\"mcq-radio\"></span><span class=\"opt-letter\">A</span> High quality equipment is a good investment.</label>\n<label class=\"mcq-option\" onclick=\"selectMCQ(this,'q15')\"><input type=\"radio\" name=\"q15\"><span class=\"mcq-radio\"></span><span class=\"opt-letter\">B</span> It's best to buy second-hand equipment.</label>\n<label class=\"mcq-option\" onclick=\"selectMCQ(this,'q15')\"><input type=\"radio\" name=\"q15\"><span class=\"mcq-radio\"></span><span class=\"opt-letter\">C</span> Renting equipment can be cheap.</label>\n</div></div>\n  <div class=\"mcq-group\"><div class=\"mcq-question\"><span class=\"qnum\">16</span> What advice is given about creating a product for a street food business?</div><div class=\"mcq-options\"><label class=\"mcq-option\" onclick=\"selectMCQ(this,'q16')\"><input type=\"radio\" name=\"q16\"><span class=\"mcq-radio\"></span><span class=\"opt-letter\">A</span> Provide information about the ingredients.</label>\n<label class=\"mcq-option\" onclick=\"selectMCQ(this,'q16')\"><input type=\"radio\" name=\"q16\"><span class=\"mcq-radio\"></span><span class=\"opt-letter\">B</span> It is important to have an original product.</label>\n<label class=\"mcq-option\" onclick=\"selectMCQ(this,'q16')\"><input type=\"radio\" name=\"q16\"><span class=\"mcq-radio\"></span><span class=\"opt-letter\">C</span> The presentation is an important factor.</label>\n</div></div>\n  <p class=\"q-label\" style=\"margin-top:22px\">Questions 17–20</p>\n  <p class=\"instruction\">What problem did the owners of each of the following street food businesses experience? Write the correct letter, <strong>A–F</strong>, next to Questions 17–20.</p>\n  <div class=\"letter-bank\">\n    <div class=\"row\" style=\"text-align:center\"><strong style=\"min-width:0\">Problems</strong></div>\n    <div class=\"row\"><strong>A</strong> Some ingredients were too expensive.</div>\n    <div class=\"row\"><strong>B</strong> The meals took a long time to prepare.</div>\n    <div class=\"row\"><strong>C</strong> They had no money for marketing.</div>\n    <div class=\"row\"><strong>D</strong> It was difficult to get a permit to sell food.</div>\n    <div class=\"row\"><strong>E</strong> A competitor was selling similar food in their area.</div>\n    <div class=\"row\"><strong>F</strong> They worked very long hours.</div>\n  </div>\n  <div class=\"label-row\">\n    <div class=\"label-item\"><span class=\"qnum-prefix\">17</span><input type=\"text\" class=\"ans-input\" data-q=\"17\" oninput=\"updateProgress()\" style=\"width:56px;text-transform:uppercase\" maxlength=\"1\"><label>Thai Basil</label></div>\n    <div class=\"label-item\"><span class=\"qnum-prefix\">18</span><input type=\"text\" class=\"ans-input\" data-q=\"18\" oninput=\"updateProgress()\" style=\"width:56px;text-transform:uppercase\" maxlength=\"1\"><label>Basque</label></div>\n    <div class=\"label-item\"><span class=\"qnum-prefix\">19</span><input type=\"text\" class=\"ans-input\" data-q=\"19\" oninput=\"updateProgress()\" style=\"width:56px;text-transform:uppercase\" maxlength=\"1\"><label>Lou's kitchen</label></div>\n    <div class=\"label-item\"><span class=\"qnum-prefix\">20</span><input type=\"text\" class=\"ans-input\" data-q=\"20\" oninput=\"updateProgress()\" style=\"width:56px;text-transform:uppercase\" maxlength=\"1\"><label>Chip Chop</label></div>\n  </div>\n", "3": "\n  <p class=\"q-label\">Questions 21 and 22</p>\n  <p class=\"instruction\">Which <strong>TWO</strong> points do the speakers make about the terms 'ethical' and 'sustainable' fashion?</p>\n  <div class=\"check-group\" data-questions=\"21,22\" data-max=\"2\"><div class=\"check-group-hint\">Choose TWO letters, A–E.</div><label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"A\"><span class=\"check-box\"></span><span class=\"opt-letter\">A</span> Their definitions keep changing.</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"B\"><span class=\"check-box\"></span><span class=\"opt-letter\">B</span> People think they mean the same thing.</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"C\"><span class=\"check-box\"></span><span class=\"opt-letter\">C</span> The term 'eco-friendly' is preferable.</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"D\"><span class=\"check-box\"></span><span class=\"opt-letter\">D</span> They are often used imprecisely.</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"E\"><span class=\"check-box\"></span><span class=\"opt-letter\">E</span> Companies should avoid using them on clothing labels.</label>\n</div>\n  <p class=\"q-label\" style=\"margin-top:22px\">Questions 23 and 24</p>\n  <p class=\"instruction\">Which <strong>TWO</strong> claims about wool production do the speakers disagree with?</p>\n  <div class=\"check-group\" data-questions=\"23,24\" data-max=\"2\"><div class=\"check-group-hint\">Choose TWO letters, A–E.</div><label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"A\"><span class=\"check-box\"></span><span class=\"opt-letter\">A</span> Sheep are generally well-treated.</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"B\"><span class=\"check-box\"></span><span class=\"opt-letter\">B</span> Wool is easy to recycle.</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"C\"><span class=\"check-box\"></span><span class=\"opt-letter\">C</span> Wool is a long-lasting fabric.</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"D\"><span class=\"check-box\"></span><span class=\"opt-letter\">D</span> Wool production involves few chemicals.</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"E\"><span class=\"check-box\"></span><span class=\"opt-letter\">E</span> Sheep do less environmental damage than other livestock.</label>\n</div>\n  <p class=\"q-label\" style=\"margin-top:22px\">Questions 25–30</p>\n  <p class=\"instruction\">What comment do the speakers make about each of the following semi-synthetic fabrics? Write the correct letter, <strong>A–H</strong>, next to Questions 25–30.</p>\n  <div class=\"letter-bank\">\n    <div class=\"row\" style=\"text-align:center\"><strong style=\"min-width:0\">Comments</strong></div>\n    <div class=\"row\"><strong>A</strong> The production process is fuel efficient.</div>\n    <div class=\"row\"><strong>B</strong> It is the least sustainable of alternative fabrics.</div>\n    <div class=\"row\"><strong>C</strong> Production costs are high.</div>\n    <div class=\"row\"><strong>D</strong> It provides additional health benefits.</div>\n    <div class=\"row\"><strong>E</strong> It is not durable in the long-term.</div>\n    <div class=\"row\"><strong>F</strong> It needs to be produced in a certain way to be sustainable.</div>\n    <div class=\"row\"><strong>G</strong> Chemicals required for production can be reused.</div>\n    <div class=\"row\"><strong>H</strong> This is from a wholly sustainable source.</div>\n  </div>\n  <div class=\"label-row\">\n    <div class=\"label-item\"><span class=\"qnum-prefix\">25</span><input type=\"text\" class=\"ans-input\" data-q=\"25\" oninput=\"updateProgress()\" style=\"width:56px;text-transform:uppercase\" maxlength=\"1\"><label>Lyocell</label></div>\n    <div class=\"label-item\"><span class=\"qnum-prefix\">26</span><input type=\"text\" class=\"ans-input\" data-q=\"26\" oninput=\"updateProgress()\" style=\"width:56px;text-transform:uppercase\" maxlength=\"1\"><label>Cupro</label></div>\n    <div class=\"label-item\"><span class=\"qnum-prefix\">27</span><input type=\"text\" class=\"ans-input\" data-q=\"27\" oninput=\"updateProgress()\" style=\"width:56px;text-transform:uppercase\" maxlength=\"1\"><label>Bamboo</label></div>\n    <div class=\"label-item\"><span class=\"qnum-prefix\">28</span><input type=\"text\" class=\"ans-input\" data-q=\"28\" oninput=\"updateProgress()\" style=\"width:56px;text-transform:uppercase\" maxlength=\"1\"><label>EcoVero</label></div>\n    <div class=\"label-item\"><span class=\"qnum-prefix\">29</span><input type=\"text\" class=\"ans-input\" data-q=\"29\" oninput=\"updateProgress()\" style=\"width:56px;text-transform:uppercase\" maxlength=\"1\"><label>Cork</label></div>\n    <div class=\"label-item\"><span class=\"qnum-prefix\">30</span><input type=\"text\" class=\"ans-input\" data-q=\"30\" oninput=\"updateProgress()\" style=\"width:56px;text-transform:uppercase\" maxlength=\"1\"><label>Hemp</label></div>\n  </div>\n", "4": "\n  <p class=\"q-label\">Questions 31–40</p>\n  <p class=\"instruction\">Complete the notes below.<br><strong>Write ONE WORD ONLY for each answer.</strong></p>\n  <div class=\"notes-card\"><h4>Invasive species</h4>\n    <p><strong>Definition:</strong> an animal or plant that causes harm to an environment after being introduced by humans</p>\n    <h5>An invasive species can be a problem when it:</h5>\n    <ul>\n      <li>eats native species.</li>\n      <li>introduces a new <span class=\"qnum-prefix\">31</span><input type=\"text\" class=\"ans-input\" data-q=\"31\" oninput=\"updateProgress()\" style=\"width:120px\"></li>\n      <li>takes food from native species.</li>\n      <li>threatens an entire <span class=\"qnum-prefix\">32</span><input type=\"text\" class=\"ans-input\" data-q=\"32\" oninput=\"updateProgress()\" style=\"width:120px\"></li>\n    </ul>\n    <h5>How invasive species spread</h5>\n    <ul>\n      <li>accidentally e.g. via people returning from their <span class=\"qnum-prefix\">33</span><input type=\"text\" class=\"ans-input\" data-q=\"33\" oninput=\"updateProgress()\" style=\"width:120px\"> or on cargo ships</li>\n      <li>intentionally e.g. for pest control, or as <span class=\"qnum-prefix\">34</span><input type=\"text\" class=\"ans-input\" data-q=\"34\" oninput=\"updateProgress()\" style=\"width:120px\"></li>\n    </ul>\n    <h5>Examples of invasive species</h5>\n    <ul>\n      <li><em>Rhinella marina</em> (toads) were introduced to Australia from Hawaii in 1935 to eat a type of insect that was damaging the <span class=\"qnum-prefix\">35</span><input type=\"text\" class=\"ans-input\" data-q=\"35\" oninput=\"updateProgress()\" style=\"width:120px\"> plantations.</li>\n      <li>Rhododendron plants prevent <span class=\"qnum-prefix\">36</span><input type=\"text\" class=\"ans-input\" data-q=\"36\" oninput=\"updateProgress()\" style=\"width:120px\"> from reaching native plants.</li>\n      <li>Grey squirrels reduce food for the UK's red squirrels and spread a <span class=\"qnum-prefix\">37</span><input type=\"text\" class=\"ans-input\" data-q=\"37\" oninput=\"updateProgress()\" style=\"width:120px\"> that kills red squirrels.</li>\n    </ul>\n    <h5>Tackling invasive species</h5>\n    <ul>\n      <li>Monitoring helps us to understand the <span class=\"qnum-prefix\">38</span><input type=\"text\" class=\"ans-input\" data-q=\"38\" oninput=\"updateProgress()\" style=\"width:120px\"> of invasive species and the impact they have.</li>\n      <li>Setting up a national <span class=\"qnum-prefix\">39</span><input type=\"text\" class=\"ans-input\" data-q=\"39\" oninput=\"updateProgress()\" style=\"width:120px\"> makes it easier to track them.</li>\n      <li>Asking the public to <span class=\"qnum-prefix\">40</span><input type=\"text\" class=\"ans-input\" data-q=\"40\" oninput=\"updateProgress()\" style=\"width:120px\"> and report them helps with monitoring.</li>\n    </ul>\n  </div>\n"};

const TRANSCRIPTS = {"1": [{"sp": "", "h": "Test 3. This is the IELTS listening test. You will hear a number of different recordings", "t": 0.0}, {"sp": "", "h": "and you will have to answer questions on what you hear. There will be time for you to read", "t": 8.88}, {"sp": "", "h": "the instructions and questions and you will have a chance to check your work.", "t": 15.44}, {"sp": "", "h": "All the recordings will be played once only. The test is in four parts.", "t": 21.44}, {"sp": "", "h": "At the end of the test, you will be given 10 minutes to transfer your answers to an answer sheet.", "t": 28.88}, {"sp": "", "h": "Now turn to part 1.", "t": 37.68}, {"sp": "", "h": "Part 1. You will hear a woman asking a friend for advice on travelling by ferry to an island in", "t": 44.48}, {"sp": "", "h": "Scotland. First, you have some time to look at questions 1 to 4.", "t": 52.88}, {"sp": "", "h": "Now listen carefully and answer questions 1 to 4.", "t": 83.28}, {"sp": "", "h": "You know when you went to the Shetland Islands last year, Paul. Did you go by ferry or did you fly?", "t": 92.08}, {"sp": "", "h": "We went by ferry, Tammy. I prefer driving to flying. The journey feels like part of the holiday.", "t": 99.52}, {"sp": "", "h": "Which ferry company did you use? There&#x27;s only one. It&#x27;s called <span class=\"tr-ans\">Northern<sup class=\"tr-q\">Q1</sup></span> Fairies.", "t": 106.88}, {"sp": "", "h": "The ferry is all leave from Aberdeen. How frequent are they?", "t": 113.2}, {"sp": "", "h": "The service is pretty limited. There&#x27;s only one ferry leaving every evening in summer anyway,", "t": 117.12}, {"sp": "", "h": "seven days a <span class=\"tr-ans\">week<sup class=\"tr-q\">Q2</sup></span>. I&#x27;m not sure about the winter months. They may only run on four or five days then.", "t": 122.48}, {"sp": "", "h": "Okay, so it&#x27;s an overnight trip. I quite like that idea. Leaving at night and waking up as you", "t": 129.68}, {"sp": "", "h": "arrive on the island, can you remember how much you paid for your tickets? They were really cheap", "t": 138.16}, {"sp": "", "h": "and four people and a car worked out at just under £<span class=\"tr-ans\">250<sup class=\"tr-q\">Q3</sup></span>. Really? I was expecting it to be more like", "t": 145.04}, {"sp": "", "h": "£400 during the peak season. So is I. It&#x27;s great value. It&#x27;s a good idea to book in advance", "t": 152.64}, {"sp": "", "h": "because I think they get booked up quite quickly, especially during the school holidays.", "t": 160.0}, {"sp": "", "h": "Yes, I suppose so. I&#x27;m just not 100% sure of our plans yet. What if I had to cancel?", "t": 164.96}, {"sp": "", "h": "That could be a problem. I don&#x27;t think it&#x27;s their policy to give refunds, just a <span class=\"tr-ans\">voucher<sup class=\"tr-q\">Q4</sup></span>,", "t": 174.08}, {"sp": "", "h": "which you can use at a later date. But you have to cancel a month in advance to get that.", "t": 181.04}, {"sp": "", "h": "Right. Well, we need to make up our minds quickly then.", "t": 186.72}, {"sp": "", "h": "Before you hear the rest of the conversation, you have some time to look at questions 5 to 10.", "t": 194.08}, {"sp": "", "h": "You&#x27;d want to book a cabin too. We booked too late to get a cabin with a <span class=\"tr-ans\">window<sup class=\"tr-q\">Q5</sup></span>.", "t": 224.96}, {"sp": "", "h": "They&#x27;re more expensive, but much nicer than the inner cabins.", "t": 254.24}, {"sp": "", "h": "You don&#x27;t have to book a cabin at all, but I think it&#x27;s worth paying for.", "t": 258.32}, {"sp": "", "h": "They also have luxury cabins, which are only for two people and have a TV. But I wouldn&#x27;t bother", "t": 262.64}, {"sp": "", "h": "with those. No, I agree. The only other thing I can think of is to make sure you bring snacks", "t": 269.2}, {"sp": "", "h": "for the kids. The selection on board is quite limited and not that healthy either.", "t": 275.84}, {"sp": "", "h": "What about Wi-Fi on board? Is that any good?", "t": 282.4}, {"sp": "", "h": "Not really. So it&#x27;s best to bring some <span class=\"tr-ans\">books<sup class=\"tr-q\">Q6</sup></span> for them.", "t": 286.48}, {"sp": "", "h": "Okay. We may need to bring the dog if I can&#x27;t get anyone to look after him.", "t": 290.08}, {"sp": "", "h": "We brought ours and it was fine. The kennels on board are okay. They&#x27;re quite big.", "t": 295.44}, {"sp": "", "h": "You just need to provide a <span class=\"tr-ans\">blanket<sup class=\"tr-q\">Q7</sup></span>.", "t": 301.36}, {"sp": "", "h": "Uh-huh. Sounds good.", "t": 303.52}, {"sp": "", "h": "It was all very easy, really. And it was quite an adventure for the kids.", "t": 305.52}, {"sp": "", "h": "They loved being on the sea at night and in the morning, keeping a lookout for <span class=\"tr-ans\">dolphins<sup class=\"tr-q\">Q8</sup></span>.", "t": 310.4}, {"sp": "", "h": "We saw loads.", "t": 315.92}, {"sp": "", "h": "Oh, the kids would love that.", "t": 317.12}, {"sp": "", "h": "One other thing. We arrived in Aberdeen hours before the ferry was due to leave.", "t": 319.6}, {"sp": "", "h": "So we decided to go somewhere else rather than hang around at the port for so long.", "t": 324.72}, {"sp": "", "h": "Where did you go?", "t": 329.44}, {"sp": "", "h": "<span class=\"tr-ans\">Drum<sup class=\"tr-q\">Q9</sup></span> castle.", "t": 330.8}, {"sp": "", "h": "I&#x27;ve never heard of it. Is that spelt like the instrument?", "t": 332.64}, {"sp": "", "h": "Yeah. It&#x27;s really worth visiting. It&#x27;s got an impressive tower", "t": 337.12}, {"sp": "", "h": "and beautiful gardens and ancient woodland.", "t": 341.84}, {"sp": "", "h": "Sounds lovely. It does it to have a restaurant.", "t": 345.04}, {"sp": "", "h": "It&#x27;s only got a coffee shop. No restaurant.", "t": 348.96}, {"sp": "", "h": "We looked up restaurants in the area and found an <span class=\"tr-ans\">Italian<sup class=\"tr-q\">Q10</sup></span> one in a village nearby.", "t": 352.24}, {"sp": "", "h": "I can check the name of it for you if you&#x27;re interested.", "t": 357.28}, {"sp": "", "h": "Oh, thanks, Paul. That would be great.", "t": 360.24}, {"sp": "", "h": "That is the end of part one.", "t": 366.48}, {"sp": "", "h": "You now have one minute to check your answers to part one.", "t": 368.8}, {"sp": "", "h": "You", "t": 396.48}, {"sp": "", "h": "a little bit.", "t": 427.36}], "2": [{"sp": "", "h": "Part 2. You will hear a man giving a talk to people who are interested in starting their", "t": 0.0}, {"sp": "", "h": "own street food business. First, you have some time to look at questions 11-14.", "t": 7.12}, {"sp": "", "h": "Now listen carefully and answer questions 11-14.", "t": 30.0}, {"sp": "", "h": "Good evening everyone. My name is John and I run Veg Out, a street food business selling", "t": 43.8}, {"sp": "", "h": "vegan food. Since 2012, I&#x27;ve been travelling all around the country cooking vegan food", "t": 49.44}, {"sp": "", "h": "in my converted van and selling it at all kinds of outdoor events. I&#x27;m here to give", "t": 55.8}, {"sp": "", "h": "you some advice based on my experience. The good news is that there&#x27;s never been a better", "t": 61.58}, {"sp": "", "h": "time to start your own street food business. Street food continues to grow in popularity.", "t": 68.2}, {"sp": "", "h": "I think there are a couple of reasons for this. The first is that street food is a reaction", "t": 76.68}, {"sp": "", "h": "against fast food. Street food ranges from high quality burgers to vegan curries and", "t": 82.8}, {"sp": "", "h": "everything in between. But while fast food is cheap and easy to find, it&#x27;s not particularly", "t": 89.8}, {"sp": "", "h": "good for you. It&#x27;s also the same everywhere. What you get with street food on the other", "t": 95.96}, {"sp": "", "h": "hand is something different. People like the idea of trying something they can&#x27;t get", "t": 102.24}, {"sp": "", "h": "anywhere else. They also like seeing food prepared in front of them and which hasn&#x27;t", "t": 107.72}, {"sp": "", "h": "come straight out of a freezer. You need to think about the best place to sell your street", "t": 113.28}, {"sp": "", "h": "food. People always think music festivals are an obvious place to start but the cost", "t": 119.28}, {"sp": "", "h": "of renting a space can be huge and there&#x27;s always a lot of competition. Food markets", "t": 124.84}, {"sp": "", "h": "on the other hand are great because customers are always really interested in food and give", "t": 131.52}, {"sp": "", "h": "great feedback and if you can get a spot in your local park fantastic. Usually very relaxed", "t": 137.6}, {"sp": "", "h": "but with lots of customers passing by. Once you get established, you&#x27;ll start getting", "t": 145.64}, {"sp": "", "h": "asked to do parties which can be really challenging but lots of fun. Having street food at weddings", "t": 150.68}, {"sp": "", "h": "has become quite fashionable too but you need to really know what you&#x27;re doing as everything", "t": 157.48}, {"sp": "", "h": "needs to be perfect.", "t": 162.76}, {"sp": "", "h": "Before you hear the rest of the talk, you have some time to look at questions 15 to 20.", "t": 167.96}, {"sp": "", "h": "Now listen and answer questions 15 to 20. Setting up a street food business costs a", "t": 187.48}, {"sp": "", "h": "lot less than opening a restaurant or cafe but you&#x27;ll have to buy some basic equipment.", "t": 215.08}, {"sp": "", "h": "I try to get things like hobs and fridges second hand if you can. You can replace them", "t": 221.4}, {"sp": "", "h": "with better quality stuff if your business takes off. Renting is another option but you&#x27;ll", "t": 226.76}, {"sp": "", "h": "end up spending more money rather than saving it. You&#x27;ve probably got a good idea about the", "t": 232.04}, {"sp": "", "h": "food you&#x27;re planning to sell. I expect you&#x27;ve done some research to find out if anyone else", "t": 238.12}, {"sp": "", "h": "is selling a similar product and you&#x27;ll have thought about any possible allergies to nuts", "t": 242.92}, {"sp": "", "h": "or eggs etc. But there&#x27;s one thing people don&#x27;t always think about and that&#x27;s how you&#x27;re going", "t": 248.04}, {"sp": "", "h": "to serve it. On a plate, in a bag, will you provide a fork? Will it all be easily recyclable", "t": 254.76}, {"sp": "", "h": "or reusable? It&#x27;s got to be easy to eat and look attractive or customers won&#x27;t come back.", "t": 262.6}, {"sp": "", "h": "Once you get started, you should be prepared for things to go wrong. Every business faces", "t": 270.76}, {"sp": "", "h": "problems and here are a few examples from street food businesses that I know.", "t": 276.52}, {"sp": "", "h": "My friends who run Thai Basil started by juggling their street food business with their day jobs", "t": 283.4}, {"sp": "", "h": "in a restaurant. Their work-life balance was non-existent as they were working till midnight", "t": 289.64}, {"sp": "", "h": "in the restaurant all week and then took their food truck to market on their days off. The owners", "t": 295.64}, {"sp": "", "h": "of Basque found it was hard to make a profit because the price of fish, essential for some", "t": 302.36}, {"sp": "", "h": "of their dishes, was so high and it was hard to charge customers a lot more for those dishes", "t": 307.32}, {"sp": "", "h": "so they had to stop focusing on fish dishes and include more vegetarian food.", "t": 313.72}, {"sp": "", "h": "The owners of Lu&#x27;s Kitchen were making salads to order from their van and some of their dishes", "t": 319.88}, {"sp": "", "h": "were quite complicated. At one of their first events, they ended up with people standing in a", "t": 325.56}, {"sp": "", "h": "long queue for more than 15 minutes and many of them lost patience. So make sure whatever you offer", "t": 331.08}, {"sp": "", "h": "can be served quickly and efficiently. The owners of Chip Chop had found a perfect venue near a beach", "t": 338.36}, {"sp": "", "h": "where there weren&#x27;t any other street food trucks but what they hadn&#x27;t realised was that they&#x27;d", "t": 346.76}, {"sp": "", "h": "need a special licence which individual businesses don&#x27;t need at markets or festivals.", "t": 352.36}, {"sp": "", "h": "It was a complicated process and in the end they gave up.", "t": 359.96}, {"sp": "", "h": "So I hope that&#x27;s given you a flavour of some of the things that can happen.", "t": 365.0}, {"sp": "", "h": "That is the end of part two. You now have 30 seconds to check your answers to part two.", "t": 372.6}, {"sp": "", "h": "Thank you.", "t": 382.36}], "3": [{"sp": "", "h": "Part 3. You will hear part of a discussion between two textile students about their research", "t": 0.0}, {"sp": "", "h": "into sustainable fashion. First, you have some time to look at questions 21 to 24.", "t": 8.24}, {"sp": "", "h": "Now listen carefully and answer questions 21 to 24.", "t": 30.0}, {"sp": "", "h": "Shall we go through our research for our sustainable fashion project?", "t": 42.16}, {"sp": "", "h": "Good idea. I think I&#x27;ve done enough reading now.", "t": 49.44}, {"sp": "", "h": "Me too. I&#x27;ve learnt such a lot about what sustainability actually means.", "t": 52.6}, {"sp": "", "h": "Same for me with ethical fashion. I didn&#x27;t really appreciate the difference between that", "t": 57.64}, {"sp": "", "h": "and sustainable fashion before doing this research.", "t": 63.68}, {"sp": "", "h": "I know. Most people use these terms interchangeably but in fact, the difference is quite distinct", "t": 67.0}, {"sp": "", "h": "when you think about it. Sustainable relates to the environment and ethical", "t": 73.44}, {"sp": "", "h": "relates more to the way workers or animals are treated.", "t": 78.24}, {"sp": "", "h": "I totally understand why people get confused though. There are so many other terms used", "t": 81.92}, {"sp": "", "h": "like eco-friendly, which is actually quite meaningless.", "t": 87.84}, {"sp": "", "h": "And the way companies use these terms when describing their products doesn&#x27;t help. They&#x27;re", "t": 92.24}, {"sp": "", "h": "often deliberately vague I think and don&#x27;t provide enough information about how their", "t": 97.32}, {"sp": "", "h": "products are made. Yes. It was interesting to read about the", "t": 101.72}, {"sp": "", "h": "debates surrounding wool production and how ethical and sustainable that is. It&#x27;s generally", "t": 105.56}, {"sp": "", "h": "considered to be sustainable because it&#x27;s a natural product.", "t": 111.72}, {"sp": "", "h": "And it also lasts a long time and can be recycled. All very positive. But I wasn&#x27;t convinced", "t": 115.72}, {"sp": "", "h": "by the argument that wool production is sustainable because it doesn&#x27;t use many chemicals. What", "t": 122.48}, {"sp": "", "h": "about all the fungicides and insecticides used in sheep farming?", "t": 128.56}, {"sp": "", "h": "Good point. And I couldn&#x27;t find any evidence for the claim about sheep farming being better", "t": 133.08}, {"sp": "", "h": "for the environment than cattle farming. No. They&#x27;re both really bad. I read different", "t": 138.92}, {"sp": "", "h": "reports about how unethical it is to even shear sheep. Some people say it&#x27;s cruel. But as", "t": 145.0}, {"sp": "", "h": "long as the sheep are kept in good condition, I can&#x27;t see anything wrong with it. Me neither.", "t": 151.84}, {"sp": "", "h": "Before you hear the rest of the discussion, you have some time to look at questions 25", "t": 161.08}, {"sp": "", "h": "to 30.", "t": 167.72}, {"sp": "", "h": "Shall we talk about some of the semi-synthetic new fabrics now?", "t": 191.08}, {"sp": "", "h": "Okay, let&#x27;s do that. Let&#x27;s start with Liacelle. I&#x27;ve been reading about that.", "t": 210.48}, {"sp": "", "h": "Yeah, that&#x27;s the one produced from the pulp of eucalyptus trees, isn&#x27;t it?", "t": 216.68}, {"sp": "", "h": "Yes. And what happens with that is really impressive. Over 99% of dissolving agents used", "t": 221.64}, {"sp": "", "h": "in the manufacturing process are used again.", "t": 228.6}, {"sp": "", "h": "Yeah. Now, there are a few semi-synthetic fabrics that I&#x27;d never heard of, like Kupro,", "t": 231.84}, {"sp": "", "h": "for example.", "t": 238.96}, {"sp": "", "h": "Made from byproducts of the cotton industry to create a kind of vegan silk. But I&#x27;m not", "t": 240.36}, {"sp": "", "h": "sure how sustainable this really is, as there are so many reports of pollution caused by", "t": 246.16}, {"sp": "", "h": "the manufacturing process.", "t": 251.52}, {"sp": "", "h": "It doesn&#x27;t compare favorably with all the other sustainable fabrics we&#x27;ve looked at", "t": 254.36}, {"sp": "", "h": "now.", "t": 258.52}, {"sp": "", "h": "Bamboo is one fabric we&#x27;re all familiar with. But I didn&#x27;t know that it was only organic", "t": 259.52}, {"sp": "", "h": "bamboo that&#x27;s truly sustainable.", "t": 264.96}, {"sp": "", "h": "Me neither. Apparently, the manufacturing process for a significant proportion of bamboo is", "t": 267.44}, {"sp": "", "h": "chemically quite intensive, which obviously can be quite damaging.", "t": 273.76}, {"sp": "", "h": "Eco-viral is an example of a semi-synthetic fabric which is becoming really popular.", "t": 279.36}, {"sp": "", "h": "Probably because manufacturing causes 50% fewer emissions and takes up half as much energy", "t": 285.2}, {"sp": "", "h": "as conventional fabrics. That saves production costs as well as being better for the environment.", "t": 291.14}, {"sp": "", "h": "That&#x27;s true. I think demand for Cork will continue to grow. It works really well in", "t": 297.68}, {"sp": "", "h": "vegan shoes and bags.", "t": 303.44}, {"sp": "", "h": "And it&#x27;s the only fabric that&#x27;s fundamentally sustainable. The cork trees it comes from", "t": 305.64}, {"sp": "", "h": "are renewable and the product itself is both recyclable and biodegradable, which is unique.", "t": 311.24}, {"sp": "", "h": "And the harvesting process is actually good for the trees. There are no downsides to using", "t": 318.56}, {"sp": "", "h": "this source at all.", "t": 324.48}, {"sp": "", "h": "Hump is another really good sustainable fabric from a natural source.", "t": 326.48}, {"sp": "", "h": "Yes, did you know that cloves made from hemp protect the wearer from the sun and it&#x27;s also", "t": 331.12}, {"sp": "", "h": "antibacterial?", "t": 337.2}, {"sp": "", "h": "No, I didn&#x27;t. But I did read that it&#x27;s quite hard to grow. So perhaps that&#x27;s why it&#x27;s", "t": 338.2}, {"sp": "", "h": "not as common as you think?", "t": 345.04}, {"sp": "", "h": "I&#x27;m sure that&#x27;ll change. Then there are recites...", "t": 346.68}, {"sp": "", "h": "That is the end of part three.", "t": 353.84}, {"sp": "", "h": "[Music]", "t": 383.84}], "4": [{"sp": "", "h": "Part 4. You will hear part of an ecology lecture about invasive species of plants and animals.", "t": 0.0}, {"sp": "", "h": "First, you have some time to look at questions 31 to 40.", "t": 9.36}, {"sp": "", "h": "Thank you.", "t": 30.0}, {"sp": "", "h": "Today, I am going to talk about Invasive Species. Let me start by saying what an invasive species", "t": 60.0}, {"sp": "", "h": "is and what it is not. Invasive species are any animal or plant that is introduced into", "t": 81.36}, {"sp": "", "h": "an environment by humans and which is then harmful to that environment. It is important", "t": 88.76}, {"sp": "", "h": "to be clear that not all introduced species are invasive. Many introduced or non-native", "t": 96.2}, {"sp": "", "h": "species thrive in new areas without posing any threat. In some cases, invasive species", "t": 103.8}, {"sp": "", "h": "have changed the natural world beyond recognition, so let&#x27;s look at the different ways they", "t": 112.24}, {"sp": "", "h": "can be problematic. First of all, invasive species may eat native species or sometimes", "t": 118.52}, {"sp": "", "h": "they may bring a <span class=\"tr-ans\">disease<sup class=\"tr-q\">Q31</sup></span> with them which native species have never faced before and therefore", "t": 127.24}, {"sp": "", "h": "have no defences against. Often the invasive species breed very quickly which further adds", "t": 134.0}, {"sp": "", "h": "to the problem of native species losing their sources of food. Species invasions are one", "t": 142.32}, {"sp": "", "h": "of the biggest causes of damage in an <span class=\"tr-ans\">ecosystem<sup class=\"tr-q\">Q32</sup></span>, actually putting its survival at risk. So,", "t": 149.7}, {"sp": "", "h": "how do invasive species spread? Without a doubt, the biggest cause is human activity.", "t": 158.52}, {"sp": "", "h": "This could be intentional, or it could be accidental, such as when people who&#x27;ve been", "t": 166.88}, {"sp": "", "h": "on <span class=\"tr-ans\">holiday<sup class=\"tr-q\">Q33</sup></span> in another country come back with, say, the seeds of plants on their clothes", "t": 173.32}, {"sp": "", "h": "or shoes. Plants and animals, especially insects, arrive in or on the cargo of ships and then", "t": 179.6}, {"sp": "", "h": "escape into their new home. But sometimes humans deliberately move animals and plants", "t": 188.96}, {"sp": "", "h": "around the world, for example, to use them to control pests on farms, or to be <span class=\"tr-ans\">pets<sup class=\"tr-q\">Q34</sup></span>.", "t": 197.16}, {"sp": "", "h": "This can go very wrong if those animals and plants move into wild settings and start breeding", "t": 206.12}, {"sp": "", "h": "or begin growing in ways that weren&#x27;t predicted. Let&#x27;s now look at an example of an invasive", "t": 213.04}, {"sp": "", "h": "species here in Australia. Rinella Marina is a species of toad that was deliberately", "t": 221.16}, {"sp": "", "h": "introduced from Hawaii in 1935 as a form of biological control. It was hoped that the", "t": 228.76}, {"sp": "", "h": "toads would eat the grey-backed beetles responsible for destroying crops of <span class=\"tr-ans\">sugar<sup class=\"tr-q\">Q35</sup></span> on many of the", "t": 237.88}, {"sp": "", "h": "plantations. At first, just a handful of toads were released", "t": 244.28}, {"sp": "", "h": "by scientists into Queensland, but this number soon grew as other states followed suit. Within", "t": 250.28}, {"sp": "", "h": "two years, 62,000 young toads had been released into the wild. The toads did nothing to protect", "t": 259.0}, {"sp": "", "h": "the plantations, but they did reproduce rapidly and could soon be found all over the northern", "t": 267.86}, {"sp": "", "h": "half of the country. The toads are poisonous at every stage of their lifecycle, and anything", "t": 275.04}, {"sp": "", "h": "that eats them will die. My second example regarding invasive species", "t": 282.92}, {"sp": "", "h": "is the United Kingdom. Actually, there are more than 3,000 invasive species there, including", "t": 293.68}, {"sp": "", "h": "some that are extremely common. Some invasive plants, such as Japanese knotweed, have had", "t": 301.8}, {"sp": "", "h": "a devastating impact on parts of the UK. Gardeners in the 19th century considered it", "t": 310.04}, {"sp": "", "h": "a beautiful ornamental plant, which it is when it&#x27;s kept under control. But it&#x27;s soon", "t": 317.72}, {"sp": "", "h": "spread into the countryside and remains a problem even to this day, as it&#x27;s so hard to eradicate.", "t": 325.16}, {"sp": "", "h": "Another invasive plant is rhododendrons, which can be found in UK parks and woodlands. Their", "t": 334.52}, {"sp": "", "h": "introduction dates back to 1763, but they&#x27;re now seen as harmful because they block out", "t": 342.2}, {"sp": "", "h": "so much <span class=\"tr-ans\">light<sup class=\"tr-q\">Q36</sup></span> that native wildflowers can&#x27;t grow beneath them.", "t": 349.38}, {"sp": "", "h": "And then there are gray squirrels, which are one invasive species almost everyone in the", "t": 355.52}, {"sp": "", "h": "UK will have come across. They were brought to the UK from North America and introduced", "t": 361.28}, {"sp": "", "h": "to private estates around the 1870s, but are now found everywhere, from forests to city", "t": 368.24}, {"sp": "", "h": "squares. Gray squirrels have outcompeted the smaller", "t": 376.04}, {"sp": "", "h": "native red squirrels. They both eat the same food, and the gray squirrels carry a type", "t": 381.26}, {"sp": "", "h": "of <span class=\"tr-ans\">virus<sup class=\"tr-q\">Q37</sup></span> that is deadly to the red squirrels. Red squirrel populations have collapsed,", "t": 388.12}, {"sp": "", "h": "and there are only a handful of sites left in the UK where they&#x27;re found. An important", "t": 395.72}, {"sp": "", "h": "question for ecologists worldwide is, what can we do to tackle the problem of invasive", "t": 401.84}, {"sp": "", "h": "species? The first step in controlling invasive species", "t": 408.68}, {"sp": "", "h": "is learning about the <span class=\"tr-ans\">behaviour<sup class=\"tr-q\">Q38</sup></span> of new species coming into the country. Monitoring is an", "t": 414.2}, {"sp": "", "h": "important part of this, so that we can know if the new species begins to have a negative", "t": 420.68}, {"sp": "", "h": "impact in its new environment. One effective way to keep track of invasive", "t": 426.68}, {"sp": "", "h": "species is to create a <span class=\"tr-ans\">database<sup class=\"tr-q\">Q39</sup></span> for the whole country. That way all relevant authorities", "t": 432.56}, {"sp": "", "h": "and agencies can share important information and take whatever actions needed. But the", "t": 440.28}, {"sp": "", "h": "public also have a vital role to play in this process. They should be encouraged to <span class=\"tr-ans\">photograph<sup class=\"tr-q\">Q40</sup></span>", "t": 448.08}, {"sp": "", "h": "harmful species, because this helps with identification. And then, to report when and where these", "t": 454.84}, {"sp": "", "h": "were observed. But it&#x27;s important to tell people not to destroy", "t": 463.32}, {"sp": "", "h": "it, or even touch what they&#x27;ve found. That is the end of part four. You now have one", "t": 469.04}, {"sp": "", "h": "minute to check your answers to part four.", "t": 483.28}, {"sp": "", "h": "[end]", "t": 499.04}, {"sp": "", "h": "That is the end of the listening test. In the IELTS test, you would now have ten minutes", "t": 529.04}, {"sp": "", "h": "to transfer your answers to the listening answer sheet.", "t": 554.16}]};

function badge(q){ return q.replace(/\//g, ','); }
function renderTranscript(n){
  const host=document.getElementById('trBody');
  const card=document.getElementById('trCard');
  if(!TRANSCRIPTS[n]||!TRANSCRIPTS[n].length){
    card.style.display='none';
    document.querySelector('.wrap').style.gridTemplateColumns='minmax(0,720px)';
    document.querySelector('.wrap').style.justifyContent='center';
    return;
  }
  card.style.display='';
  document.querySelector('.wrap').style.gridTemplateColumns='';
  host.innerHTML=(TRANSCRIPTS[n]||[]).map(u=>{
    let h=u.h.replace(/<sup class="tr-q">Q([^<]+)<\/sup>/g,(m,q)=>`<span class="tr-q">${badge(q)}</span>`);
    return `<div class="tr-turn" data-t="${u.t}" onclick="trSeek(${u.t})">${u.sp?`<span class="tr-sp">${u.sp}: </span>`:''}<span class="tr-tx">${h}</span></div>`;
  }).join('');
  trLast=null;
}

function trSeek(t){ if(typeof t==='number'&&isFinite(t)){ player.currentTime=Math.max(0,t-.4); player.play().catch(()=>{}); } }
let trLast=null;
player.addEventListener('timeupdate',()=>{
  const c=document.getElementById('trCard'); if(!c.classList.contains('open'))return;
  const body=document.getElementById('trBody'); const t=player.currentTime; let act=null;
  for(const el of body.children){ if(parseFloat(el.dataset.t)<=t+.25) act=el; else break; }
  if(act!==trLast){ if(trLast)trLast.classList.remove('active'); if(act){act.classList.add('active');} trLast=act; }
});

function loadTrack(n){ asrc.src=audioTracks[n]; player.load(); }
function switchPart(n){
  curPart=n;
  document.querySelectorAll('.botnav .navbtn[data-part]').forEach(b=>b.classList.toggle('active',+b.dataset.part===n));
  document.getElementById('partTitle').textContent='Part '+n+' · '+(TITLES[n]||'');
  document.getElementById('qPane').innerHTML=PARTS[n];
  renderTranscript(n);
  loadTrack(n);
  window.scrollTo({top:0,behavior:'smooth'});
}
function setSpeed(r,btn){ player.playbackRate=r; document.querySelectorAll('.speed button').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }

/* answer widgets (referenced inline in question HTML) */
function selectMCQ(el,name){ document.querySelectorAll(`[name="${name}"]`).forEach(r=>r.closest('.mcq-option').classList.remove('selected')); el.classList.add('selected'); el.querySelector('input').checked=true; }
function toggleCheck(evt,label){ evt.preventDefault(); const cb=label.querySelector('input'); const g=label.closest('.check-group'); const max=parseInt(g.dataset.max||'99',10); if(cb.checked){cb.checked=false;label.classList.remove('selected');return;} if(g.querySelectorAll('input:checked').length>=max)return; cb.checked=true;label.classList.add('selected'); }
function updateProgress(){}

/* scoring */
const norm=s=>(s??'').toString().trim().toLowerCase().replace(/[.,!?;:'"‘’“”()]/g,'').replace(/[-_]/g,' ').replace(/\s+/g,' ').trim();
function isCorrect(u,c){ if(!u)return false; const un=norm(u); if(!un)return false; const dg=s=>s.replace(/[^\d]/g,''); const ud=dg(un);
  const tm=v=>{const vn=norm(v); if(vn===un)return true; const vd=dg(vn); if(ud&&vd&&ud.length>=3&&ud===vd)return true; return false;};
  return Array.isArray(c)?c.some(tm):tm(c); }
function getUA(){ const ua={};
  document.querySelectorAll('input[type="text"][data-q]').forEach(i=>ua[i.dataset.q]=i.value.trim());
  document.querySelectorAll('input[type="radio"]:checked').forEach(r=>{const m=r.name.match(/^q(\d+)$/); if(m){const o=r.closest('.mcq-option'); if(o)ua[m[1]]=o.querySelector('.opt-letter').textContent.trim();}});
  document.querySelectorAll('.check-group').forEach(g=>{const qs=(g.dataset.questions||'').split(',').map(s=>s.trim()).filter(Boolean); const sel=[...g.querySelectorAll('input:checked')].map(i=>i.value); qs.forEach((q,i)=>ua[q]=sel[i]||'');});
  return ua; }
/* persist across part switches: cache answers on switch */
let cache={};
function stash(){ Object.assign(cache,getUA()); }
const _sp=switchPart; switchPart=function(n){ stash(); _sp(n); restore(); };
function restore(){ document.querySelectorAll('input[type="text"][data-q]').forEach(i=>{ if(cache[i.dataset.q]!=null)i.value=cache[i.dataset.q]; });
  document.querySelectorAll('.mcq-option').forEach(o=>{ const inp=o.querySelector('input'); const m=inp.name.match(/^q(\d+)$/); if(m&&cache[m[1]]===o.querySelector('.opt-letter').textContent.trim()){o.classList.add('selected');inp.checked=true;} });
  document.querySelectorAll('.check-group').forEach(g=>{ const qs=(g.dataset.questions||'').split(',').map(s=>s.trim()); const want=qs.map(q=>cache[q]).filter(Boolean); g.querySelectorAll('.check-option').forEach(o=>{ const v=o.querySelector('input').value; if(want.includes(v)){o.classList.add('selected');o.querySelector('input').checked=true;} }); }); }
function multiPts(key,ua){ const s=multiCorrect[key]; if(!s)return 0; const acc=s.accept.map(norm); const used=new Set(); let p=0; s.inputs.map(k=>norm(ua[k]||'')).forEach(uv=>{ if(!uv)return; for(let i=0;i<acc.length;i++){ if(used.has(i))continue; if(uv===acc[i]){used.add(i);p++;break;} } }); return p; }
function score(){ stash(); const ua=cache; let c=0; const handled=new Set();
  Object.keys(multiCorrect).forEach(k=>{ c+=multiPts(k,ua); multiCorrect[k].inputs.forEach(s=>handled.add(String(s))); });
  for(let q=1;q<=40;q++){ if(handled.has(String(q)))continue; if(ua[q]&&correctAnswers[q]!==undefined&&isCorrect(ua[q],correctAnswers[q]))c++; }
  return c; }
function band(c){ if(c>=39)return'9.0';if(c>=37)return'8.5';if(c>=35)return'8.0';if(c>=32)return'7.5';if(c>=30)return'7.0';if(c>=26)return'6.5';if(c>=23)return'6.0';if(c>=18)return'5.5';if(c>=16)return'5.0';if(c>=13)return'4.5';if(c>=10)return'4.0';return'<4'; }
function submitAnswers(){ const c=score(); document.getElementById('mScore').textContent=c; document.getElementById('mBand').textContent='Estimated Band '+band(c); document.getElementById('resModal').classList.add('open'); }
function closeModal(){ document.getElementById('resModal').classList.remove('open'); }
function showReview(){ closeModal(); const ua=cache; const box=document.getElementById('revList'); let h='';
  const slotBase={}; Object.keys(multiCorrect).forEach(k=>multiCorrect[k].inputs.forEach(s=>slotBase[s]=k));
  for(let q=1;q<=40;q++){ let u=ua[q]||'',cc,ok;
    if(slotBase[q]){ const sp=multiCorrect[slotBase[q]]; cc=sp.accept.join(' / ')+' (any order)'; ok=u&&sp.accept.map(norm).includes(norm(u)); }
    else { cc=correctAnswers[q]; if(cc===undefined)continue; ok=u&&isCorrect(u,cc); cc=Array.isArray(cc)?cc[0]:cc; }
    const cls=!u?'':(ok?'correct':'incorrect');
    h+=`<div class="ans-row ${cls}"><div class="ql">Q${q}</div><div><div class="lbl">You</div><div class="yv">${u||'—'}</div></div><div><div class="lbl">Answer</div><div class="cv">${cc}</div></div></div>`; }
  box.innerHTML=h; document.getElementById('revModal').classList.add('open'); }
function resetAll(){ if(!confirm('Clear all your answers?'))return; cache={}; document.querySelectorAll('input[type="text"][data-q]').forEach(i=>i.value=''); document.querySelectorAll('.mcq-option.selected,.check-option.selected').forEach(o=>o.classList.remove('selected')); document.querySelectorAll('input:checked').forEach(i=>i.checked=false); }

switchPart(1);
</script>
