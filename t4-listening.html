<!DOCTYPE html>
<html lang="en">

<title>Cambridge 21 Listening – Test 4 | flarestamina.com</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#ffffff;--panel:#fafafa;--panel2:#f4f6f5;--border:#e5e7eb;--line:#eceeed;
    --text:#0a0a0a;--muted:#6b7280;--faint:#9ca3af;
    --green:#047857;--green-d:#035c43;--green-soft:#d1fae5;--green-tint:#eafaf3;--green-line:#10b981;
    --hl:#c9f2df;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.05);--nav-h:60px;
  }
  html[data-theme="dark"],body.theme-dark{
    --bg:#0c0e0d;--panel:#141817;--panel2:#171c1a;--border:#242b28;--line:#1e2421;
    --text:#f1f5f3;--muted:#9aa6a1;--faint:#6b756f;
    --green:#10b981;--green-d:#34d399;--green-soft:#0c3b2c;--green-tint:#0e2a22;--green-line:#10b981;--hl:#0f4433;
  }
  @media(prefers-color-scheme:dark){:root:not([data-theme="light"]){
    --bg:#0c0e0d;--panel:#141817;--panel2:#171c1a;--border:#242b28;--line:#1e2421;
    --text:#f1f5f3;--muted:#9aa6a1;--faint:#6b756f;
    --green:#10b981;--green-d:#34d399;--green-soft:#0c3b2c;--green-tint:#0e2a22;--hl:#0f4433;}}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding-bottom:var(--nav-h)}
  a{color:inherit}
  .top{position:sticky;top:0;z-index:60;background:var(--bg);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;gap:14px;padding:0 20px}
  .top .back{font-size:.8rem;color:var(--muted);text-decoration:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;white-space:nowrap}
  .top .back:hover{border-color:var(--green);color:var(--green)}
  .top h1{font-family:'Source Serif 4',serif;font-size:1.02rem;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .top .tools{display:flex;gap:6px}
  .iconbtn{width:34px;height:34px;border:1px solid var(--border);background:var(--panel);border-radius:8px;cursor:pointer;font-size:.95rem;color:var(--muted);display:flex;align-items:center;justify-content:center}
  .iconbtn:hover{border-color:var(--green);color:var(--green)}
  .wrap{max-width:1320px;margin:0 auto;padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:26px}
  .col-h{font-family:'Source Serif 4',serif;font-size:1.35rem;font-weight:700;margin-bottom:4px}
  /* ---- LEFT: audio + audioscript ---- */
  .audio-box{position:sticky;top:66px;z-index:20;background:var(--bg);padding-bottom:10px}
  .player-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  audio{flex:1;min-width:220px;height:40px}
  .speed{display:inline-flex;gap:3px}
  .speed button{border:1px solid var(--border);background:var(--panel);color:var(--muted);border-radius:6px;padding:4px 9px;font:600 .72rem Inter;cursor:pointer}
  .speed button.active{background:var(--green);color:#fff;border-color:var(--green)}
  .transcript-card{margin-top:14px;border:1.5px solid var(--green-line);border-radius:var(--radius);overflow:hidden;background:var(--bg)}
  .transcript-head{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;cursor:pointer;background:var(--green-tint)}
  .transcript-head h3{font-size:.92rem;font-weight:700;color:var(--green-d)}
  .transcript-head .chev{color:var(--green);font-size:.8rem}
  .transcript-body{display:none;padding:14px 16px;max-height:none}
  .transcript-card.open .transcript-body{display:block}
  .tr-turn{padding:5px 8px;border-radius:7px;margin-bottom:3px;cursor:pointer;border-left:3px solid transparent}
  .tr-turn:hover{background:var(--panel)}
  .tr-turn.active{background:var(--green-tint);border-left-color:var(--green)}
  .tr-sp{font-weight:700;font-size:.82rem}
  .tr-tx{font-size:.92rem;line-height:1.7}
  .tr-ans{background:var(--hl);border-radius:3px;padding:1px 2px;box-decoration-break:clone;-webkit-box-decoration-break:clone}
  .tr-q{display:inline-flex;align-items:center;justify-content:center;background:var(--green);color:#fff;font-size:.66rem;font-weight:700;border-radius:5px;padding:1px 7px;margin:0 2px;vertical-align:middle;font-family:Inter;letter-spacing:.02em}
  .tr-hint{font-size:.78rem;color:var(--faint);font-style:italic;padding:2px 8px 8px}
  /* ---- RIGHT: questions ---- */
  .q-instr-top{font-size:.82rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:6px}
  .instruction{font-size:.96rem;margin-bottom:14px}
  .instruction strong{font-weight:700}
  .q-label{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:20px 0 10px}
  .section-title-r{font-family:'Source Serif 4',serif;font-size:1.15rem;font-weight:700;text-align:center;margin:6px 0 14px}
  /* notes card */
  .notes-card{border:1.5px solid var(--green-line);border-radius:var(--radius);padding:16px 18px;margin:12px 0;background:var(--panel)}
  .notes-card h4{font-family:'Source Serif 4',serif;font-size:1.02rem;font-weight:700;text-align:center;margin-bottom:12px}
  .notes-card h5{font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--green-d);margin:14px 0 6px;border-bottom:1px solid var(--green-soft);padding-bottom:4px}
  .notes-card ul{list-style:none;padding-left:4px}
  .notes-card ul li{padding:5px 0;font-size:.92rem;line-height:1.7}
  .notes-card ul li::before{content:"•";color:var(--green);margin-right:7px}
  .notes-card p{font-size:.92rem;margin:6px 0}
  /* table */
  .data-table-wrap{border:1.5px solid var(--green-line);border-radius:var(--radius);overflow:hidden;margin:12px 0}
  .data-table-title{background:var(--green);color:#fff;text-align:center;padding:10px;font-family:'Source Serif 4',serif;font-weight:700}
  .data-table{width:100%;border-collapse:collapse}
  .data-table th{background:var(--green-tint);color:var(--green-d);padding:9px 12px;text-align:left;font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--green-soft)}
  .data-table td{padding:11px 12px;font-size:.86rem;vertical-align:top;border-bottom:1px solid var(--line);border-right:1px solid var(--line)}
  .data-table td:last-child,.data-table th:last-child{border-right:none}
  .data-table td:first-child{font-weight:600}
  .data-table tr:last-child td{border-bottom:none}
  .data-table ul{list-style:none}.data-table ul li{padding:2px 0;font-size:.85rem}
  .data-table ul li::before{content:"•";color:var(--green);margin-right:5px}
  /* inputs */
  input.ans-input{border:1.5px solid var(--border);border-radius:6px;padding:5px 9px;font:400 .88rem Inter;color:var(--text);background:var(--bg);outline:none;width:130px;vertical-align:middle}
  input.ans-input:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  input.ans-input.correct{border-color:var(--green);background:var(--green-tint)}
  input.ans-input.incorrect{border-color:#dc2626;background:#fef2f2}
  html[data-theme="dark"] input.ans-input.incorrect{background:#3a1d1d}
  .qnum-prefix{display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:22px;background:var(--green);color:#fff;border-radius:6px;padding:2px 7px;font-size:.72rem;font-weight:700;margin-right:5px}
  /* mcq */
  .mcq-group{margin:12px 0 16px}
  .mcq-question{font-size:.92rem;font-weight:600;margin-bottom:8px;display:flex;gap:8px}
  .mcq-question .qnum{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--green-soft);color:var(--green-d);font-size:.72rem;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
  .mcq-options{display:flex;flex-direction:column;gap:6px}
  .mcq-option{display:flex;align-items:flex-start;gap:9px;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.88rem;background:var(--panel);transition:all .13s}
  .mcq-option:hover{border-color:var(--green);background:var(--green-tint)}
  .mcq-option input{display:none}
  .mcq-radio{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-top:1px;position:relative;display:flex;align-items:center;justify-content:center}
  .mcq-option.selected{border-color:var(--green);background:var(--green-tint)}
  .mcq-option.selected .mcq-radio{border-color:var(--green);background:var(--green)}
  .mcq-option.selected .mcq-radio::after{content:'';width:6px;height:6px;border-radius:50%;background:#fff;position:absolute}
  .opt-letter{font-weight:700;color:var(--muted);min-width:14px;font-size:.82rem}
  .mcq-option.selected .opt-letter{color:var(--green-d)}
  /* checkbox groups */
  .check-group{margin:12px 0 16px;border:1.5px solid var(--green-line);border-radius:var(--radius);padding:12px 14px;background:var(--panel)}
  .check-group-hint{font-size:.78rem;color:var(--muted);font-style:italic;margin-bottom:8px}
  .check-option{display:flex;align-items:flex-start;gap:9px;padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.88rem;background:var(--bg);margin-bottom:6px}
  .check-option:hover{border-color:var(--green);background:var(--green-tint)}
  .check-option input{display:none}
  .check-box{width:16px;height:16px;border-radius:4px;border:2px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center}
  .check-option.selected{border-color:var(--green);background:var(--green-tint)}
  .check-option.selected .check-box{border-color:var(--green);background:var(--green)}
  .check-option.selected .check-box::after{content:'✓';color:#fff;font-size:11px;font-weight:700;line-height:1}
  .check-option.selected .opt-letter{color:var(--green-d)}
  /* letter bank */
  .letter-bank{border:1.5px solid var(--green-line);border-radius:var(--radius);background:var(--panel);padding:12px 16px;margin:8px 0 14px}
  .letter-bank .row{padding:4px 0;font-size:.88rem}
  .letter-bank .row strong{color:var(--green-d);font-weight:700;margin-right:6px;min-width:18px;display:inline-block}
  /* label rows (matching) */
  .label-row{display:flex;flex-direction:column;gap:8px;margin:8px 0 12px}
  .label-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--panel)}
  .label-item label{font-size:.9rem;font-weight:500;flex:1}
  /* map */
  .map-wrap{border:1.5px solid var(--green-line);border-radius:var(--radius);padding:12px;margin:12px 0;background:var(--panel);text-align:center}
  .map-wrap img{max-width:100%;height:auto;border-radius:6px}
  .map-title{font-family:'Source Serif 4',serif;font-weight:700;margin-bottom:8px}
  /* flow chart */
  .flowchart{display:flex;flex-direction:column;align-items:center;gap:4px;margin:12px 0}
  .flow-step{border:1.5px solid var(--green-line);border-radius:var(--radius);padding:12px 16px;width:100%;max-width:420px;text-align:center;font-size:.9rem;background:var(--panel)}
  .flow-step .qnum-prefix{margin-right:6px}
  .flow-arrow{color:var(--green);font-size:1.1rem;font-weight:700}
  .example-block{border:1px dashed var(--green-line);border-radius:8px;padding:10px 14px;margin:8px 0 14px;background:var(--green-tint);font-size:.86rem}
  /* ---- bottom nav ---- */
  .botnav{position:fixed;left:0;right:0;bottom:0;height:var(--nav-h);background:var(--bg);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:6px;z-index:70;padding:0 12px;overflow-x:auto}
  .botnav .navbtn{flex:none;min-width:42px;height:38px;border:1px solid var(--border);background:var(--panel);border-radius:9px;font:600 .84rem Inter;color:var(--muted);cursor:pointer;padding:0 13px;display:inline-flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap}
  .botnav .navbtn:hover{border-color:var(--green);color:var(--green)}
  .botnav .navbtn.active{background:var(--green);color:#fff;border-color:var(--green)}
  .botnav .navbtn.wide{padding:0 16px}
  .botnav a.navbtn{text-decoration:none}
  .nav-sep{flex:none;width:1px;height:22px;background:var(--border);margin:0 3px}
  /* modal */
  .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.2s;padding:20px}
  .modal-ov.open{opacity:1;pointer-events:all}
  .modal{background:var(--bg);border:1px solid var(--border);border-radius:16px;max-width:440px;width:100%;padding:30px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
  .modal .score{font-family:'Source Serif 4',serif;font-size:3rem;font-weight:700;color:var(--green);line-height:1}
  .modal .of{color:var(--muted);font-size:.9rem;margin-bottom:12px}
  .modal .band{display:inline-block;background:var(--green-soft);color:var(--green-d);font-weight:700;padding:6px 18px;border-radius:20px;margin-bottom:18px}
  .modal button{padding:9px 20px;border-radius:9px;border:1px solid var(--border);background:var(--panel);font:600 .85rem Inter;color:var(--text);cursor:pointer;margin:4px}
  .modal button.primary{background:var(--green);color:#fff;border-color:var(--green)}
  .review-list{text-align:left;max-height:60vh;overflow:auto;margin-top:8px}
  .ans-row{display:grid;grid-template-columns:52px 1fr 1fr;gap:10px;padding:8px 11px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px;align-items:center;font-size:.85rem}
  .ans-row.correct{border-color:var(--green);background:var(--green-tint)}
  .ans-row.incorrect{border-color:#dc2626;background:#fef2f2}
  html[data-theme="dark"] .ans-row.incorrect{background:#2a1717}
  .ans-row .ql{font-family:'Source Serif 4',serif;font-weight:700;color:var(--muted)}
  .ans-row .lbl{font-size:.64rem;text-transform:uppercase;color:var(--faint);font-weight:700}
  .ans-row .yv{font-weight:600}
  .ans-row.incorrect .yv{color:#dc2626;text-decoration:line-through}
  .ans-row .cv{color:var(--green-d);font-weight:700}
  ::selection{background:var(--hl)}
  @media(max-width:900px){.wrap{grid-template-columns:1fr;gap:16px}.audio-box{position:static}.top h1{font-size:.9rem}.tr-tx{font-size:.9rem}}
</style>
</head>

<script>
const PARTS = {"1": "\n  <p class=\"q-label\">Questions 1–10</p>\n  <p class=\"instruction\">Complete the form below.<br><strong>Write ONE WORD ONLY for each answer.</strong></p>\n  <div class=\"notes-card\"><h4>Survey about shopping in Broadbeach</h4>\n    <ul>\n      <li>Name: Martyn <span class=\"qnum-prefix\">1</span><input type=\"text\" class=\"ans-input\" data-q=\"1\" oninput=\"updateProgress()\" style=\"width:120px\"></li>\n      <li>Today's journey to Broadbeach town centre: used his <span class=\"qnum-prefix\">2</span><input type=\"text\" class=\"ans-input\" data-q=\"2\" oninput=\"updateProgress()\" style=\"width:120px\"></li>\n      <li>Purpose of today's trip: has visited the <span class=\"qnum-prefix\">3</span><input type=\"text\" class=\"ans-input\" data-q=\"3\" oninput=\"updateProgress()\" style=\"width:120px\"></li>\n      <li>looking for a new <span class=\"qnum-prefix\">4</span><input type=\"text\" class=\"ans-input\" data-q=\"4\" oninput=\"updateProgress()\" style=\"width:120px\"></li>\n      <li>collecting <span class=\"qnum-prefix\">5</span><input type=\"text\" class=\"ans-input\" data-q=\"5\" oninput=\"updateProgress()\" style=\"width:120px\"> (after repair)</li>\n      <li>Preferred day for shopping: <span class=\"qnum-prefix\">6</span><input type=\"text\" class=\"ans-input\" data-q=\"6\" oninput=\"updateProgress()\" style=\"width:120px\"></li>\n    </ul>\n    <h5>Opinions about shopping in the town centre</h5>\n    <ul>\n      <li>Finds the service in shops is excellent</li>\n      <li>Thinks there are too many places selling <span class=\"qnum-prefix\">7</span><input type=\"text\" class=\"ans-input\" data-q=\"7\" oninput=\"updateProgress()\" style=\"width:120px\"></li>\n      <li>Would like more places to buy <span class=\"qnum-prefix\">8</span><input type=\"text\" class=\"ans-input\" data-q=\"8\" oninput=\"updateProgress()\" style=\"width:120px\"></li>\n    </ul>\n    <h5>Opinions about new out-of-town Shopping Centre</h5>\n    <ul>\n      <li>Likes the <span class=\"qnum-prefix\">9</span><input type=\"text\" class=\"ans-input\" data-q=\"9\" oninput=\"updateProgress()\" style=\"width:120px\"> best</li>\n      <li>Believes the <span class=\"qnum-prefix\">10</span><input type=\"text\" class=\"ans-input\" data-q=\"10\" oninput=\"updateProgress()\" style=\"width:120px\"> is unnecessary</li>\n    </ul>\n  </div>\n", "2": "\n  <p class=\"q-label\">Questions 11 and 12</p>\n  <p class=\"instruction\">In which <strong>TWO</strong> areas of the business exhibition did James Craig promote his company last year?</p>\n  <div class=\"check-group\" data-questions=\"11,12\" data-max=\"2\"><div class=\"check-group-hint\">Choose TWO letters, A–E.</div><label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"A\"><span class=\"check-box\"></span><span class=\"opt-letter\">A</span> the Digital Marketing Centre</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"B\"><span class=\"check-box\"></span><span class=\"opt-letter\">B</span> the TalkCon Zone</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"C\"><span class=\"check-box\"></span><span class=\"opt-letter\">C</span> the Breakout area</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"D\"><span class=\"check-box\"></span><span class=\"opt-letter\">D</span> the Business Village</label>\n<label class=\"check-option\" onclick=\"toggleCheck(event,this)\"><input type=\"checkbox\" value=\"E\"><span class=\"check-box\"></span><span class=\"opt-letter\">E</span> the Business Connections Zone</label>\n</div>\n  <p class=\"q-label\" style=\"margin-top:22px\">Questions 13 and 14</p>\n  <p class=\"instruction\">Which <strong>TWO</strong> facts are given about discounts on popular brands available to exhibitors?</p>\n  <div class=\"check-group\" data-questions=\"13,14\" dat io\"></span><span class=\"opt-letter\">B</span> constructing tall buildings.</label>\n<label class=\"mcq-option\" onclick=\"selectMCQ(this,'q23')\"><input type=\"radio\" name=\"q23\"><span class=\"mcq-radio\"></span><span class=\"opt-letter\">C</span> developing creative ideas for smaller homes.</label>\n</div></div>\n  <p class=\"q-label\" style=\"margin-top:22px\">Questions 24–30</p>\n  <p class=\"instruction\">What opinion is given about each of the following developments? Write the correct letter, <strong>A–I</strong>, next to Questions 24–30.</p>\n  <div class=\"letter-bank\">\n    <div class=\"row\" style=\"text-align:center\"><strong style=\"min-width:0\">Opinions</strong></div>\n    <div class=\"row\"><strong>A</strong> This could cause unnecessary anxiety.</div>\n    <div class=\"row\"><strong>B</strong> This would be especially beneficial for city residents.</div>\n    <div class=\"row\"><strong>C</strong> This would be challenging for young people.</div>\n    <div class=\"row\"><strong>D</strong> This would have environmental benefits.</div>\n    <div class=\"row\"><strong>E</strong> This could encourage creativity.</div>\n    <div class=\"row\"><strong>F</strong> This could lead to social problems.</div>\n    <div class=\"row\"><strong>G</strong> This could enable retired people to share a project.</div>\n    <div class=\"row\"><strong>H</strong> This would help some people but cause problems for others.</div>\n    <div class=\"row\"><strong>I</strong> This would suit both existing and new members of a household.</div>\n  </div>\n  <div class=\"label-row\">\n    <div class=\"label-item\"><span class=\"qnum-prefix\">24</span><input type=\"text\" class=\"ans-input\" data-q=\"24\" oninput=\"updateProgress()\" style=\"width:56px;text-transform:uppercase\" maxlength=\"1\"><label>use of roof space for gardens</label></div>\n    <div class=\"label-item\"><span class=\"qnum-prefix\">25</span><input type=\"text\" class=\"ans-input\" data-q=\"25\" oninput=\"updateProgress()\" style=\"width:56px;text-transform:uppercase\" maxlength=\"1\"><label>shared working spaces</label></div>\n    <div class=\"label-item\"><span class=\"qnum-prefix\">26</span><input type=\"text\" class=\"ans-input\" data-q=\"26\" oninput=\"updateProgress()\" style=\"width:56px;text-transform:uppercase\" maxlength=\"1\"><label>moveable internal walls</label></div>\n    <div class=\"label-item\"><span class=\"qnum-prefix\">27</span><input type=\"text\" class=\"ans-input\" data-q=\"27\" oninput=\"updateProgress()\" style=\"width:56px;text-transform:uppercase\" maxlength=\"1\"><label>smart mirrors in bathrooms</label></div>\n    <div class=\"label-item\"><span class=\"qnum-prefix\">28</span><input type=\"text\" class=\"ans-input\" data-q=\"28\" oninput=\"updateProgress()\" style=\"width:56px;text-transform:uppercase\" maxlength=\"1\"><label>bike sheds with charging points</label></div>\n    <div class=\"label-item\"><span class=\"qnum-prefix\">29</span><input type=\"text\" class=\"ans-input\" data-q=\"29\" oninput=\"updateProgress()\" style=\"width:56px;text-transform:uppercase\" maxlength=\"1\"><label>restriction of cars to certain areas</label></div>\n    <div class=\"label-item\"><span class=\"qnum-prefix\">30</span><input type=\"text\" class=\"ans-input\" data-q=\"30\" oninput=\"updateProgress()\" style=\"width:56px;text-transform:uppercase\" maxlength=\"1\"><label>communal vegetable plots</label></div>\n  </div>\n", "4": "\n  <p class=\"q-label\">Questions 31–40</p>\n  <p class=\"instruction\">Complete the notes below.<br><strong>Write ONE WORD ONLY for each answer.</strong></p>\n  <div class=\"notes-card\"><h4>Music therapy for surgical patients</h4>\n    <h5>Background</h5>\n    <ul>\n      <li>Surgery impacts patients because they may experience discomfort or unwelcome changes to their <span class=\"qnum-prefix\">31</span><input type=\"text\" class=\"ans-input\" data-q=\"31\" oninput=\"updateProgress()\" style=\"width:120px\"></li>\n      <li>Current post-surgical strategies focus mainly on pain relief.</li>\n    </ul>\n    <h5>Recent research</h5>\n    <ul>\n      <li>A study reviewed data from about 100 <span class=\"qnum-prefix\">32</span><input type=\"text\" class=\"ans-input\" data-q=\"32\" oninput=\"updateProgress()\" style=\"width:120px\"> and found that listening to music improved hospital patients' sense of wellbeing and reduced the length of their stay.</li>\n      <li>The patients in the study all listened to music with a <span class=\"qnum-prefix\">33</span><input type=\"text\" class=\"ans-input\" data-q=\"33\" oninput=\"updateProgress()\" style=\"width:120px\"> effect.</li>\n      <li>The music was mostly played through music <span class=\"qnum-prefix\">34</span><input type=\"text\" class=\"ans-input\" data-q=\"34\" oninput=\"updateProgress()\" style=\"width:120px\">.</li>\n      <li>Patients reported an absence or low levels of <span class=\"qnum-prefix\">35</span><input type=\"text\" class=\"ans-input\" data-q=\"35\" oninput=\"updateProgress()\" style=\"width:120px\">.</li>\n      <li>Medical records confirmed that patients who were played music in hospital needed less <span class=\"qnum-prefix\">36</span><input type=\"text\" class=\"ans-input\" data-q=\"36\" oninput=\"updateProgress()\" style=\"width:120px\"> than those who weren't played music.</li>\n      <li>The best results were achieved when patients were played music while they were <span class=\"qnum-prefix\">37</span><input type=\"text\" class=\"ans-input\" data-q=\"37\" oninput=\"updateProgress()\" style=\"width:120px\">.</li>\n      <li>The study concluded that playing music was effective because it served as a <span class=\"qnum-prefix\">38</span><input type=\"text\" class=\"ans-input\" data-q=\"38\" oninput=\"updateProgress()\" style=\"width:120px\">.</li>\n      <li>The researchers recommend playing either music or sounds from <span class=\"qnum-prefix\">39</span><input type=\"text\" class=\"ans-input\" data-q=\"39\" oninput=\"updateProgress()\" style=\"width:120px\"> to all surgical patients.</li>\n      <li>A future study will investigate the best <span class=\"qnum-prefix\">40</span><input type=\"text\" class=\"ans-input\" data-q=\"40\" oninput=\"updateProgress()\" style=\"width:120px\"> for the music.</li>\n    </ul>\n  </div>\n"};

const TRANSCRIPTS = {"1": [{"sp": "", "h": "Test 4. This is the IELTS listening test. You will hear a number of different recordings", "t": 0.0}, {"sp": "", "h": "and you will have to answer questions on what you hear. There will be time for you to read", "t": 8.76}, {"sp": "", "h": "the instructions and questions and you will have a chance to check your work. All the", "t": 15.28}, {"sp": "", "h": "recordings will be played once only. The test is in four parts. At the end of the test,", "t": 21.72}, {"sp": "", "h": "you will be given ten minutes to transfer your answers to an answer sheet.", "t": 30.76}, {"sp": "", "h": "Now turn to part one.", "t": 37.76}, {"sp": "", "h": "Part one. You will hear an interviewer who is doing a survey asking a man some questions", "t": 44.68}, {"sp": "", "h": "about shopping. First, you have some time to look at questions one to six.", "t": 51.08}, {"sp": "", "h": "Good morning. I am doing a survey of shoppers on broad beach. Would you have a few minutes", "t": 81.08}, {"sp": "", "h": "to spare to answer some questions? Yes, I guess it will be OK.", "t": 106.36}, {"sp": "", "h": "Thank you very much. Everybody seems so busy today. Well, actually, I do not have loads", "t": 112.52}, {"sp": "", "h": "of time. Oh, yes, of course. It really won&#x27;t take long. Could I start by taking your name", "t": 117.92}, {"sp": "", "h": "please? Martyn Lee. Martyn&#x27;s with a Y. And is your family name spelled L-D-E? It&#x27;s L-E-I-G-H.", "t": 124.32}, {"sp": "", "h": "Thank you. We don&#x27;t actually publish your name or details. It just makes it easier for", "t": 136.32}, {"sp": "", "h": "me to identify people when I look at all the results at the end. I see.", "t": 142.08}, {"sp": "", "h": "And can I ask, how did you get into town today? Well, normally I catch the bus, but I&#x27;m on", "t": 147.52}, {"sp": "", "h": "my <span class=\"tr-ans\">motorbike<sup class=\"tr-q\">Q2</sup></span> today because I&#x27;m going to work later. And could you tell me what you&#x27;re doing", "t": 155.08}, {"sp": "", "h": "this morning? I mean, the reason for your trip into town. Well, just being to the <span class=\"tr-ans\">hairdresser<sup class=\"tr-q\">Q3</sup></span>.", "t": 160.48}, {"sp": "", "h": "You see, I have a job interview at the council in a few days. Oh, really? Well, good luck", "t": 166.88}, {"sp": "", "h": "with that. Thanks a lot. And now I&#x27;m on my way to buy a <span class=\"tr-ans\">suit<sup class=\"tr-q\">Q4</sup></span> that I can wear to the", "t": 171.8}, {"sp": "", "h": "interview. I don&#x27;t actually own one at the moment. OK. Is that everything you&#x27;re planning", "t": 177.04}, {"sp": "", "h": "to do in town? Yeah. Well, I&#x27;ve got to go and pick up my <span class=\"tr-ans\">laptop<sup class=\"tr-q\">Q5</sup></span>. It broke a couple of", "t": 182.24}, {"sp": "", "h": "days ago, so I took it to the shop to get it fixed. They had to order a spare part,", "t": 188.0}, {"sp": "", "h": "but apparently it&#x27;s ready for collection now. I can&#x27;t wait to get it back.", "t": 193.4}, {"sp": "", "h": "I&#x27;m sure I hate it when my technology breaks down. One more thing. It&#x27;s Saturday today.", "t": 197.4}, {"sp": "", "h": "Is that when you like to do your shopping? Well, it&#x27;s more of a question of when I&#x27;m", "t": 204.96}, {"sp": "", "h": "free. If I&#x27;m free on a <span class=\"tr-ans\">Monday<sup class=\"tr-q\">Q6</sup></span>, that&#x27;s when I choose to come into town. The shops are", "t": 209.28}, {"sp": "", "h": "less busy than which I always prefer. Before you hear the rest of the conversation,", "t": 214.36}, {"sp": "", "h": "you have some time to look at questions seven to ten.", "t": 223.68}, {"sp": "", "h": "So, I&#x27;d like to ask you a few more questions to get your views about shopping in Broadbeach,", "t": 244.36}, {"sp": "", "h": "if that&#x27;s OK. Sure. What would you like to know specifically?", "t": 270.64}, {"sp": "", "h": "What would you say you like best about the shops here? I&#x27;d probably say it&#x27;s the service", "t": 274.32}, {"sp": "", "h": "you get wherever you go. OK. And what do you think about the range of shops on Broadbeach?", "t": 281.0}, {"sp": "", "h": "Oh, you can get almost anything you want here. And what about recent changes? What do you", "t": 287.52}, {"sp": "", "h": "like and dislike about them? For example, there are a lot of new <span class=\"tr-ans\">coffee<sup class=\"tr-q\">Q7</sup></span> shops now. Are", "t": 293.44}, {"sp": "", "h": "you enjoying them? No, there are too many of them. It&#x27;s a shame as those places could", "t": 300.0}, {"sp": "", "h": "be occupied by other kinds of shops. What would you like to see instead? Well, I think", "t": 305.62}, {"sp": "", "h": "we have enough clothing shops, but there&#x27;s only one place that sells <span class=\"tr-ans\">books<sup class=\"tr-q\">Q8</sup></span> at the moment.", "t": 311.52}, {"sp": "", "h": "It&#x27;d be nice to have a choice, you know. Right. And have you been to the new shopping centre", "t": 316.84}, {"sp": "", "h": "outside Broadbeach yet, Martin? Yes, once or twice. It&#x27;s not that far from where I live.", "t": 322.44}, {"sp": "", "h": "It&#x27;s a very modern looking building, isn&#x27;t it? Yes, and it&#x27;s lovely. The glass roof is", "t": 328.44}, {"sp": "", "h": "certainly impressive, but my favourite thing is the <span class=\"tr-ans\">plants<sup class=\"tr-q\">Q9</sup></span> they&#x27;ve put around the building.", "t": 333.64}, {"sp": "", "h": "They&#x27;re amazing and so big already. And what about the entertainment facilities? Have", "t": 338.48}, {"sp": "", "h": "you used any of them yet? Like the new <span class=\"tr-ans\">cinema<sup class=\"tr-q\">Q10</sup></span>? Nah, not yet. I can&#x27;t see any advantage in", "t": 344.92}, {"sp": "", "h": "having it there because the one in town is actually bigger. OK. Well, thank you so much", "t": 351.16}, {"sp": "", "h": "for your time. That is the end of part one. You now have one minute to check your answers", "t": 356.32}, {"sp": "", "h": "to part one.", "t": 365.16}, {"sp": "", "h": "[BLANK_AUDIO]", "t": 386.32}, {"sp": "", "h": "[BLANK_AUDIO]", "t": 416.32}], "2": [{"sp": "", "h": "Part 2. You will hear a podcast about a large business exhibition which is held every year in London.", "t": 0.0}, {"sp": "", "h": "First, you have some time to look at questions 11 to 14.", "t": 9.36}, {"sp": "", "h": "Now listen carefully and answer questions 11 to 14.", "t": 30.0}, {"sp": "", "h": "Hello and welcome to this podcast telling you about our annual business exhibition.", "t": 42.96}, {"sp": "", "h": "This year, as always, it will be full of the very best speakers,", "t": 49.04}, {"sp": "", "h": "features and innovations. Let me start by reading some feedback from", "t": 53.52}, {"sp": "", "h": "James Craig, who has exhibited with us for the past two years. James says,", "t": 59.44}, {"sp": "", "h": "&quot;I&#x27;m director of a company called TalkCon, which is an office phone system.&quot;", "t": 65.92}, {"sp": "", "h": "The first year we exhibited, we had a stand in the business village where we made a lot of useful", "t": 71.68}, {"sp": "", "h": "contacts. We also used the breakout area where people could sit down and relax and try out our", "t": 77.6}, {"sp": "", "h": "products and, due to popular request, we used that again last year. Last year, we also", "t": 84.88}, {"sp": "", "h": "sponsored the innovative business connection zone where people could leave their contact", "t": 92.56}, {"sp": "", "h": "details on a board to contact other companies and that also effectively raised our corporate profile.", "t": 97.36}, {"sp": "", "h": "We&#x27;re hoping that in the coming exhibition, we&#x27;ll also have a presence in the digital", "t": 105.28}, {"sp": "", "h": "marketing centre, which is clearly a key area for our company, and also maybe have our own", "t": 110.08}, {"sp": "", "h": "TalkCon zone at some stage. The exhibitions open from 8am to 11pm, and there&#x27;s a range of", "t": 116.88}, {"sp": "", "h": "special events for you to enjoy in the evening, as well as a unique chance to publicise your company.", "t": 126.4}, {"sp": "", "h": "Businesses who exhibit with us can claim discounts on a number of popular brands, including major", "t": 133.6}, {"sp": "", "h": "high street fashion and jewelry outlets, as well as grocery chains. Discounts available range from", "t": 140.8}, {"sp": "", "h": "3.5% up to an amazing 15%, so you can save a lot of money. In fact, the average saving made by", "t": 148.72}, {"sp": "", "h": "each exhibitor came to over £400. The scheme is available to every member of your organisation,", "t": 158.8}, {"sp": "", "h": "so this is a benefit that really does have something for you all.", "t": 166.8}, {"sp": "", "h": "Before you hear the rest of the podcast, you have some time to look at questions 15 to 20.", "t": 173.92}, {"sp": "", "h": "Now listen and answer questions 15 to 20.", "t": 188.8}, {"sp": "", "h": "Now let me tell you about some of our keynote speakers for this year&#x27;s exhibition.", "t": 219.28}, {"sp": "", "h": "Jim Clowry started off selling vegetables from a small plot, then opened a small cafe.", "t": 225.2}, {"sp": "", "h": "Rather to his surprise, this became a bit of a sensation, and in a remarkably short time,", "t": 232.16}, {"sp": "", "h": "he had opened an amazing 76 restaurants worldwide. He&#x27;ll be telling you how it all happened,", "t": 238.56}, {"sp": "", "h": "and how it changed his life. David France will be giving an inspirational talk about how,", "t": 246.16}, {"sp": "", "h": "as a business-minded teenager, he managed to set up his own company, and even to be the first", "t": 253.76}, {"sp": "", "h": "person under 18 to get a business bank account. David&#x27;s company has gone from strength to strength,", "t": 260.0}, {"sp": "", "h": "but he isn&#x27;t just interested in making money. He also makes regular donations to organisations,", "t": 267.2}, {"sp": "", "h": "helping those in need, both in the UK and elsewhere in the world. Oliver Stanton was", "t": 273.84}, {"sp": "", "h": "born and educated in the UK, and then went to Malaysia, where he set up a rubberwood furniture", "t": 281.2}, {"sp": "", "h": "business. He then built log houses in the mountains in Japan before moving to Hong Kong,", "t": 287.52}, {"sp": "", "h": "to set up a digital marketing business. After that, he moved back to the UK with his wife,", "t": 294.08}, {"sp": "", "h": "Cypin, and together they opened a Thai cafe. He&#x27;ll be telling you about what he discovered", "t": 300.88}, {"sp": "", "h": "during his travels around the world about business practices in different cultures.", "t": 307.68}, {"sp": "", "h": "Francesca Hepton&#x27;s stool is a broadcaster and businesswoman who is known for her down-to-earth", "t": 313.52}, {"sp": "", "h": "attitude. After winning a top job and a TV contest, she launched a number of online deal sites.", "t": 319.52}, {"sp": "", "h": "Her main business interest is in technology, but she&#x27;s also passionate about helping people", "t": 327.92}, {"sp": "", "h": "gain employment and organises an annual job sphere, so she&#x27;ll be concentrating on this in her talk.", "t": 333.84}, {"sp": "", "h": "Salman Khan is the chief executive of QBF Enterprises and has turned around this business", "t": 341.52}, {"sp": "", "h": "from a major publishing business to one of the UK&#x27;s largest digital marketing service providers.", "t": 348.64}, {"sp": "", "h": "He&#x27;ll be talking about the need for flexibility to cope with new directions in today&#x27;s business world.", "t": 355.52}, {"sp": "", "h": "Finally, Annie Craven is a consultant and coach who works with people to create", "t": 363.44}, {"sp": "", "h": "lasting changes in their business and life. Her session will offer an interactive look at", "t": 369.6}, {"sp": "", "h": "different obstacles in people&#x27;s own lives, not just in business. She also looks at how you can", "t": 376.56}, {"sp": "", "h": "overcome them, whether you&#x27;re starting out in business or at the top of your game. Now let me turn", "t": 383.44}, {"sp": "", "h": "to the next... That is the end of part two. You now have 30 seconds to check your answers to part two.", "t": 390.8}, {"sp": "", "h": "[end]", "t": 413.44}], "3": [{"sp": "", "h": "Part 3. You will hear two architecture students, called Mia and Leo, discussing their presentation", "t": 0.0}, {"sp": "", "h": "on Houses of the Future. First, you have some time to look at questions 21 to 23.", "t": 8.32}, {"sp": "", "h": "Now, listen carefully and answer questions 21 to 23.", "t": 30.0}, {"sp": "", "h": "You know that joint presentation we&#x27;ve got to do this semester Leo.", "t": 50.3}, {"sp": "", "h": "On Houses of the Future?", "t": 54.24}, {"sp": "", "h": "That&#x27;s right. I&#x27;m a bit concerned. Are we meant to come up with", "t": 55.72}, {"sp": "", "h": "creative new suggestions for these houses?", "t": 59.98}, {"sp": "", "h": "I don&#x27;t think so. It&#x27;s more a matter of reporting and evaluating possible developments.", "t": 62.66}, {"sp": "", "h": "But we mustn&#x27;t be too general. We&#x27;ve got to support our points by referring to specific", "t": 69.34}, {"sp": "", "h": "cases. So that&#x27;ll need a lot of work.", "t": 74.6}, {"sp": "", "h": "I&#x27;m afraid so. When&#x27;s it got to be done by?", "t": 77.74}, {"sp": "", "h": "In about six weeks, so that&#x27;s not too much of a rush.", "t": 82.14}, {"sp": "", "h": "And we&#x27;d better decide now what type of housing we&#x27;re going to focus on.", "t": 86.22}, {"sp": "", "h": "How about housing for different generations living together?", "t": 91.5}, {"sp": "", "h": "Mmm, we could do. Or accommodation for one person?", "t": 95.54}, {"sp": "", "h": "I think someone else is doing that. I was wondering about housing for the elderly. That&#x27;s", "t": 99.46}, {"sp": "", "h": "likely to become more important.", "t": 105.68}, {"sp": "", "h": "Yeah, that&#x27;s true. But I think your suggestion about intergenerational living might be more", "t": 107.94}, {"sp": "", "h": "interesting. Let&#x27;s go with that.", "t": 113.38}, {"sp": "", "h": "Okay. Now, I think the future demand is mainly going to be for accommodation in urban areas.", "t": 116.78}, {"sp": "", "h": "So one way of meeting that demand might be to use existing commercial buildings and adapt", "t": 122.78}, {"sp": "", "h": "them to form accommodation.", "t": 128.98}, {"sp": "", "h": "Or come up with original ways of organising space so that people can live in smaller homes.", "t": 131.7}, {"sp": "", "h": "But I think the solution is to design multi-story apartment blocks.", "t": 137.5}, {"sp": "", "h": "Coming up rather than out, yes.", "t": 142.26}, {"sp": "", "h": "Before you hear the rest of the discussion, you have some time to look at questions 24", "t": 148.06}, {"sp": "", "h": "to 30.", "t": 154.24}, {"sp": "", "h": "Let&#x27;s think of some specific developments for houses of the future.", "t": 172.26}, {"sp": "", "h": "Okay. How about increased use of roof space on high-rise buildings for gardens?", "t": 201.82}, {"sp": "", "h": "Yes. In fact, it doesn&#x27;t have to be high-rise. You can do it on a one-story building in", "t": 208.3}, {"sp": "", "h": "a suburb. But it would greatly improve how you feel if you live in an urban high-rise.", "t": 214.34}, {"sp": "", "h": "Especially if you don&#x27;t have a balcony.", "t": 220.06}, {"sp": "", "h": "Yes. I think homes of the future will all need access to a shared working space. Somewhere", "t": 222.42}, {"sp": "", "h": "in the same building or a group of houses, where people can go and work instead of just", "t": 229.22}, {"sp": "", "h": "having a laptop on the kitchen table.", "t": 234.5}, {"sp": "", "h": "Yes. So they aren&#x27;t having to travel to an office but can still interact with others.", "t": 236.7}, {"sp": "", "h": "That&#x27;s often how new ideas get generated by chatting to someone from a different profession.", "t": 242.34}, {"sp": "", "h": "Yeah. I read about a type of design where the internal walls of an apartment are movable.", "t": 247.58}, {"sp": "", "h": "So the space can be adapted over time as people&#x27;s needs change.", "t": 254.62}, {"sp": "", "h": "Like when children leave school and start working but still continue to live with their", "t": 258.86}, {"sp": "", "h": "parents for many years, or when an elderly relative moves in with the family. It would", "t": 263.06}, {"sp": "", "h": "mean they could still have their own space, specially designed for their needs.", "t": 268.1}, {"sp": "", "h": "Yes. Have you heard about those smart bathroom mirrors which can monitor people&#x27;s health?", "t": 272.86}, {"sp": "", "h": "They recognize signs of illness and contact a doctor automatically.", "t": 279.34}, {"sp": "", "h": "Hmm. Not so sure they&#x27;re a good idea.", "t": 283.86}, {"sp": "", "h": "Or am I? People might worry about conditions which aren&#x27;t serious at all.", "t": 287.1}, {"sp": "", "h": "What about transport? Wouldn&#x27;t it be good if there were bike sheds with charging points", "t": 291.9}, {"sp": "", "h": "so people could store their electric bikes securely and charge them up at the same time?", "t": 297.46}, {"sp": "", "h": "Yes. That would encourage more people to cycle instead of using their car. Much better for", "t": 303.34}, {"sp": "", "h": "the planet.", "t": 309.42}, {"sp": "", "h": "Hmm. I read about one housing development where cars had to be left just outside it.", "t": 310.42}, {"sp": "", "h": "So the centre was all a pedestrianised area. Great for families with children.", "t": 315.9}, {"sp": "", "h": "Maybe. But what if you&#x27;re disabled or elderly and can&#x27;t walk far? It wouldn&#x27;t be so good", "t": 321.46}, {"sp": "", "h": "for people like that.", "t": 326.94}, {"sp": "", "h": "No.", "t": 328.5}, {"sp": "", "h": "I saw a scheme for communal vegetable plots where neighbours could decide what to grow", "t": 329.5}, {"sp": "", "h": "together. That&#x27;d be a great way for older people to get to know one another. Especially", "t": 334.26}, {"sp": "", "h": "if they&#x27;re no longer going out to work.", "t": 339.78}, {"sp": "", "h": "Yes. Doing something together is always more enjoyable, isn&#x27;t it?", "t": 342.14}, {"sp": "", "h": "Hmm. Do you think we might be able to look in?", "t": 346.1}, {"sp": "", "h": "That is the end of part three. You now have 30 seconds to check your answers to part three.", "t": 352.22}, {"sp": "", "h": "Thank you.", "t": 372.14}], "4": [{"sp": "", "h": "Part 4. You will hear part of a lecture to medical students about playing music to", "t": 0.0}, {"sp": "", "h": "patients who are in hospital for surgery. First, you have some time to look at questions", "t": 6.88}, {"sp": "", "h": "31 to 40.", "t": 14.64}, {"sp": "", "h": "[BLANK_AUDIO]", "t": 30.0}, {"sp": "", "h": "Today&#x27;s lecture is about studies that look at how music therapy can be used to help patients", "t": 60.0}, {"sp": "", "h": "who undergo surgery. Now, most people undergo a surgical procedure at some point in their", "t": 80.96}, {"sp": "", "h": "lives, and more than 51 million operations are performed annually in the USA. But there&#x27;s", "t": 87.12}, {"sp": "", "h": "no escaping the fact that most patients feel uncomfortable following surgery. They may have", "t": 94.0}, {"sp": "", "h": "difficulty mobilizing, and even sitting up in bed can feel too much. They may also be negatively", "t": 99.68}, {"sp": "", "h": "affected by having their <span class=\"tr-ans\">routine<sup class=\"tr-q\">Q31</sup></span> disturbed, like if they can&#x27;t do the things they normally do,", "t": 106.08}, {"sp": "", "h": "or have to devote a lot of time to appointments, such as physiotherapy to aid their recovery.", "t": 112.4}, {"sp": "", "h": "Currently, the main strategy for improving recovery is medication to control pain,", "t": 119.36}, {"sp": "", "h": "and this can be administered to patients in the short, medium, or longer term, depending on the", "t": 125.36}, {"sp": "", "h": "extent of their surgery. But music is still not an everyday part of the post-surgical phase,", "t": 130.56}, {"sp": "", "h": "despite a wealth of relevant studies supporting its potential in recovery. Earlier this year,", "t": 137.04}, {"sp": "", "h": "a research team set out to assess all the available evidence so that they could highlight", "t": 143.76}, {"sp": "", "h": "the potential for music in surgical recovery. They identified nearly 100 <span class=\"tr-ans\">trials<sup class=\"tr-q\">Q32</sup></span> involving", "t": 148.88}, {"sp": "", "h": "a total of 7,000 patients who were played recorded music as part of their post-operative care.", "t": 155.6}, {"sp": "", "h": "The researchers then looked at what impact the music had on the patients. They discovered", "t": 162.72}, {"sp": "", "h": "that patients who had been played music reported feeling happier and more satisfied in the post-operative", "t": 168.24}, {"sp": "", "h": "phase, and the length of their stay was shorter than for patients who had not listened to any music.", "t": 174.8}, {"sp": "", "h": "The researchers also explored the patient&#x27;s choice of music, and their findings showed that", "t": 182.32}, {"sp": "", "h": "a wide variety of music styles was evident. However, a common factor was that the chosen", "t": 187.76}, {"sp": "", "h": "music had a <span class=\"tr-ans\">calming<sup class=\"tr-q\">Q33</sup></span> quality. Some of the patients listened to music with headphones,", "t": 194.4}, {"sp": "", "h": "but it was quiet enough not to prevent them from being able to communicate with nurses and other", "t": 199.92}, {"sp": "", "h": "staff. More often though, the mode of delivery was by what are known as music <span class=\"tr-ans\">pillows<sup class=\"tr-q\">Q34</sup></span>.", "t": 204.88}, {"sp": "", "h": "These broadcasts sound that is only audible to the person lying on them. The research", "t": 212.72}, {"sp": "", "h": "involved testing music before, during, or after operations, or a combination. Some patients", "t": 218.88}, {"sp": "", "h": "listened to the music just once a day, while others had several episodes a day.", "t": 226.16}, {"sp": "", "h": "When asked to report their experience of listening to music, surgical patients", "t": 235.92}, {"sp": "", "h": "said that either they had no feelings of <span class=\"tr-ans\">anxiety<sup class=\"tr-q\">Q35</sup></span> at any point, or those feelings were only slight.", "t": 240.56}, {"sp": "", "h": "Patients who hadn&#x27;t listened to music, on the other hand, reported higher levels of dissatisfaction.", "t": 247.76}, {"sp": "", "h": "This feedback from all of the patients was then cross-checked against their medical notes,", "t": 254.88}, {"sp": "", "h": "and in every case, those who were given music to listen to didn&#x27;t need as much", "t": 260.4}, {"sp": "", "h": "<span class=\"tr-ans\">medication<sup class=\"tr-q\">Q36</sup></span> to ease their pain as those patients who weren&#x27;t played music. The type of music,", "t": 265.92}, {"sp": "", "h": "patient choice and timing, before, during, or after the surgery, didn&#x27;t make much difference.", "t": 272.96}, {"sp": "", "h": "And it even worked when patients were played music under general anesthetic,", "t": 279.68}, {"sp": "", "h": "although the positive effects were greater when patients were <span class=\"tr-ans\">awake<sup class=\"tr-q\">Q37</sup></span>.", "t": 284.24}, {"sp": "", "h": "All the evidence suggests that music has a positive effect on post-operative patients,", "t": 288.72}, {"sp": "", "h": "but it&#x27;s not entirely clear how or why this is the case. A lot of people listen to music in daily", "t": 294.16}, {"sp": "", "h": "life as a way to relax and forget their problems, but the researchers came to the conclusion that", "t": 300.48}, {"sp": "", "h": "it worked on patients by <span class=\"tr-ans\">distraction<sup class=\"tr-q\">Q38</sup></span>. I suppose it was something familiar and gave them something", "t": 306.4}, {"sp": "", "h": "they could control. The researchers say there is now sufficient research to demonstrate that music", "t": 312.72}, {"sp": "", "h": "should be available to all patients undergoing operations. They say patients should be able", "t": 319.52}, {"sp": "", "h": "to choose what they&#x27;d like to listen to, and, if they prefer, recordings taken from <span class=\"tr-ans\">nature<sup class=\"tr-q\">Q39</sup></span>", "t": 325.44}, {"sp": "", "h": "can be just as good as music. Surgical teams may prefer patients to listen to music", "t": 331.92}, {"sp": "", "h": "before the procedure or as soon as they arrive back onto the ward. Clearly, there&#x27;s more to learn", "t": 338.0}, {"sp": "", "h": "about this area, and the team now plan to focus their next research on the most appropriate <span class=\"tr-ans\">volume<sup class=\"tr-q\">Q40</sup></span>", "t": 344.96}, {"sp": "", "h": "to play the music at, and I look forward to reading the results of their study. It will be interesting", "t": 351.52}, {"sp": "", "h": "to see that if it&#x27;s... That is the end of part four. You now have one minute to check your answers to part four.", "t": 357.44}, {"sp": "", "h": "[silence]", "t": 387.44}, {"sp": "", "h": "That is the end of the listening test. In the IELTS test, you would now have ten minutes", "t": 417.44}, {"sp": "", "h": "to transfer your answers to the listening answer sheet.", "t": 437.6}]};
const player = document.getElementById('player');
const asrc = document.getElementById('asrc');
let curPart = 1;

function toggleTheme(){ const r=document.documentElement; const d=r.getAttribute('data-theme')==='dark'; r.setAttribute('data-theme', d?'light':'dark'); try{localStorage.setItem('theme', d?'light':'dark')}catch(e){} }
(function(){ try{ const t=localStorage.getItem('theme'); if(t) document.documentElement.setAttribute('data-theme',t);}catch(e){} })();

function badge(q){ return q.replace(/\//g, ','); }
function renderTranscript(n){
  const host=document.getElementById('trBody');
  const card=document.getElementById('trCard');
  if(!TRANSCRIPTS[n]||!TRANSCRIPTS[n].length){
    card.style.display='none';
    document.querySelector('.wrap').style.gridTemplateColumns='minmax(0,720px)';
    document.querySelector('.wrap').style.justifyContent='center';
    return;
  }
  card.style.display='';
  document.querySelector('.wrap').style.gridTemplateColumns='';
  host.innerHTML=(TRANSCRIPTS[n]||[]).map(u=>{
    let h=u.h.replace(/<sup class="tr-q">Q([^<]+)<\/sup>/g,(m,q)=>`<span class="tr-q">${badge(q)}</span>`);
    return `<div class="tr-turn" data-t="${u.t}" onclick="trSeek(${u.t})">${u.sp?`<span class="tr-sp">${u.sp}: </span>`:''}<span class="tr-tx">${h}</span></div>`;
  }).join('');
  trLast=null;
}
function toggleTr(){ const c=document.getElementById('trCard'); c.classList.toggle('open'); document.getElementById('trChev').textContent=c.classList.contains('open')?'▾':'▸'; }
function trSeek(t){ if(typeof t==='number'&&isFinite(t)){ player.currentTime=Math.max(0,t-.4); player.play().catch(()=>{}); } }
let trLast=null;
player.addEventListener('timeupdate',()=>{
  const c=document.getElementById('trCard'); if(!c.classList.contains('open'))return;
  const body=document.getElementById('trBody'); const t=player.currentTime; let act=null;
  for(const el of body.children){ if(parseFloat(el.dataset.t)<=t+.25) act=el; else break; }
  if(act!==trLast){ if(trLast)trLast.classList.remove('active'); if(act){act.classList.add('active');} trLast=act; }
});

function loadTrack(n){ asrc.src=audioTracks[n]; player.load(); }
function switchPart(n){
  curPart=n;
  document.querySelectorAll('.botnav .navbtn[data-part]').forEach(b=>b.classList.toggle('active',+b.dataset.part===n));
  document.getElementById('partTitle').textContent='Part '+n+' · '+(TITLES[n]||'');
  document.getElementById('qPane').innerHTML=PARTS[n];
  renderTranscript(n);
  loadTrack(n);
  window.scrollTo({top:0,behavior:'smooth'});
}
function setSpeed(r,btn){ player.playbackRate=r; document.querySelectorAll('.speed button').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }

/* answer widgets (referenced inline in question HTML) */
function selectMCQ(el,name){ document.querySelectorAll(`[name="${name}"]`).forEach(r=>r.closest('.mcq-option').classList.remove('selected')); el.classList.add('selected'); el.querySelector('input').checked=true; }
function toggleCheck(evt,label){ evt.preventDefault(); const cb=label.querySelector('input'); const g=label.closest('.check-group'); const max=parseInt(g.dataset.max||'99',10); if(cb.checked){cb.checked=false;label.classList.remove('selected');return;} if(g.querySelectorAll('input:checked').length>=max)return; cb.checked=true;label.classList.add('selected'); }
function updateProgress(){}

/* scoring */
const norm=s=>(s??'').toString().trim().toLowerCase().replace(/[.,!?;:'"‘’“”()]/g,'').replace(/[-_]/g,' ').replace(/\s+/g,' ').trim();
function isCorrect(u,c){ if(!u)return false; const un=norm(u); if(!un)return false; const dg=s=>s.replace(/[^\d]/g,''); const ud=dg(un);
  const tm=v=>{const vn=norm(v); if(vn===un)return true; const vd=dg(vn); if(ud&&vd&&ud.length>=3&&ud===vd)return true; return false;};
  return Array.isArray(c)?c.some(tm):tm(c); }
function getUA(){ const ua={};
  document.querySelectorAll('input[type="text"][data-q]').forEach(i=>ua[i.dataset.q]=i.value.trim());
  document.querySelectorAll('input[type="radio"]:checked').forEach(r=>{const m=r.name.match(/^q(\d+)$/); if(m){const o=r.closest('.mcq-option'); if(o)ua[m[1]]=o.querySelector('.opt-letter').textContent.trim();}});
  document.querySelectorAll('.check-group').forEach(g=>{const qs=(g.dataset.questions||'').split(',').map(s=>s.trim()).filter(Boolean); const sel=[...g.querySelectorAll('input:checked')].map(i=>i.value); qs.forEach((q,i)=>ua[q]=sel[i]||'');});
  return ua; }
/* persist across part switches: cache answers on switch */
let cache={};
function stash(){ Object.assign(cache,getUA()); }
const _sp=switchPart; switchPart=function(n){ stash(); _sp(n); restore(); };
function restore(){ document.querySelectorAll('input[type="text"][data-q]').forEach(i=>{ if(cache[i.dataset.q]!=null)i.value=cache[i.dataset.q]; });
  document.querySelectorAll('.mcq-option').forEach(o=>{ const inp=o.querySelector('input'); const m=inp.name.match(/^q(\d+)$/); if(m&&cache[m[1]]===o.querySelector('.opt-letter').textContent.trim()){o.classList.add('selected');inp.checked=true;} });
  document.querySelectorAll('.check-group').forEach(g=>{ const qs=(g.dataset.questions||'').split(',').map(s=>s.trim()); const want=qs.map(q=>cache[q]).filter(Boolean); g.querySelectorAll('.check-option').forEach(o=>{ const v=o.querySelector('input').value; if(want.includes(v)){o.classList.add('selected');o.querySelector('input').checked=true;} }); }); }
function multiPts(key,ua){ const s=multiCorrect[key]; if(!s)return 0; const acc=s.accept.map(norm); const used=new Set(); let p=0; s.inputs.map(k=>norm(ua[k]||'')).forEach(uv=>{ if(!uv)return; for(let i=0;i<acc.length;i++){ if(used.has(i))continue; if(uv===acc[i]){used.add(i);p++;break;} } }); return p; }
function score(){ stash(); const ua=cache; let c=0; const handled=new Set();
  Object.keys(multiCorrect).forEach(k=>{ c+=multiPts(k,ua); multiCorrect[k].inputs.forEach(s=>handled.add(String(s))); });
  for(let q=1;q<=40;q++){ if(handled.has(String(q)))continue; if(ua[q]&&correctAnswers[q]!==undefined&&isCorrect(ua[q],correctAnswers[q]))c++; }
  return c; }
function band(c){ if(c>=39)return'9.0';if(c>=37)return'8.5';if(c>=35)return'8.0';if(c>=32)return'7.5';if(c>=30)return'7.0';if(c>=26)return'6.5';if(c>=23)return'6.0';if(c>=18)return'5.5';if(c>=16)return'5.0';if(c>=13)return'4.5';if(c>=10)return'4.0';return'<4'; }
function submitAnswers(){ const c=score(); document.getElementById('mScore').textContent=c; document.getElementById('mBand').textContent='Estimated Band '+band(c); document.getElementById('resModal').classList.add('open'); }
function closeModal(){ document.getElementById('resModal').classList.remove('open'); }
function showReview(){ closeModal(); const ua=cache; const box=document.getElementById('revList'); let h='';
  const slotBase={}; Object.keys(multiCorrect).forEach(k=>multiCorrect[k].inputs.forEach(s=>slotBase[s]=k));
  for(let q=1;q<=40;q++){ let u=ua[q]||'',cc,ok;
    if(slotBase[q]){ const sp=multiCorrect[slotBase[q]]; cc=sp.accept.join(' / ')+' (any order)'; ok=u&&sp.accept.map(norm).includes(norm(u)); }
    else { cc=correctAnswers[q]; if(cc===undefined)continue; ok=u&&isCorrect(u,cc); cc=Array.isArray(cc)?cc[0]:cc; }
    const cls=!u?'':(ok?'correct':'incorrect');
    h+=`<div class="ans-row ${cls}"><div class="ql">Q${q}</div><div><div class="lbl">You</div><div class="yv">${u||'—'}</div></div><div><div class="lbl">Answer</div><div class="cv">${cc}</div></div></div>`; }
  box.innerHTML=h; document.getElementById('revModal').classList.add('open'); }
function resetAll(){ if(!confirm('Clear all your answers?'))return; cache={}; document.querySelectorAll('input[type="text"][data-q]').forEach(i=>i.value=''); document.querySelectorAll('.mcq-option.selected,.check-option.selected').forEach(o=>o.classList.remove('selected')); document.querySelectorAll('input:checked').forEach(i=>i.checked=false); }

switchPart(1);
</script>
